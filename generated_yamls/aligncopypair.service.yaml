---
slivka-version: 0.8.3
name: aligncopypair
description: Read and write pairs from alignments
version: '6.6.0.0'
author: EMBOSS
license: GPL
classifiers:
- 'Operation :: Sequence alignment file processing'
- 'Topic :: Data handling'

parameters:
  sequences:
    name: sequences
    type: file
    required: true
    description: File containing a sequence alignment.
  sformat-sequences:
    name: sformat_sequences
    type: choice
    required: false
    choices:
      abi: abi
      ace: ace
      acedb: acedb
      bam: bam
      biomart: biomart
      clustal: clustal
      codata: codata
      dbid: dbid
      embl: embl
      ensembl: ensembl
      experiment: experiment
      fasta: fasta
      fastq: fastq
      fastq-illumina: fastq-illumina
      fastq-sanger: fastq-sanger
      fastq-solexa: fastq-solexa
      fitch: fitch
      gcg: gcg
      genbank: genbank
      genpept: genpept
      gff2: gff2
      gff3: gff3
      gifasta: gifasta
      hennig86: hennig86
      ig: ig
      igstrict: igstrict
      jackknifer: jackknifer
      mase: mase
      mega: mega
      msf: msf
      nbrf: nbrf
      nexus: nexus
      pdb: pdb
      pdbnuc: pdbnuc
      pdbnucseq: pdbnucseq
      pdbseq: pdbseq
      pearson: pearson
      phylip: phylip
      phylipnon: phylipnon
      raw: raw
      refseqp: refseqp
      sam: sam
      selex: selex
      staden: staden
      stockholm: stockholm
      strider: strider
      swiss: swiss
      text: text
      treecon: treecon
  sbegin-sequences:
    name: sbegin_sequences
    type: integer
    required: false
  send-sequences:
    name: send_sequences
    type: integer
    required: false
  sprotein-sequences:
    name: sprotein_sequences
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  snucleotide-sequences:
    name: snucleotide_sequences
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  sreverse-sequences:
    name: sreverse_sequences
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  slower-sequences:
    name: slower_sequences
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  supper-sequences:
    name: supper_sequences
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  name:
    name: name
    type: text
    required: false
    description: Name of the alignment
  comment:
    name: comment
    type: text
    required: false
    description: Comment on the alignment
  append:
    name: append
    type: choice
    required: false
    description: Append to the existing alignment header. This allows you to append the name and comments you have given on to the end of the existing alignment header.
    choices:
      yes: Y
      no: N
  help:
    name: help
    type: choice
    required: false
    description: Help documentation of the tool.
    choices:
      yes: Y
      no: N

command: aligncopypair

args:
  sequences:
    arg: -sequences $(value)
    symlink: sequences.dat
  sformat-sequences:
    arg: -sformat1 $(value)
  sbegin-sequences:
    arg: -sbegin1 $(value)
  send-sequences:
    arg: -send1 $(value)
  sprotein-sequences:
    arg: -sprotein1 $(value)
  snucleotide-sequences:
    arg: -snucleotide1 $(value)
  sreverse-sequences:
    arg: -sreverse1 $(value)
  slower-sequences:
    arg: -slower1 $(value)
  supper-sequences:
    arg: -supper1 $(value)
  name:
    arg: -name $(value)
  comment:
    arg: -comment $(value)
  append:
    arg: -append $(value)
  help:
    arg: -help $(value)
  _outfile:
    arg: -outfile $(value)
    default: outfile.txt

outputs:
  outfile:
    name: outfile
    path: outfile.txt
    media-type: text/plain
  log:
    name: log
    path: stdout
    media-type: text/plain
  error-log:
    name: error-log
    path: stderr
    media-type: text/plain

execution:
  runners:
    default:
      type: SlivkaQueueRunner
...
