---
slivka-version: 0.8.3
name: cirdna
description: Draw circular map of DNA constructs
version: '6.6.0.0'
author: EMBOSS
license: GPL
classifiers:
- 'Operation :: DNA circular map rendering'
- 'Topic :: Data visualisation'
- 'Topic :: Nucleic acid sequence analysis'

parameters:
  infile:
    name: infile
    type: text
    required: false
    description: Commands to the cirdna drawing program file
  ruler:
    name: ruler
    type: choice
    required: false
    description: Draw a ruler
    choices:
      yes: Y
      no: N
  blocktype:
    name: blocktype
    type: text
    required: false
    description: Type of blocks
  posticks:
    name: posticks
    type: text
    required: false
    description: Ticks inside or outside the circle
  posblocks:
    name: posblocks
    type: text
    required: false
    description: Text inside or outside the blocks
  graph-format:
    name: graph_format
    type: choice
    required: false
    description: Format of the graphical output
    choices:
      png: png
      colourps: colourps
  maxgroups:
    name: maxgroups
    type: integer
    required: false
    description: Maximum number of groups
    min: 1
  maxlabels:
    name: maxlabels
    type: integer
    required: false
    description: Maximum number of labels
    min: 1
  originangle:
    name: originangle
    type: decimal
    required: false
    description: Position in degrees of the molecule's origin on the circle
    min: 0.0
    max: 360.0
  intersymbol:
    name: intersymbol
    type: choice
    required: false
    description: Horizontal junctions between blocks
    choices:
      yes: Y
      no: N
  intercolour:
    name: intercolour
    type: integer
    required: false
    description: Colour of junctions between blocks (enter a colour number)
    min: 0
    max: 15
  interticks:
    name: interticks
    type: choice
    required: false
    description: Horizontal junctions between ticks
    choices:
      yes: Y
      no: N
  gapsize:
    name: gapsize
    type: integer
    required: false
    description: Interval between ticks in the ruler
    min: 0
  ticklines:
    name: ticklines
    type: choice
    required: false
    description: Vertical lines at the ruler's ticks
    choices:
      yes: Y
      no: N
  textheight:
    name: textheight
    type: decimal
    required: false
    description: "Text scale factor. Height of text. Enter a number <1.0 or >1.0 to decrease or increase the size, respectively"
    min: 0.0
  textlength:
    name: textlength
    type: decimal
    required: false
    description: "Length of text multiplier. Length of text. Enter a number <1.0 or >1.0 to decrease or increase the size, respectively"
    min: 0.0
  tickheight:
    name: tickheight
    type: decimal
    required: false
    description: "Height of ticks multiplier. Height of ticks. Enter a number <1.0 or >1.0 to decrease or increase the size, respectively"
    min: 0.0
  blockheight:
    name: blockheight
    type: decimal
    required: false
    description: "Height of blocks multiplier. Height of blocks. Enter a number <1.0 or >1.0 to decrease or increase the size, respectively"
    min: 0.0
  rangeheight:
    name: rangeheight
    type: decimal
    required: false
    description: "Height of range ends multiplier. Height of range ends. Enter a number <1.0 or >1.0 to decrease or increase the size, respectively"
    min: 0.0
  gapgroup:
    name: gapgroup
    type: decimal
    required: false
    description: "Space between groups multiplier. Space between groups. Enter a number <1.0 or >1.0 to decrease or increase the size, respectively"
    min: 0.0
  postext:
    name: postext
    type: decimal
    required: false
    description: "Space between text and ticks, blocks, and ranges multiplier. Space between text and ticks, blocks, and ranges. Enter a number <1.0 or >1.0 to decrease or increase the size, respectively"
    min: 0.0
  graphics-in-postscript:
    name: Graphics_in_Postscript
    type: text
    required: false
  graphics-in-png:
    name: Graphics_in_PNG
    type: text
    required: false
  blocktype-open:
    name: blocktype_Open
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  blocktype-filled:
    name: blocktype_Filled
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  blocktype-outline:
    name: blocktype_Outline
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  posticks-in:
    name: posticks_In
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  posticks-out:
    name: posticks_Out
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  posblocks-in:
    name: posblocks_In
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  posblocks-out:
    name: posblocks_Out
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  help:
    name: help
    type: choice
    required: false
    description: Help documentation of the tool.
    choices:
      yes: Y
      no: N

command: cirdna

args:
  infile:
    arg: -infile $(value)
  ruler:
    arg: -ruler $(value)
  blocktype:
    arg: -blocktype $(value)
  posticks:
    arg: -posticks $(value)
  posblocks:
    arg: -posblocks $(value)
  graph-format:
    arg: -graph_format $(value)
  maxgroups:
    arg: -maxgroups $(value)
  maxlabels:
    arg: -maxlabels $(value)
  originangle:
    arg: -originangle $(value)
  intersymbol:
    arg: -intersymbol $(value)
  intercolour:
    arg: -intercolour $(value)
  interticks:
    arg: -interticks $(value)
  gapsize:
    arg: -gapsize $(value)
  ticklines:
    arg: -ticklines $(value)
  textheight:
    arg: -textheight $(value)
  textlength:
    arg: -textlength $(value)
  tickheight:
    arg: -tickheight $(value)
  blockheight:
    arg: -blockheight $(value)
  rangeheight:
    arg: -rangeheight $(value)
  gapgroup:
    arg: -gapgroup $(value)
  postext:
    arg: -postext $(value)
  graphics-in-postscript:
    arg: -Graphics_in_Postscript $(value)
  graphics-in-png:
    arg: -Graphics_in_PNG $(value)
  blocktype-open:
    arg: -blocktype_Open $(value)
  blocktype-filled:
    arg: -blocktype_Filled $(value)
  blocktype-outline:
    arg: -blocktype_Outline $(value)
  posticks-in:
    arg: -posticks_In $(value)
  posticks-out:
    arg: -posticks_Out $(value)
  posblocks-in:
    arg: -posblocks_In $(value)
  posblocks-out:
    arg: -posblocks_Out $(value)
  help:
    arg: -help $(value)
  _outfile:
    arg: -outfile $(value)
    default: outfile.out

outputs:
  output:
    name: output
    path: outfile.out
    media-type: text/plain
  log:
    name: log
    path: stdout
    media-type: text/plain
  error-log:
    name: error-log
    path: stderr
    media-type: text/plain

execution:
  runners:
    default:
      type: SlivkaQueueRunner
...
