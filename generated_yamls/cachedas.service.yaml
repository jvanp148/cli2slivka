---
slivka-version: 0.8.3
name: cachedas
description: Generate server cache file for DAS servers or for the DAS registry
version: '6.6.0.0'
author: EMBOSS
license: GPL
classifiers:
- 'Operation :: Data retrieval (database metadata)'
- 'Topic :: Data handling'

parameters:
  cachefile:
    name: cachefile
    type: text
    required: false
    description: Server cache output file
  sequencesourcesonly:
    name: sequencesourcesonly
    type: choice
    required: false
    description: Display DAS sequence sources only
    choices:
      yes: Y
      no: N
  host:
    name: host
    type: text
    required: false
    description: DAS registry/server host location
  path:
    name: path
    type: text
    required: false
    description: DAS registry/server path on registry/server host
  port:
    name: port
    type: integer
    required: false
    description: DAS registry/server port on registry/server host
  servername:
    name: servername
    type: text
    required: false
    description: Name of a DAS server defined in EMBOSS resource files
  help:
    name: help
    type: choice
    required: false
    description: Help documentation of the tool.
    choices:
      yes: Y
      no: N

command: cachedas

args:
  cachefile:
    arg: -cachefile $(value)
  sequencesourcesonly:
    arg: -sequencesourcesonly $(value)
  host:
    arg: -host $(value)
  path:
    arg: -path $(value)
  port:
    arg: -port $(value)
  servername:
    arg: -servername $(value)
  help:
    arg: -help $(value)
  _outfile:
    arg: -outfile $(value)
    default: outfile.out

outputs:
  report:
    name: report
    path: outfile.out
    media-type: text/plain
  log:
    name: log
    path: stdout
    media-type: text/plain
  error-log:
    name: error-log
    path: stderr
    media-type: text/plain

execution:
  runners:
    default:
      type: SlivkaQueueRunner
...
