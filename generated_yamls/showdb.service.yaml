---
slivka-version: 0.8.3
name: showdb
description: Display information on configured databases
version: '6.6.0.0'
author: EMBOSS
license: GPL
classifiers:
- 'Operation :: Data retrieval (database metadata)'
- 'Topic :: Data handling'

parameters:
  database:
    name: database
    type: text
    required: false
    description: Name of a single database to give information on
  html:
    name: html
    type: choice
    required: false
    description: Format output as an HTML table
    choices:
      yes: Y
      no: N
  protein:
    name: protein
    type: choice
    required: false
    description: Display protein databases
    choices:
      yes: Y
      no: N
  nucleic:
    name: nucleic
    type: choice
    required: false
    description: Display nucleotide databases
    choices:
      yes: Y
      no: N
  sequence:
    name: sequence
    type: choice
    required: false
    description: Display general sequence databases
    choices:
      yes: Y
      no: N
  feature:
    name: feature
    type: choice
    required: false
    description: Display feature annotation databases
    choices:
      yes: Y
      no: N
  text:
    name: text
    type: choice
    required: false
    description: Display text databases
    choices:
      yes: Y
      no: N
  taxonomy:
    name: taxonomy
    type: choice
    required: false
    description: Display taxonomy databases
    choices:
      yes: Y
      no: N
  resource:
    name: resource
    type: choice
    required: false
    description: Display resource databases
    choices:
      yes: Y
      no: N
  assembly:
    name: assembly
    type: choice
    required: false
    description: Display sequence assembly databases
    choices:
      yes: Y
      no: N
  obo:
    name: obo
    type: choice
    required: false
    description: Display obo bio-ontology databases
    choices:
      yes: Y
      no: N
  xml:
    name: xml
    type: choice
    required: false
    description: Display XML databases
    choices:
      yes: Y
      no: N
  standard:
    name: standard
    type: choice
    required: false
    description: Display standard databases
    choices:
      yes: Y
      no: N
  user:
    name: user
    type: choice
    required: false
    description: Display user-defined databases
    choices:
      yes: Y
      no: N
  include:
    name: include
    type: choice
    required: false
    description: Display databases defined in included files
    choices:
      yes: Y
      no: N
  full:
    name: full
    type: choice
    required: false
    description: Display all columns
    choices:
      yes: Y
      no: N
  access:
    name: access
    type: choice
    required: false
    description: "Display 'id, qry, all' access column. This displays the levels of access that can be used on this database"
    choices:
      yes: Y
      no: N
  methods:
    name: methods
    type: choice
    required: false
    description: "Display 'methods' column. This displays the access methods that can be used on this database, for all, query or ID access"
    choices:
      yes: Y
      no: N
  taxscope:
    name: taxscope
    type: choice
    required: false
    description: Display 'taxon' column. This displays the taxons covered by this database
    choices:
      yes: Y
      no: N
  fields:
    name: fields
    type: choice
    required: false
    description: "Display 'fields' column. This displays the search fields that can be used on this database, including the standard 'id' or 'acc' fields"
    choices:
      yes: Y
      no: N
  numfields:
    name: numfields
    type: choice
    required: false
    description: "Display count in 'fields' column. This displays the number of search fields that can be used on this database, including the standard 'id' or 'acc' fields"
    choices:
      yes: Y
      no: N
  aliases:
    name: aliases
    type: choice
    required: false
    description: Display 'alias' column. This displays the alias names that can be used for this database
    choices:
      yes: Y
      no: N
  numaliases:
    name: numaliases
    type: choice
    required: false
    description: Display count in 'alias' column. This displays the number of alias names that can be used for this database
    choices:
      yes: Y
      no: N
  examples:
    name: examples
    type: choice
    required: false
    description: Display 'example queries' column. This displays the example queries that can be used to test this database
    choices:
      yes: Y
      no: N
  numexamples:
    name: numexamples
    type: choice
    required: false
    description: Display count in 'example queries' column. This displays the number of example queries that can be used to test this database
    choices:
      yes: Y
      no: N
  defined:
    name: defined
    type: choice
    required: false
    description: Display 'defined' column. This displays a short name for the file containing the database definition
    choices:
      yes: Y
      no: N
  release:
    name: release
    type: choice
    required: false
    description: Display 'release' column
    choices:
      yes: Y
      no: N
  only:
    name: only
    type: choice
    required: false
    description: "Display the specified columns. This is a way of shortening the command line if you only want a few standard columns to be displayed. Instead of specifying: '-nohead -notype -noid -noquery -noall' to get only the comment output, you can specify '-only -comment'"
    choices:
      yes: Y
      no: N
  heading:
    name: heading
    type: choice
    required: false
    description: Display column headings
    choices:
      yes: Y
      no: N
  type:
    name: type
    type: choice
    required: false
    description: Display 'type' column
    choices:
      yes: Y
      no: N
  id:
    name: id
    type: choice
    required: false
    description: Display 'id' access column
    choices:
      yes: Y
      no: N
  query:
    name: query
    type: choice
    required: false
    description: Display 'qry' access column
    choices:
      yes: Y
      no: N
  all:
    name: all
    type: choice
    required: false
    description: Display 'all' access column
    choices:
      yes: Y
      no: N
  comment:
    name: comment
    type: choice
    required: false
    description: Display 'comment' column
    choices:
      yes: Y
      no: N
  help:
    name: help
    type: choice
    required: false
    description: Help documentation of the tool.
    choices:
      yes: Y
      no: N

command: showdb

args:
  database:
    arg: -database $(value)
  html:
    arg: -html $(value)
  protein:
    arg: -protein $(value)
  nucleic:
    arg: -nucleic $(value)
  sequence:
    arg: -sequence $(value)
  feature:
    arg: -feature $(value)
  text:
    arg: -text $(value)
  taxonomy:
    arg: -taxonomy $(value)
  resource:
    arg: -resource $(value)
  assembly:
    arg: -assembly $(value)
  obo:
    arg: -obo $(value)
  xml:
    arg: -xml $(value)
  standard:
    arg: -standard $(value)
  user:
    arg: -user $(value)
  include:
    arg: -include $(value)
  full:
    arg: -full $(value)
  access:
    arg: -access $(value)
  methods:
    arg: -methods $(value)
  taxscope:
    arg: -taxscope $(value)
  fields:
    arg: -fields $(value)
  numfields:
    arg: -numfields $(value)
  aliases:
    arg: -aliases $(value)
  numaliases:
    arg: -numaliases $(value)
  examples:
    arg: -examples $(value)
  numexamples:
    arg: -numexamples $(value)
  defined:
    arg: -defined $(value)
  release:
    arg: -release $(value)
  only:
    arg: -only $(value)
  heading:
    arg: -heading $(value)
  type:
    arg: -type $(value)
  id:
    arg: -id $(value)
  query:
    arg: -query $(value)
  all:
    arg: -all $(value)
  comment:
    arg: -comment $(value)
  help:
    arg: -help $(value)
  _output:
    arg: -output $(value)
    default: output.txt

outputs:
  output:
    name: output
    path: output.txt
    media-type: text/plain
  log:
    name: log
    path: stdout
    media-type: text/plain
  error-log:
    name: error-log
    path: stderr
    media-type: text/plain

execution:
  runners:
    default:
      type: SlivkaQueueRunner
...
