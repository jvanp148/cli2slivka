---
slivka-version: 0.8.3
name: noreturn
description: Remove carriage return from ASCII files
version: '6.6.0.0'
author: EMBOSS
license: GPL
classifiers:
- 'Operation :: File reformatting'
- 'Topic :: Data handling'

parameters:
  infile:
    name: infile
    type: text
    required: true
    description: ASCII text file
  system:
    name: system
    type: choice
    required: false
    description: Target operating system for end-of-line format
    choices:
      unix: unix
      pc: pc
      mac: mac
  help:
    name: help
    type: choice
    required: false
    description: Help documentation of the tool.
    choices:
      yes: Y
      no: N

command: noreturn

args:
  infile:
    arg: -infile $(value)
  system:
    arg: -system $(value)
  help:
    arg: -help $(value)
  _outfile:
    arg: -outfile $(value)
    default: outfile.out

outputs:
  report:
    name: report
    path: outfile.out
    media-type: text/plain
  log:
    name: log
    path: stdout
    media-type: text/plain
  error-log:
    name: error-log
    path: stderr
    media-type: text/plain

execution:
  runners:
    default:
      type: SlivkaQueueRunner
...
