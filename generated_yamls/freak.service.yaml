---
slivka-version: 0.8.3
name: freak
description: Generate residue/base frequency table or plot
version: '6.6.0.0'
author: EMBOSS
license: GPL
classifiers:
- 'Operation :: Sequence composition calculation'
- 'Topic :: Sequence composition analysis'

parameters:
  seqall:
    name: seqall
    type: file
    required: true
  sformat-seqall:
    name: sformat_seqall
    type: choice
    required: false
    choices:
      abi: abi
      ace: ace
      acedb: acedb
      bam: bam
      biomart: biomart
      clustal: clustal
      codata: codata
      dbid: dbid
      embl: embl
      ensembl: ensembl
      experiment: experiment
      fasta: fasta
      fastq: fastq
      fastq-illumina: fastq-illumina
      fastq-sanger: fastq-sanger
      fastq-solexa: fastq-solexa
      fitch: fitch
      gcg: gcg
      genbank: genbank
      genpept: genpept
      gff2: gff2
      gff3: gff3
      gifasta: gifasta
      hennig86: hennig86
      ig: ig
      igstrict: igstrict
      jackknifer: jackknifer
      mase: mase
      mega: mega
      msf: msf
      nbrf: nbrf
      nexus: nexus
      pdb: pdb
      pdbnuc: pdbnuc
      pdbnucseq: pdbnucseq
      pdbseq: pdbseq
      pearson: pearson
      phylip: phylip
      phylipnon: phylipnon
      raw: raw
      refseqp: refseqp
      sam: sam
      selex: selex
      staden: staden
      stockholm: stockholm
      strider: strider
      swiss: swiss
      text: text
      treecon: treecon
  sbegin-seqall:
    name: sbegin_seqall
    type: integer
    required: false
  send-seqall:
    name: send_seqall
    type: integer
    required: false
  sprotein-seqall:
    name: sprotein_seqall
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  snucleotide-seqall:
    name: snucleotide_seqall
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  sreverse-seqall:
    name: sreverse_seqall
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  slower-seqall:
    name: slower_seqall
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  supper-seqall:
    name: supper_seqall
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  letters:
    name: letters
    type: text
    required: false
    description: Residue letters
  graph-format:
    name: graph_format
    type: choice
    required: false
    description: Format of the graphical output
    choices:
      png: png
      colourps: colourps
  step:
    name: step
    type: integer
    required: false
    description: Stepping value
  window:
    name: window
    type: integer
    required: false
    description: Averaging window
  plot:
    name: plot
    type: choice
    required: false
    description: Produce graphic
    choices:
      yes: Y
      no: N
  help:
    name: help
    type: choice
    required: false
    description: Help documentation of the tool.
    choices:
      yes: Y
      no: N

command: freak

args:
  seqall:
    arg: -seqall $(value)
    symlink: seqall.dat
  sformat-seqall:
    arg: -sformat1 $(value)
  sbegin-seqall:
    arg: -sbegin1 $(value)
  send-seqall:
    arg: -send1 $(value)
  sprotein-seqall:
    arg: -sprotein1 $(value)
  snucleotide-seqall:
    arg: -snucleotide1 $(value)
  sreverse-seqall:
    arg: -sreverse1 $(value)
  slower-seqall:
    arg: -slower1 $(value)
  supper-seqall:
    arg: -supper1 $(value)
  letters:
    arg: -letters $(value)
  graph-format:
    arg: -graph_format $(value)
  step:
    arg: -step $(value)
  window:
    arg: -window $(value)
  plot:
    arg: -plot $(value)
  help:
    arg: -help $(value)
  _outfile:
    arg: -outfile $(value)
    default: outfile.txt

outputs:
  outfile:
    name: outfile
    path: outfile.txt
    media-type: text/plain
  log:
    name: log
    path: stdout
    media-type: text/plain
  error-log:
    name: error-log
    path: stderr
    media-type: text/plain

execution:
  runners:
    default:
      type: SlivkaQueueRunner
...
