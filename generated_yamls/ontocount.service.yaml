---
slivka-version: 0.8.3
name: ontocount
description: Count ontology term(s)
version: '6.6.0.0'
author: EMBOSS
license: GPL
classifiers:
- 'Operation :: Data retrieval'
- 'Topic :: Ontology'

parameters:
  oboterms:
    name: oboterms
    type: text
    required: false
  subclasses:
    name: subclasses
    type: choice
    required: false
    description: Include subclasses of hits. Extend the query matches to include all terms which are specialisations (sub-classes) of the matched terms.
    choices:
      yes: Y
      no: N
  obsolete:
    name: obsolete
    type: choice
    required: false
    description: Include obsolete terms. The default behaviour is to not use or return obsolete terms. This option if set will include all terms.
    choices:
      yes: Y
      no: N
  help:
    name: help
    type: choice
    required: false
    description: Help documentation of the tool.
    choices:
      yes: Y
      no: N

command: ontocount

args:
  oboterms:
    arg: -oboterms $(value)
  subclasses:
    arg: -subclasses $(value)
  obsolete:
    arg: -obsolete $(value)
  help:
    arg: -help $(value)
  _output:
    arg: -output $(value)
    default: output.txt

outputs:
  output:
    name: output
    path: output.txt
    media-type: text/plain
  log:
    name: log
    path: stdout
    media-type: text/plain
  error-log:
    name: error-log
    path: stderr
    media-type: text/plain

execution:
  runners:
    default:
      type: SlivkaQueueRunner
...
