---
slivka-version: 0.8.3
name: syco
description: Draw synonymous codon usage statistic plot for a
                  nucleotide sequence
version: '6.6.0.0'
author: EMBOSS
license: GPL
classifiers:
- 'Operation :: Codon usage analysis'
- 'Operation :: Coding region prediction'
- 'Topic :: Codon usage analysis'
- 'Topic :: Gene finding'

parameters:
  sequence:
    name: sequence
    type: file
    required: true
  sformat-sequence:
    name: sformat_sequence
    type: choice
    required: false
    choices:
      abi: abi
      ace: ace
      acedb: acedb
      bam: bam
      biomart: biomart
      clustal: clustal
      codata: codata
      dbid: dbid
      embl: embl
      ensembl: ensembl
      experiment: experiment
      fasta: fasta
      fastq: fastq
      fastq-illumina: fastq-illumina
      fastq-sanger: fastq-sanger
      fastq-solexa: fastq-solexa
      fitch: fitch
      gcg: gcg
      genbank: genbank
      genpept: genpept
      gff2: gff2
      gff3: gff3
      gifasta: gifasta
      hennig86: hennig86
      ig: ig
      igstrict: igstrict
      jackknifer: jackknifer
      mase: mase
      mega: mega
      msf: msf
      nbrf: nbrf
      nexus: nexus
      pdb: pdb
      pdbnuc: pdbnuc
      pdbnucseq: pdbnucseq
      pdbseq: pdbseq
      pearson: pearson
      phylip: phylip
      phylipnon: phylipnon
      raw: raw
      refseqp: refseqp
      sam: sam
      selex: selex
      staden: staden
      stockholm: stockholm
      strider: strider
      swiss: swiss
      text: text
      treecon: treecon
  sbegin-sequence:
    name: sbegin_sequence
    type: integer
    required: false
  send-sequence:
    name: send_sequence
    type: integer
    required: false
  sprotein-sequence:
    name: sprotein_sequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  snucleotide-sequence:
    name: snucleotide_sequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  sreverse-sequence:
    name: sreverse_sequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  slower-sequence:
    name: slower_sequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  supper-sequence:
    name: supper_sequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  cfile:
    name: cfile
    type: text
    required: true
    description: Codon usage file
  graph-format:
    name: graph_format
    type: choice
    required: false
    description: Format of the graphical output
    choices:
      png: png
      colourps: colourps
  window:
    name: window
    type: integer
    required: false
    description: Averaging window
  uncommon:
    name: uncommon
    type: choice
    required: false
    description: Show common codon usage
    choices:
      yes: Y
      no: N
  minimum:
    name: minimum
    type: decimal
    required: false
    description: Minimum value for a common codon
    min: 0.0
    max: 0.99
  plot:
    name: plot
    type: choice
    required: false
    description: Produce plot
    choices:
      yes: Y
      no: N
  graphics-in-postscript:
    name: Graphics_in_Postscript
    type: text
    required: false
  graphics-in-png:
    name: Graphics_in_PNG
    type: text
    required: false
  help:
    name: help
    type: choice
    required: false
    description: Help documentation of the tool.
    choices:
      yes: Y
      no: N

command: syco

args:
  sequence:
    arg: -sequence $(value)
    symlink: sequence.dat
  sformat-sequence:
    arg: -sformat1 $(value)
  sbegin-sequence:
    arg: -sbegin1 $(value)
  send-sequence:
    arg: -send1 $(value)
  sprotein-sequence:
    arg: -sprotein1 $(value)
  snucleotide-sequence:
    arg: -snucleotide1 $(value)
  sreverse-sequence:
    arg: -sreverse1 $(value)
  slower-sequence:
    arg: -slower1 $(value)
  supper-sequence:
    arg: -supper1 $(value)
  cfile:
    arg: -cfile $(value)
  graph-format:
    arg: -graph_format $(value)
  window:
    arg: -window $(value)
  uncommon:
    arg: -uncommon $(value)
  minimum:
    arg: -minimum $(value)
  plot:
    arg: -plot $(value)
  graphics-in-postscript:
    arg: -Graphics_in_Postscript $(value)
  graphics-in-png:
    arg: -Graphics_in_PNG $(value)
  help:
    arg: -help $(value)
  _outfile:
    arg: -outfile $(value)
    default: outfile.out

outputs:
  codon-usage-bias-plot:
    name: codon-usage-bias-plot
    path: outfile.out
    media-type: text/plain
  log:
    name: log
    path: stdout
    media-type: text/plain
  error-log:
    name: error-log
    path: stderr
    media-type: text/plain

execution:
  runners:
    default:
      type: SlivkaQueueRunner
...
