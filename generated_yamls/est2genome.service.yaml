---
slivka-version: 0.8.3
name: est2genome
description: Align EST sequences to genomic DNA sequence
version: '6.6.0.0'
author: EMBOSS
license: GPL
classifiers:
- 'Operation :: Sequence alignment construction'
- 'Topic :: Sequence alignment'

parameters:
  estsequence:
    name: estsequence
    type: file
    required: true
    description: Spliced EST nucleotide sequence(s)
  sformat-estsequence:
    name: sformat_estsequence
    type: choice
    required: false
    choices:
      abi: abi
      ace: ace
      acedb: acedb
      bam: bam
      biomart: biomart
      clustal: clustal
      codata: codata
      dbid: dbid
      embl: embl
      ensembl: ensembl
      experiment: experiment
      fasta: fasta
      fastq: fastq
      fastq-illumina: fastq-illumina
      fastq-sanger: fastq-sanger
      fastq-solexa: fastq-solexa
      fitch: fitch
      gcg: gcg
      genbank: genbank
      genpept: genpept
      gff2: gff2
      gff3: gff3
      gifasta: gifasta
      hennig86: hennig86
      ig: ig
      igstrict: igstrict
      jackknifer: jackknifer
      mase: mase
      mega: mega
      msf: msf
      nbrf: nbrf
      nexus: nexus
      pdb: pdb
      pdbnuc: pdbnuc
      pdbnucseq: pdbnucseq
      pdbseq: pdbseq
      pearson: pearson
      phylip: phylip
      phylipnon: phylipnon
      raw: raw
      refseqp: refseqp
      sam: sam
      selex: selex
      staden: staden
      stockholm: stockholm
      strider: strider
      swiss: swiss
      text: text
      treecon: treecon
  sbegin-estsequence:
    name: sbegin_estsequence
    type: integer
    required: false
  send-estsequence:
    name: send_estsequence
    type: integer
    required: false
  sprotein-estsequence:
    name: sprotein_estsequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  snucleotide-estsequence:
    name: snucleotide_estsequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  sreverse-estsequence:
    name: sreverse_estsequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  slower-estsequence:
    name: slower_estsequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  supper-estsequence:
    name: supper_estsequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  genomesequence:
    name: genomesequence
    type: file
    required: true
    description: Unspliced genomic nucleotide sequence
  sformat-genomesequence:
    name: sformat_genomesequence
    type: choice
    required: false
    choices:
      abi: abi
      ace: ace
      acedb: acedb
      bam: bam
      biomart: biomart
      clustal: clustal
      codata: codata
      dbid: dbid
      embl: embl
      ensembl: ensembl
      experiment: experiment
      fasta: fasta
      fastq: fastq
      fastq-illumina: fastq-illumina
      fastq-sanger: fastq-sanger
      fastq-solexa: fastq-solexa
      fitch: fitch
      gcg: gcg
      genbank: genbank
      genpept: genpept
      gff2: gff2
      gff3: gff3
      gifasta: gifasta
      hennig86: hennig86
      ig: ig
      igstrict: igstrict
      jackknifer: jackknifer
      mase: mase
      mega: mega
      msf: msf
      nbrf: nbrf
      nexus: nexus
      pdb: pdb
      pdbnuc: pdbnuc
      pdbnucseq: pdbnucseq
      pdbseq: pdbseq
      pearson: pearson
      phylip: phylip
      phylipnon: phylipnon
      raw: raw
      refseqp: refseqp
      sam: sam
      selex: selex
      staden: staden
      stockholm: stockholm
      strider: strider
      swiss: swiss
      text: text
      treecon: treecon
  sbegin-genomesequence:
    name: sbegin_genomesequence
    type: integer
    required: false
  send-genomesequence:
    name: send_genomesequence
    type: integer
    required: false
  sprotein-genomesequence:
    name: sprotein_genomesequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  snucleotide-genomesequence:
    name: snucleotide_genomesequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  sreverse-genomesequence:
    name: sreverse_genomesequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  slower-genomesequence:
    name: slower_genomesequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  supper-genomesequence:
    name: supper_genomesequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  match:
    name: match
    type: integer
    required: false
    description: Score for matching two bases
  mismatch:
    name: mismatch
    type: integer
    required: false
    description: Cost for mismatching two bases
  gappenalty:
    name: gappenalty
    type: integer
    required: false
    description: "Gap penalty. Cost for deleting a single base in either sequence, excluding introns"
  intronpenalty:
    name: intronpenalty
    type: integer
    required: false
    description: "Intron penalty. Cost for an intron, independent of length."
  splicepenalty:
    name: splicepenalty
    type: integer
    required: false
    description: "Splice site penalty. Cost for an intron, independent of length and starting/ending on donor-acceptor sites"
  minscore:
    name: minscore
    type: integer
    required: false
    description: Minimum accepted score. Exclude alignments with scores below this threshold score.
  reverse:
    name: reverse
    type: choice
    required: false
    description: Reverse orientation. Reverse the orientation of the EST sequence
    choices:
      yes: Y
      no: N
  usesplice:
    name: usesplice
    type: choice
    required: false
    description: Use donor and acceptor splice sites. If you want to ignore donor-acceptor sites then set this to be false.
    choices:
      yes: Y
      no: N
  mode:
    name: mode
    type: text
    required: false
    description: "Comparison mode. This determines the comparison mode. The default value is 'both', in which case both strands of the est are compared assuming a forward gene direction (ie GT/AG splice sites), and the best comparison redone assuming a reversed (CT/AC) gene splicing direction. The other allowed modes are 'forward', when just the forward strand is searched, and 'reverse', ditto for the reverse strand."
  best:
    name: best
    type: choice
    required: false
    description: Print out only best alignment. You can print out all comparisons instead of just the best one by setting this to be false.
    choices:
      yes: Y
      no: N
  space:
    name: space
    type: decimal
    required: false
    description: Space threshold (in megabytes). For linear-space recursion. If product of sequence lengths divided by 4 exceeds this then a divide-and-conquer strategy is used to control the memory requirements. In this way very long sequences can be aligned. If you have a machine with plenty of memory you can raise this parameter (but do not exceed the machine's physical RAM)
  shuffle:
    name: shuffle
    type: integer
    required: false
    description: Shuffle
  seed:
    name: seed
    type: integer
    required: false
    description: Random number seed
  align:
    name: align
    type: choice
    required: false
    description: "Show the alignment. The alignment includes the first and last 5 bases of each intron, together with the intron width. The direction of splicing is indicated by angle brackets (forward or reverse) or ???? (unknown)."
    choices:
      yes: Y
      no: N
  width:
    name: width
    type: integer
    required: false
    description: Alignment width
  mode-both:
    name: mode_both
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  mode-forward:
    name: mode_forward
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  mode-reverse:
    name: mode_reverse
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  help:
    name: help
    type: choice
    required: false
    description: Help documentation of the tool.
    choices:
      yes: Y
      no: N

command: est2genome

args:
  estsequence:
    arg: -estsequence $(value)
    symlink: estsequence.dat
  sformat-estsequence:
    arg: -sformat1 $(value)
  sbegin-estsequence:
    arg: -sbegin1 $(value)
  send-estsequence:
    arg: -send1 $(value)
  sprotein-estsequence:
    arg: -sprotein1 $(value)
  snucleotide-estsequence:
    arg: -snucleotide1 $(value)
  sreverse-estsequence:
    arg: -sreverse1 $(value)
  slower-estsequence:
    arg: -slower1 $(value)
  supper-estsequence:
    arg: -supper1 $(value)
  genomesequence:
    arg: -genomesequence $(value)
    symlink: genomesequence.dat
  sformat-genomesequence:
    arg: -sformat2 $(value)
  sbegin-genomesequence:
    arg: -sbegin2 $(value)
  send-genomesequence:
    arg: -send2 $(value)
  sprotein-genomesequence:
    arg: -sprotein2 $(value)
  snucleotide-genomesequence:
    arg: -snucleotide2 $(value)
  sreverse-genomesequence:
    arg: -sreverse2 $(value)
  slower-genomesequence:
    arg: -slower2 $(value)
  supper-genomesequence:
    arg: -supper2 $(value)
  match:
    arg: -match $(value)
  mismatch:
    arg: -mismatch $(value)
  gappenalty:
    arg: -gappenalty $(value)
  intronpenalty:
    arg: -intronpenalty $(value)
  splicepenalty:
    arg: -splicepenalty $(value)
  minscore:
    arg: -minscore $(value)
  reverse:
    arg: -reverse $(value)
  usesplice:
    arg: -usesplice $(value)
  mode:
    arg: -mode $(value)
  best:
    arg: -best $(value)
  space:
    arg: -space $(value)
  shuffle:
    arg: -shuffle $(value)
  seed:
    arg: -seed $(value)
  align:
    arg: -align $(value)
  width:
    arg: -width $(value)
  mode-both:
    arg: -mode_both $(value)
  mode-forward:
    arg: -mode_forward $(value)
  mode-reverse:
    arg: -mode_reverse $(value)
  help:
    arg: -help $(value)
  _outfile:
    arg: -outfile $(value)
    default: outfile.est2genome

outputs:
  nucleic-acid-features:
    name: nucleic-acid-features
    path: outfile.est2genome
    media-type: text/plain
  log:
    name: log
    path: stdout
    media-type: text/plain
  error-log:
    name: error-log
    path: stderr
    media-type: text/plain

execution:
  runners:
    default:
      type: SlivkaQueueRunner
...
