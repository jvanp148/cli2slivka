---
slivka-version: 0.8.3
name: psiphi
description: Calculates phi and psi torsion angles from
                  protein coordinates
version: '6.6.0.0'
author: EMBOSS
license: GPL
classifiers:
- 'Operation :: Torsion angle calculation'
- 'Topic :: Protein structure analysis'

parameters:
  infile:
    name: infile
    type: text
    required: true
    description: Clean protein structure coordinates file
  chainnumber:
    name: chainnumber
    type: integer
    required: false
    description: Number of the chain for which torsion angles should be calculated
    min: 1
  startresiduenumber:
    name: startresiduenumber
    type: integer
    required: false
    description: First residue in chain for which torsion angles should be calculated
    min: 1
  finishresiduenumber:
    name: finishresiduenumber
    type: integer
    required: false
    description: Last residue in chain for which torsion angles should be calculated (1 = last residue)
  help:
    name: help
    type: choice
    required: false
    description: Help documentation of the tool.
    choices:
      yes: Y
      no: N

command: psiphi

args:
  infile:
    arg: -infile $(value)
  chainnumber:
    arg: -chainnumber $(value)
  startresiduenumber:
    arg: -startresiduenumber $(value)
  finishresiduenumber:
    arg: -finishresiduenumber $(value)
  help:
    arg: -help $(value)
  _outfile:
    arg: -outfile $(value)
    default: outfile.txt

outputs:
  outfile:
    name: outfile
    path: outfile.txt
    media-type: text/plain
  log:
    name: log
    path: stdout
    media-type: text/plain
  error-log:
    name: error-log
    path: stderr
    media-type: text/plain

execution:
  runners:
    default:
      type: SlivkaQueueRunner
...
