---
slivka-version: 0.8.3
name: cacheebeyesearch
description: Generate server cache file for EB-eye search domains
version: '6.6.0.0'
author: EMBOSS
license: GPL
classifiers:
- 'Operation :: Data retrieval (database metadata)'
- 'Topic :: Data handling'

parameters:
  help:
    name: help
    type: choice
    required: false
    description: Help documentation of the tool.
    choices:
      yes: Y
      no: N

command: cacheebeyesearch

args:
  help:
    arg: -help $(value)
  _cachefile:
    arg: -cachefile $(value)
    default: cachefile.txt
  _outfile:
    arg: -outfile $(value)
    default: outfile.txt

outputs:
  cachefile:
    name: cachefile
    path: cachefile.txt
    media-type: text/plain
  outfile:
    name: outfile
    path: outfile.txt
    media-type: text/plain
  log:
    name: log
    path: stdout
    media-type: text/plain
  error-log:
    name: error-log
    path: stderr
    media-type: text/plain

execution:
  runners:
    default:
      type: SlivkaQueueRunner
...
