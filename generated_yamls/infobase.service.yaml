---
slivka-version: 0.8.3
name: infobase
description: Return information on a given nucleotide base
version: '6.6.0.0'
author: EMBOSS
license: GPL
classifiers:
- 'Operation :: Analysis and processing'
- 'Topic :: Small molecules'

parameters:
  code:
    name: code
    type: text
    required: false
    description: "Nucleotide base code. Enter IUPAC nucleotide base codes, e.g. A, C, G, T, R, Y etc."
  help:
    name: help
    type: choice
    required: false
    description: Help documentation of the tool.
    choices:
      yes: Y
      no: N

command: infobase

args:
  code:
    arg: -code $(value)
  help:
    arg: -help $(value)
  _outfile:
    arg: -outfile $(value)
    default: outfile.out

outputs:
  nucleotide-base-annotation:
    name: nucleotide-base-annotation
    path: outfile.out
    media-type: text/plain
  log:
    name: log
    path: stdout
    media-type: text/plain
  error-log:
    name: error-log
    path: stderr
    media-type: text/plain

execution:
  runners:
    default:
      type: SlivkaQueueRunner
...
