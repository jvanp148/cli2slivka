---
slivka-version: 0.8.3
name: dbxuncompress
description: Uncompress a compressed dbx index
version: '6.6.0.0'
author: EMBOSS
license: GPL
classifiers:
- 'Operation :: Data index analysis'
- 'Topic :: Data handling'

parameters:
  dbname:
    name: dbname
    type: text
    required: true
    description: EMBOSS database name
  field:
    name: field
    type: text
    required: false
    description: EMBOSS database field
  help:
    name: help
    type: choice
    required: false
    description: Help documentation of the tool.
    choices:
      yes: Y
      no: N

command: dbxuncompress

args:
  dbname:
    arg: -dbname $(value)
  field:
    arg: -field $(value)
  help:
    arg: -help $(value)
  _outfile:
    arg: -outfile $(value)
    default: outfile.out

outputs:
  report:
    name: report
    path: outfile.out
    media-type: text/plain
  log:
    name: log
    path: stdout
    media-type: text/plain
  error-log:
    name: error-log
    path: stderr
    media-type: text/plain

execution:
  runners:
    default:
      type: SlivkaQueueRunner
...
