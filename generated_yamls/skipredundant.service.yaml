---
slivka-version: 0.8.3
name: skipredundant
description: Remove redundant sequences from an input set
version: '6.6.0.0'
author: EMBOSS
license: GPL
classifiers:
- 'Operation :: Sequence redundancy removal'
- 'Operation :: Pairwise sequence alignment construction'
- 'Operation :: Sequence file processing'
- 'Topic :: Data handling'

parameters:
  sequences:
    name: sequences
    type: file
    required: true
  sformat-sequences:
    name: sformat_sequences
    type: choice
    required: false
    choices:
      abi: abi
      ace: ace
      acedb: acedb
      bam: bam
      biomart: biomart
      clustal: clustal
      codata: codata
      dbid: dbid
      embl: embl
      ensembl: ensembl
      experiment: experiment
      fasta: fasta
      fastq: fastq
      fastq-illumina: fastq-illumina
      fastq-sanger: fastq-sanger
      fastq-solexa: fastq-solexa
      fitch: fitch
      gcg: gcg
      genbank: genbank
      genpept: genpept
      gff2: gff2
      gff3: gff3
      gifasta: gifasta
      hennig86: hennig86
      ig: ig
      igstrict: igstrict
      jackknifer: jackknifer
      mase: mase
      mega: mega
      msf: msf
      nbrf: nbrf
      nexus: nexus
      pdb: pdb
      pdbnuc: pdbnuc
      pdbnucseq: pdbnucseq
      pdbseq: pdbseq
      pearson: pearson
      phylip: phylip
      phylipnon: phylipnon
      raw: raw
      refseqp: refseqp
      sam: sam
      selex: selex
      staden: staden
      stockholm: stockholm
      strider: strider
      swiss: swiss
      text: text
      treecon: treecon
  sbegin-sequences:
    name: sbegin_sequences
    type: integer
    required: false
  send-sequences:
    name: send_sequences
    type: integer
    required: false
  sprotein-sequences:
    name: sprotein_sequences
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  snucleotide-sequences:
    name: snucleotide_sequences
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  sreverse-sequences:
    name: sreverse_sequences
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  slower-sequences:
    name: slower_sequences
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  supper-sequences:
    name: supper_sequences
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  mode:
    name: mode
    type: choice
    required: false
    description: "Redundancy removal options. This option specifies whether to remove redundancy at a single threshold percentage sequence similarity or remove redundancy outside a range of acceptable threshold percentage similarity. All permutations of pair-wise sequence alignments are calculated for each set of input sequences in turn using the EMBOSS implementation of the Needleman and Wunsch global alignment algorithm. Redundant sequences are removed in one of two modes as follows: (i) If a pair of proteins achieve greater than a threshold percentage sequence similarity (specified by the user) the shortest sequence is discarded. (ii) If a pair of proteins have a percentage sequence similarity that lies outside an acceptable range (specified by the user) the shortest sequence is discarded."
    choices:
      "1": "1"
      "2": "2"
  gapopen:
    name: gapopen
    type: decimal
    required: false
    description: "Gap opening penalty. The gap open penalty is the score taken away when a gap is created. The best value depends on the choice of comparison matrix. The default value assumes you are using the EBLOSUM62 matrix for protein sequences, and the EDNAFULL matrix for nucleotide sequences."
    min: 0.0
    max: 100.0
  gapextend:
    name: gapextend
    type: decimal
    required: false
    description: "Gap extension penalty. The gap extension, penalty is added to the standard gap penalty for each base or residue in the gap. This is how long gaps are penalized. Usually you will expect a few long gaps rather than many short gaps, so the gap extension penalty should be lower than the gap penalty. An exception is where one or both sequences are single reads with possible sequencing errors in which case you would expect many single base gaps. You can get this result by setting the gap open penalty to zero (or very low) and using the gap extension penalty to control gap scoring."
    min: 0.0
    max: 10.0
  feature:
    name: feature
    type: choice
    required: false
    description: Use feature information. Sequence feature information will be retained if this option is set.
    choices:
      yes: Y
      no: N
  datafile:
    name: datafile
    type: text
    required: false
    description: Matrix file. This is the scoring matrix file used when comparing sequences. By default it is the file 'EBLOSUM62' (for proteins) or the file 'EDNAFULL' (for nucleic sequences). These files are found in the 'data' directory of the EMBOSS installation.
  threshold:
    name: threshold
    type: decimal
    required: false
    description: The percentage sequence identity redundancy threshold. This option specifies the percentage sequence identity redundancy threshold. The percentage sequence identity redundancy threshold determines the redundancy calculation. If a pair of proteins achieve greater than this threshold the shortest sequence is discarded.
  minthreshold:
    name: minthreshold
    type: decimal
    required: false
    description: The % sequence identity redundancy threshold (lower limit). This option specifies the percentage sequence identity redundancy threshold (lower limit). The percentage sequence identity redundancy threshold determines the redundancy calculation. If a pair of proteins have a percentage sequence similarity that lies outside an acceptable range the shortest sequence is discarded.
  maxthreshold:
    name: maxthreshold
    type: decimal
    required: false
    description: The percentage sequence identity redundancy threshold (upper limit). This option specifies the percentage sequence identity redundancy threshold (upper limit). The percentage sequence identity redundancy threshold determines the redundancy calculation. If a pair of proteins have a percentage sequence similarity that lies outside an acceptable range the shortest sequence is discarded.
  osformat-outseq:
    name: osformat_outseq
    type: choice
    required: false
    description: Format of the output sequence (outseq)
    choices:
      acedb: acedb
      asn1: asn1
      bam: bam
      clustal: clustal
      codata: codata
      das: das
      dasdna: dasdna
      embl: embl
      experiment: experiment
      fasta: fasta
      fastq-illumina: fastq-illumina
      fastq-sanger: fastq-sanger
      fastq-solexa: fastq-solexa
      fitch: fitch
      gcg: gcg
      genbank: genbank
      genpept: genpept
      gff2: gff2
      gff3: gff3
      gifasta: gifasta
      hennig86: hennig86
      ig: ig
      jackknifer: jackknifer
      jackknifernon: jackknifernon
      mase: mase
      mega: mega
      meganon: meganon
      msf: msf
      nbrf: nbrf
      ncbi: ncbi
      nexus: nexus
      nexusnon: nexusnon
      phylip: phylip
      phylipnon: phylipnon
      pir: pir
      raw: raw
      refseq: refseq
      refseqp: refseqp
      sam: sam
      selex: selex
      staden: staden
      strider: strider
      swiss: swiss
      text: text
      treecon: treecon
  osformat-redundantoutseq:
    name: osformat_redundantoutseq
    type: choice
    required: false
    description: "Format for: Redundant sequences (optional)"
    choices:
      acedb: acedb
      asn1: asn1
      bam: bam
      clustal: clustal
      codata: codata
      das: das
      dasdna: dasdna
      embl: embl
      experiment: experiment
      fasta: fasta
      fastq-illumina: fastq-illumina
      fastq-sanger: fastq-sanger
      fastq-solexa: fastq-solexa
      fitch: fitch
      gcg: gcg
      genbank: genbank
      genpept: genpept
      gff2: gff2
      gff3: gff3
      gifasta: gifasta
      hennig86: hennig86
      ig: ig
      jackknifer: jackknifer
      jackknifernon: jackknifernon
      mase: mase
      mega: mega
      meganon: meganon
      msf: msf
      nbrf: nbrf
      ncbi: ncbi
      nexus: nexus
      nexusnon: nexusnon
      phylip: phylip
      phylipnon: phylipnon
      pir: pir
      raw: raw
      refseq: refseq
      refseqp: refseqp
      sam: sam
      selex: selex
      staden: staden
      strider: strider
      swiss: swiss
      text: text
      treecon: treecon
  help:
    name: help
    type: choice
    required: false
    description: Help documentation of the tool.
    choices:
      yes: Y
      no: N

command: skipredundant

args:
  sequences:
    arg: -sequences $(value)
    symlink: sequences.dat
  sformat-sequences:
    arg: -sformat1 $(value)
  sbegin-sequences:
    arg: -sbegin1 $(value)
  send-sequences:
    arg: -send1 $(value)
  sprotein-sequences:
    arg: -sprotein1 $(value)
  snucleotide-sequences:
    arg: -snucleotide1 $(value)
  sreverse-sequences:
    arg: -sreverse1 $(value)
  slower-sequences:
    arg: -slower1 $(value)
  supper-sequences:
    arg: -supper1 $(value)
  mode:
    arg: -mode $(value)
  gapopen:
    arg: -gapopen $(value)
  gapextend:
    arg: -gapextend $(value)
  feature:
    arg: -feature $(value)
  datafile:
    arg: -datafile $(value)
  threshold:
    arg: -threshold $(value)
  minthreshold:
    arg: -minthreshold $(value)
  maxthreshold:
    arg: -maxthreshold $(value)
  osformat-outseq:
    arg: -osformat_outseq $(value)
  osformat-redundantoutseq:
    arg: -osformat_redundantoutseq $(value)
  help:
    arg: -help $(value)
  _outseq:
    arg: -outseq $(value)
    default: outseq.keep
  _redundantoutseq:
    arg: -redundantoutseq $(value)
    default: redundantoutseq.redundant

outputs:
  outseq:
    name: outseq
    path: outseq.keep
    media-type: text/plain
  redundantoutseq:
    name: redundantoutseq
    path: redundantoutseq.redundant
    media-type: text/plain
  log:
    name: log
    path: stdout
    media-type: text/plain
  error-log:
    name: error-log
    path: stderr
    media-type: text/plain

execution:
  runners:
    default:
      type: SlivkaQueueRunner
...
