---
slivka-version: 0.8.3
name: checktrans
description: Report STOP codons and ORF statistics of a
                  protein
version: '6.6.0.0'
author: EMBOSS
license: GPL
classifiers:
- 'Operation :: Coding region prediction'
- 'Topic :: Translation'
- 'Topic :: Gene finding'

parameters:
  sequence:
    name: sequence
    type: file
    required: true
  sformat-sequence:
    name: sformat_sequence
    type: choice
    required: false
    choices:
      abi: abi
      ace: ace
      acedb: acedb
      bam: bam
      biomart: biomart
      clustal: clustal
      codata: codata
      dbid: dbid
      embl: embl
      ensembl: ensembl
      experiment: experiment
      fasta: fasta
      fastq: fastq
      fastq-illumina: fastq-illumina
      fastq-sanger: fastq-sanger
      fastq-solexa: fastq-solexa
      fitch: fitch
      gcg: gcg
      genbank: genbank
      genpept: genpept
      gff2: gff2
      gff3: gff3
      gifasta: gifasta
      hennig86: hennig86
      ig: ig
      igstrict: igstrict
      jackknifer: jackknifer
      mase: mase
      mega: mega
      msf: msf
      nbrf: nbrf
      nexus: nexus
      pdb: pdb
      pdbnuc: pdbnuc
      pdbnucseq: pdbnucseq
      pdbseq: pdbseq
      pearson: pearson
      phylip: phylip
      phylipnon: phylipnon
      raw: raw
      refseqp: refseqp
      sam: sam
      selex: selex
      staden: staden
      stockholm: stockholm
      strider: strider
      swiss: swiss
      text: text
      treecon: treecon
  sbegin-sequence:
    name: sbegin_sequence
    type: integer
    required: false
  send-sequence:
    name: send_sequence
    type: integer
    required: false
  sprotein-sequence:
    name: sprotein_sequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  snucleotide-sequence:
    name: snucleotide_sequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  sreverse-sequence:
    name: sreverse_sequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  slower-sequence:
    name: slower_sequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  supper-sequence:
    name: supper_sequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  orfml:
    name: orfml
    type: integer
    required: false
    description: Minimum ORF Length to report
    min: 1
  outfeat:
    name: outfeat
    type: text
    required: false
    description: File for output features
  addlast:
    name: addlast
    type: choice
    required: false
    description: "Force the sequence to end with an asterisk. An asterisk in the protein sequence indicates the position of a STOP codon. Checktrans assumes that all ORFs end in a STOP codon. Forcing the sequence to end with an asterisk, if there is not one there already, makes checktrans treat the end as a potential ORF. If an asterisk is added, it is not included in the reported count of STOPs."
    choices:
      yes: Y
      no: N
  outseq:
    name: outseq
    type: text
    required: false
    description: Returns sequence.
  osformat-outseq:
    name: osformat_outseq
    type: choice
    required: false
    description: Format of the output sequence (outseq)
    choices:
      acedb: acedb
      asn1: asn1
      bam: bam
      clustal: clustal
      codata: codata
      das: das
      dasdna: dasdna
      embl: embl
      experiment: experiment
      fasta: fasta
      fastq-illumina: fastq-illumina
      fastq-sanger: fastq-sanger
      fastq-solexa: fastq-solexa
      fitch: fitch
      gcg: gcg
      genbank: genbank
      genpept: genpept
      gff2: gff2
      gff3: gff3
      gifasta: gifasta
      hennig86: hennig86
      ig: ig
      jackknifer: jackknifer
      jackknifernon: jackknifernon
      mase: mase
      mega: mega
      meganon: meganon
      msf: msf
      nbrf: nbrf
      ncbi: ncbi
      nexus: nexus
      nexusnon: nexusnon
      phylip: phylip
      phylipnon: phylipnon
      pir: pir
      raw: raw
      refseq: refseq
      refseqp: refseqp
      sam: sam
      selex: selex
      staden: staden
      strider: strider
      swiss: swiss
      text: text
      treecon: treecon
  offormat-outfeat:
    name: offormat_outfeat
    type: choice
    required: false
    description: Format of the output features (outfeat)
    choices:
      gff: gff
      gff2: gff2
      embl: embl
      genbank: genbank
      ddbj: ddbj
      pir: pir
      swiss: swiss
      dasgff: dasgff
  help:
    name: help
    type: choice
    required: false
    description: Help documentation of the tool.
    choices:
      yes: Y
      no: N

command: checktrans

args:
  sequence:
    arg: -sequence $(value)
    symlink: sequence.dat
  sformat-sequence:
    arg: -sformat1 $(value)
  sbegin-sequence:
    arg: -sbegin1 $(value)
  send-sequence:
    arg: -send1 $(value)
  sprotein-sequence:
    arg: -sprotein1 $(value)
  snucleotide-sequence:
    arg: -snucleotide1 $(value)
  sreverse-sequence:
    arg: -sreverse1 $(value)
  slower-sequence:
    arg: -slower1 $(value)
  supper-sequence:
    arg: -supper1 $(value)
  orfml:
    arg: -orfml $(value)
  outfeat:
    arg: -outfeat $(value)
  addlast:
    arg: -addlast $(value)
  outseq:
    arg: -outseq $(value)
  osformat-outseq:
    arg: -osformat_outseq $(value)
  offormat-outfeat:
    arg: -offormat_outfeat $(value)
  help:
    arg: -help $(value)
  _outfile:
    arg: -outfile $(value)
    default: outfile.out

outputs:
  nucleic-acid-features:
    name: nucleic-acid-features
    path: outfile.out
    media-type: text/plain
  log:
    name: log
    path: stdout
    media-type: text/plain
  error-log:
    name: error-log
    path: stderr
    media-type: text/plain

execution:
  runners:
    default:
      type: SlivkaQueueRunner
...
