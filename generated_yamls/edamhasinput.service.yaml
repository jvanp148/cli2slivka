---
slivka-version: 0.8.3
name: edamhasinput
description: Find EDAM ontology terms by has_input relation
version: '6.6.0.0'
author: EMBOSS
license: GPL
classifiers:
- 'Operation :: Data retrieval'
- 'Topic :: Ontology'
- 'Topic :: Data search and retrieval'

parameters:
  identifier:
    name: identifier
    type: text
    required: false
    description: Identifier(s) to search for in ontology
  namespace:
    name: namespace
    type: text
    required: false
    description: EDAM namespace(s). By default all terms are returned. Searches can be limited to one or a few namespaces.
  sensitive:
    name: sensitive
    type: choice
    required: false
    description: "Increase sensitivity of search. By default, the query keywords are matched against the EDAM term names (and synonyms) only. This option also matches the keywords against the EDAM term definitions and will therefore (typically) report more matches."
    choices:
      yes: Y
      no: N
  subclasses:
    name: subclasses
    type: choice
    required: false
    description: Include subclasses of hits. Extend the query matches to include all terms which are specialisations (EDAM sub-classes) of the matched type.
    choices:
      yes: Y
      no: N
  obsolete:
    name: obsolete
    type: choice
    required: false
    description: Include obsolete terms. The default behaviour is to not use or return obsolete terms. This option if set will include all terms.
    choices:
      yes: Y
      no: N
  namespace-data:
    name: namespace_data
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  namespace-entity:
    name: namespace_entity
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  namespace-format:
    name: namespace_format
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  namespace-identifier:
    name: namespace_identifier
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  namespace-operation:
    name: namespace_operation
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  namespace-resource:
    name: namespace_resource
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  namespace-topic:
    name: namespace_topic
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  help:
    name: help
    type: choice
    required: false
    description: Help documentation of the tool.
    choices:
      yes: Y
      no: N

command: edamhasinput

args:
  identifier:
    arg: -identifier $(value)
  namespace:
    arg: -namespace $(value)
  sensitive:
    arg: -sensitive $(value)
  subclasses:
    arg: -subclasses $(value)
  obsolete:
    arg: -obsolete $(value)
  namespace-data:
    arg: -namespace_data $(value)
  namespace-entity:
    arg: -namespace_entity $(value)
  namespace-format:
    arg: -namespace_format $(value)
  namespace-identifier:
    arg: -namespace_identifier $(value)
  namespace-operation:
    arg: -namespace_operation $(value)
  namespace-resource:
    arg: -namespace_resource $(value)
  namespace-topic:
    arg: -namespace_topic $(value)
  help:
    arg: -help $(value)
  _outfile:
    arg: -outfile $(value)
    default: outfile.out

outputs:
  ontology-metadata:
    name: ontology-metadata
    path: outfile.out
    media-type: text/plain
  log:
    name: log
    path: stdout
    media-type: text/plain
  error-log:
    name: error-log
    path: stderr
    media-type: text/plain

execution:
  runners:
    default:
      type: SlivkaQueueRunner
...
