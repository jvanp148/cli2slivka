---
slivka-version: 0.8.3
name: taxgetup
description: Get parents of taxon(s)
version: '6.6.0.0'
author: EMBOSS
license: GPL
classifiers:
- 'Operation :: Data retrieval'
- 'Topic :: Taxonomy'

parameters:
  taxons:
    name: taxons
    type: text
    required: false
  hidden:
    name: hidden
    type: choice
    required: false
    description: Show taxons hidden in GenBank
    choices:
      yes: Y
      no: N
  help:
    name: help
    type: choice
    required: false
    description: Help documentation of the tool.
    choices:
      yes: Y
      no: N

command: taxgetup

args:
  taxons:
    arg: -taxons $(value)
  hidden:
    arg: -hidden $(value)
  help:
    arg: -help $(value)
  _outfile:
    arg: -outfile $(value)
    default: outfile.txt

outputs:
  outfile:
    name: outfile
    path: outfile.txt
    media-type: text/plain
  log:
    name: log
    path: stdout
    media-type: text/plain
  error-log:
    name: error-log
    path: stderr
    media-type: text/plain

execution:
  runners:
    default:
      type: SlivkaQueueRunner
...
