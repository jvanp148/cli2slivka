---
slivka-version: 0.8.3
name: sleep
description: Just sleep for a while
version: '1.0'
author: EMBOSS
license: GPL

parameters:
  interval:
    name: interval
    type: integer
    required: false
    description: Sleeping interval in seconds
  help:
    name: help
    type: choice
    required: false
    description: Help documentation of the tool.
    choices:
      yes: Y
      no: N

command: sleep

args:
  interval:
    arg: -interval $(value)
  help:
    arg: -help $(value)

outputs:
  log:
    name: log
    path: stdout
    media-type: text/plain
  error-log:
    name: error-log
    path: stderr
    media-type: text/plain

execution:
  runners:
    default:
      type: SlivkaQueueRunner
...
