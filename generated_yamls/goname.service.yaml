---
slivka-version: 0.8.3
name: goname
description: Find GO ontology terms by name
version: '6.6.0.0'
author: EMBOSS
license: GPL
classifiers:
- 'Operation :: Data retrieval'
- 'Topic :: Ontology'
- 'Topic :: Data search and retrieval'

parameters:
  query:
    name: query
    type: text
    required: false
    description: Name(s) to search for in ontology
  namespace:
    name: namespace
    type: text
    required: false
    description: GO namespace(s). By default all terms are returned. Searches can be limited to one or a few namespaces.
  subclasses:
    name: subclasses
    type: choice
    required: false
    description: Include subclasses of hits. Extend the query matches to include all terms which are specialisations (GO sub-classes) of the matched type.
    choices:
      yes: Y
      no: N
  obsolete:
    name: obsolete
    type: choice
    required: false
    description: Include obsolete terms. The default behaviour is to not use or return obsolete terms. This option if set will include all terms.
    choices:
      yes: Y
      no: N
  namespace-biological-process:
    name: namespace_biological_process
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  namespace-cellular-component:
    name: namespace_cellular_component
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  namespace-molecular-function:
    name: namespace_molecular_function
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  help:
    name: help
    type: choice
    required: false
    description: Help documentation of the tool.
    choices:
      yes: Y
      no: N

command: goname

args:
  query:
    arg: -query $(value)
  namespace:
    arg: -namespace $(value)
  subclasses:
    arg: -subclasses $(value)
  obsolete:
    arg: -obsolete $(value)
  namespace-biological-process:
    arg: -namespace_biological_process $(value)
  namespace-cellular-component:
    arg: -namespace_cellular_component $(value)
  namespace-molecular-function:
    arg: -namespace_molecular_function $(value)
  help:
    arg: -help $(value)
  _outfile:
    arg: -outfile $(value)
    default: outfile.txt

outputs:
  outfile:
    name: outfile
    path: outfile.txt
    media-type: text/plain
  log:
    name: log
    path: stdout
    media-type: text/plain
  error-log:
    name: error-log
    path: stderr
    media-type: text/plain

execution:
  runners:
    default:
      type: SlivkaQueueRunner
...
