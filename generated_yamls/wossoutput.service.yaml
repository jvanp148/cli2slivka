---
slivka-version: 0.8.3
name: wossoutput
description: Find programs by EDAM output data
version: '6.6.0.0'
author: EMBOSS
license: GPL
classifiers:
- 'Operation :: Data retrieval (tool metadata)'
- 'Topic :: Data handling'
- 'Topic :: Annotation'

parameters:
  identifier:
    name: identifier
    type: text
    required: false
    description: Identifier(s) to search for in ontology
  explode:
    name: explode
    type: choice
    required: false
    description: "Use the expanded group names. The groups that EMBOSS applications belong to have two forms, exploded and not exploded. The exploded group names are more numerous and often vaguely phrased than the non-exploded ones. The exploded names are formed from definitions of the group names that start like NAME1:NAME2 and which are then expanded into many combinations of the names as: 'NAME1', 'NAME2', 'NAME1 NAME2', NAME2 NAME1'. The non-expanded names are simply like: 'NAME1 NAME2'."
    choices:
      yes: Y
      no: N
  showkeywords:
    name: showkeywords
    type: choice
    required: false
    description: Show keywords with program documentation
    choices:
      yes: Y
      no: N
  sensitive:
    name: sensitive
    type: choice
    required: false
    description: "Increase sensitivity of search. By default, the query keywords are matched against the EDAM term names (and synonyms) only. This option also matches the keywords against the EDAM term definitions and will therefore (typically) report more matches."
    choices:
      yes: Y
      no: N
  subclasses:
    name: subclasses
    type: choice
    required: false
    description: Include subclasses of hits. Extend the query matches to include all terms which are specialisations (EDAM sub-classes) of the matched type.
    choices:
      yes: Y
      no: N
  obsolete:
    name: obsolete
    type: choice
    required: false
    description: Include obsolete terms. The default behaviour is to not use or return obsolete terms. This option if set will include all terms.
    choices:
      yes: Y
      no: N
  emboss:
    name: emboss
    type: choice
    required: false
    description: "Search the EMBOSS programs. If you use this option then EMBOSS program documentation will be searched. If this option is set to be false, then only the EMBASSY programs will be searched (if the -embassy option is true). EMBASSY programs are not strictly part of EMBOSS, but use the same code libraries and share the same look and feel, but are generally developed by people who wish the programs to be outside of the GNU Public Licence scheme"
    choices:
      yes: Y
      no: N
  embassy:
    name: embassy
    type: choice
    required: false
    description: "Search the EMBASSY programs. If you use this option then EMBASSY program documentation will be searched. If this option is set to be false, then only the EMBOSS programs will be searched (if the -emboss option is true). EMBASSY programs are not strictly part of EMBOSS, but use the same code libraries and share the same look and feel, but are generally developed by people who wish the programs to be outside of the GNU Public Licence scheme"
    choices:
      yes: Y
      no: N
  showembassy:
    name: showembassy
    type: text
    required: false
    description: "Show programs in one EMBASSY package. If you use this option then this EMBASSY package program documentation will be searched. EMBASSY programs are not strictly part of EMBOSS, but use the same code libraries and share the same look and feel, but are generally developed by people who wish the programs to be outside of the GNU Public Licence scheme"
  colon:
    name: colon
    type: choice
    required: false
    description: "Put a colon in the group name between two levels. The groups that EMBOSS applications belong to up to two levels, for example the primary group 'ALIGNMENT' has several sub-groups, or second-level groups, e.g.: CONSENSUS, DIFFERENCES, DOT PLOTS, GLOBAL, LOCAL, MULTIPLE. To aid programs that parse the output of wossname that require the names of these subgroups, a colon ':' will be placed between the first and second level of the group name if this option is true. Note: This does not apply if the group names have been exploded with the 'explode' option."
    choices:
      yes: Y
      no: N
  gui:
    name: gui
    type: choice
    required: false
    description: "Only report those applications that can run in a GUI. This option is intended to help those who are designing Graphical User Interfaces to the EMBOSS applications. Some EMBOSS programs are inappropriate for running in a GUI, these include other menu programs and interactive editors. This option allows you to only report those programs that can be run from a GUI"
    choices:
      yes: Y
      no: N
  html:
    name: html
    type: choice
    required: false
    description: "Format the output for HTML. If you are sending the output to a file, this will format it for displaying as a table in a WWW document."
    choices:
      yes: Y
      no: N
  groups:
    name: groups
    type: choice
    required: false
    description: "Output only the group names. If you use this option, then only the group names will be output to the file"
    choices:
      yes: Y
      no: N
  alphabetic:
    name: alphabetic
    type: choice
    required: false
    description: "Output an alphabetic list of programs. If you use this option, then you will get a single list of the program names and descriptions instead of the programs being listed in their functional groups."
    choices:
      yes: Y
      no: N
  help:
    name: help
    type: choice
    required: false
    description: Help documentation of the tool.
    choices:
      yes: Y
      no: N

command: wossoutput

args:
  identifier:
    arg: -identifier $(value)
  explode:
    arg: -explode $(value)
  showkeywords:
    arg: -showkeywords $(value)
  sensitive:
    arg: -sensitive $(value)
  subclasses:
    arg: -subclasses $(value)
  obsolete:
    arg: -obsolete $(value)
  emboss:
    arg: -emboss $(value)
  embassy:
    arg: -embassy $(value)
  showembassy:
    arg: -showembassy $(value)
  colon:
    arg: -colon $(value)
  gui:
    arg: -gui $(value)
  html:
    arg: -html $(value)
  groups:
    arg: -groups $(value)
  alphabetic:
    arg: -alphabetic $(value)
  help:
    arg: -help $(value)
  _outfile:
    arg: -outfile $(value)
    default: outfile.out

outputs:
  tool-metadata:
    name: tool-metadata
    path: outfile.out
    media-type: text/plain
  log:
    name: log
    path: stdout
    media-type: text/plain
  error-log:
    name: error-log
    path: stderr
    media-type: text/plain

execution:
  runners:
    default:
      type: SlivkaQueueRunner
...
