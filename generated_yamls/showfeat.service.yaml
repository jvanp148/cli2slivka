---
slivka-version: 0.8.3
name: showfeat
description: Display features of a sequence in pretty format
version: '6.6.0.0'
author: EMBOSS
license: GPL
classifiers:
- 'Operation :: Sequence rendering'
- 'Topic :: Data visualisation'
- 'Topic :: Sequence sites and features'

parameters:
  sequence:
    name: sequence
    type: file
    required: true
  sformat-sequence:
    name: sformat_sequence
    type: choice
    required: false
    choices:
      abi: abi
      ace: ace
      acedb: acedb
      bam: bam
      biomart: biomart
      clustal: clustal
      codata: codata
      dbid: dbid
      embl: embl
      ensembl: ensembl
      experiment: experiment
      fasta: fasta
      fastq: fastq
      fastq-illumina: fastq-illumina
      fastq-sanger: fastq-sanger
      fastq-solexa: fastq-solexa
      fitch: fitch
      gcg: gcg
      genbank: genbank
      genpept: genpept
      gff2: gff2
      gff3: gff3
      gifasta: gifasta
      hennig86: hennig86
      ig: ig
      igstrict: igstrict
      jackknifer: jackknifer
      mase: mase
      mega: mega
      msf: msf
      nbrf: nbrf
      nexus: nexus
      pdb: pdb
      pdbnuc: pdbnuc
      pdbnucseq: pdbnucseq
      pdbseq: pdbseq
      pearson: pearson
      phylip: phylip
      phylipnon: phylipnon
      raw: raw
      refseqp: refseqp
      sam: sam
      selex: selex
      staden: staden
      stockholm: stockholm
      strider: strider
      swiss: swiss
      text: text
      treecon: treecon
  sbegin-sequence:
    name: sbegin_sequence
    type: integer
    required: false
  send-sequence:
    name: send_sequence
    type: integer
    required: false
  sprotein-sequence:
    name: sprotein_sequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  snucleotide-sequence:
    name: snucleotide_sequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  sreverse-sequence:
    name: sreverse_sequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  slower-sequence:
    name: slower_sequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  supper-sequence:
    name: supper_sequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  sourcematch:
    name: sourcematch
    type: text
    required: false
    description: "Source of feature to display. By default any feature source in the feature table is shown. You can set this to match any feature source you wish to show. The source name is usually either the name of the program that detected the feature or it is the feature table (eg: EMBL) that the feature came from. The source may be wildcarded by using '*'. If you wish to show more than one source, separate their names with the character '|', eg: gene* | embl"
  typematch:
    name: typematch
    type: text
    required: false
    description: "Type of feature to display. By default any feature type in the feature table is shown. You can set this to match any feature type you wish to show. See http://www.ebi.ac.uk/embl/WebFeat/ for a list of the EMBL feature types and see Appendix A of the Swissprot user manual in http://www.expasy.org/sprot/userman.html for a list of the Swissprot feature types. The type may be wildcarded by using '*'. If you wish to show more than one type, separate their names with the character '|', eg: *UTR | intron"
  tagmatch:
    name: tagmatch
    type: text
    required: false
    description: "Tag of feature to display. Tags are the types of extra values that a feature may have. For example in the EMBL feature table, a 'CDS' type of feature may have the tags '/codon', '/codon_start', '/db_xref', '/EC_number', '/evidence', '/exception', '/function', '/gene', '/label', '/map', '/note', '/number', '/partial', '/product', '/protein_id', '/pseudo', '/standard_name', '/translation', '/transl_except', '/transl_table', or '/usedin'. Some of these tags also have values, for example '/gene' can have the value of the gene name. By default any feature tag in the feature table is shown. You can set this to match any feature tag you wish to show. The tag may be wildcarded by using '*'. If you wish to show more than one tag, separate their names with the character '|', eg: gene | label"
  valuematch:
    name: valuematch
    type: text
    required: false
    description: "Value of feature tags to display. Tag values are the values associated with a feature tag. Tags are the types of extra values that a feature may have. For example in the EMBL feature table, a 'CDS' type of feature may have the tags '/codon', '/codon_start', '/db_xref', '/EC_number', '/evidence', '/exception', '/function', '/gene', '/label', '/map', '/note', '/number', '/partial', '/product', '/protein_id', '/pseudo', '/standard_name', '/translation', '/transl_except', '/transl_table', or '/usedin'. Only some of these tags can have values, for example '/gene' can have the value of the gene name. By default any feature tag value in the feature table is shown. You can set this to match any feature tag value you wish to show. The tag value may be wildcarded by using '*'. If you wish to show more than one tag value, separate their names with the character '|', eg: pax* | 10"
  sort:
    name: sort
    type: choice
    required: false
    description: Sorting features
    choices:
      source: source
      start: start
      type: type
      nosort: nosort
  joinfeatures:
    name: joinfeatures
    type: choice
    required: false
    description: Join coding regions together
    choices:
      yes: Y
      no: N
  annotation:
    name: annotation
    type: text
    required: false
    description: "Regions to mark (eg: 4-57 promoter region 78-94 first exon). Regions to annotate by marking. If this is left blank, then no annotation is added. A set of regions is specified by a set of pairs of positions followed by optional text. The positions are integers. They are followed by any text (but not digits when on the command-line). Examples of region specifications are: 24-45 new domain 56-78 match to Mouse 1-100 First part 120-156 oligo A file of ranges to annotate (one range per line) can be specified as '@filename'."
  html:
    name: html
    type: choice
    required: false
    description: Use HTML formatting
    choices:
      yes: Y
      no: N
  id:
    name: id
    type: choice
    required: false
    description: Show sequence ID. Set this to be false if you do not wish to display the ID name of the sequence.
    choices:
      yes: Y
      no: N
  description:
    name: description
    type: choice
    required: false
    description: Show description. Set this to be false if you do not wish to display the description of the sequence.
    choices:
      yes: Y
      no: N
  scale:
    name: scale
    type: choice
    required: false
    description: Show scale line. Set this to be false if you do not wish to display the scale line.
    choices:
      yes: Y
      no: N
  width:
    name: width
    type: integer
    required: false
    description: "Width of graphics lines. You can expand (or contract) the width of the ASCII-character graphics display of the positions of the features using this value. For example, a width of 80 characters would cover a standard page width and a width a 10 characters would be nearly unreadable. If the width is set to less than 4, the graphics lines and the scale line will not be displayed."
    min: 0
  collapse:
    name: collapse
    type: choice
    required: false
    description: "Display features with the same type on one line. If this is set, then features from the same source and of the same type and sense are all printed on the same line. For instance if there are several features from the EMBL feature table (ie. the same source) which are all of type 'exon' in the same sense, then they will all be displayed on the same line. This makes it hard to distinguish overlapping features. If this is set to false then each feature is displayed on a separate line making it easier to distinguish where features start and end."
    choices:
      yes: Y
      no: N
  forward:
    name: forward
    type: choice
    required: false
    description: Display forward sense features. Set this to be false if you do not wish to display forward sense features.
    choices:
      yes: Y
      no: N
  reverse:
    name: reverse
    type: choice
    required: false
    description: Display reverse sense features. Set this to be false if you do not wish to display reverse sense features.
    choices:
      yes: Y
      no: N
  unknown:
    name: unknown
    type: choice
    required: false
    description: "Display unknown sense features. Set this to be false if you do not wish to display unknown sense features. (ie. features with no directionality - all protein features are of this type and some nucleic features (for example, CG-rich regions))."
    choices:
      yes: Y
      no: N
  strand:
    name: strand
    type: choice
    required: false
    description: "Display strand of features. Set this if you wish to display the strand of the features. Protein features are always directionless (indicated by '0'), forward is indicated by '+' and reverse is '-'."
    choices:
      yes: Y
      no: N
  sourceshow:
    name: sourceshow
    type: choice
    required: false
    description: "Display source of features. Set this if you wish to display the origin of the features. The source name is usually either the name of the program that detected the feature or it is the name of the feature table (eg: EMBL) that the feature came from."
    choices:
      yes: Y
      no: N
  position:
    name: position
    type: choice
    required: false
    description: "Display position of features. Set this if you wish to display the start and end position of the features. If several features are being displayed on the same line, then the start and end positions will be joined by a comma, for example: '189-189,225-225'."
    choices:
      yes: Y
      no: N
  typeshow:
    name: typeshow
    type: choice
    required: false
    description: Display type of features. Set this to be false if you do not wish to display the type of the features.
    choices:
      yes: Y
      no: N
  tagshow:
    name: tagshow
    type: choice
    required: false
    description: Display tags of features. Set this to be false if you do not wish to display the tags and values of the features.
    choices:
      yes: Y
      no: N
  valueshow:
    name: valueshow
    type: choice
    required: false
    description: "Display tag values of features. Set this to be false if you do not wish to display the tag values of the features. If this is set to be false, only the tag names will be displayed. If the tags are not displayed, then the values will not be displayed. The value of the 'translation' tag is never displayed as it is often extremely long."
    choices:
      yes: Y
      no: N
  stricttags:
    name: stricttags
    type: choice
    required: false
    description: "Only display the matching tags. By default if any tag/value pair in a feature matches the specified tag and value, then all the tags/value pairs of that feature will be displayed. If this is set to be true, then only those tag/value pairs in a feature that match the specified tag and value will be displayed."
    choices:
      yes: Y
      no: N
  help:
    name: help
    type: choice
    required: false
    description: Help documentation of the tool.
    choices:
      yes: Y
      no: N

command: showfeat

args:
  sequence:
    arg: -sequence $(value)
    symlink: sequence.dat
  sformat-sequence:
    arg: -sformat1 $(value)
  sbegin-sequence:
    arg: -sbegin1 $(value)
  send-sequence:
    arg: -send1 $(value)
  sprotein-sequence:
    arg: -sprotein1 $(value)
  snucleotide-sequence:
    arg: -snucleotide1 $(value)
  sreverse-sequence:
    arg: -sreverse1 $(value)
  slower-sequence:
    arg: -slower1 $(value)
  supper-sequence:
    arg: -supper1 $(value)
  sourcematch:
    arg: -sourcematch $(value)
  typematch:
    arg: -typematch $(value)
  tagmatch:
    arg: -tagmatch $(value)
  valuematch:
    arg: -valuematch $(value)
  sort:
    arg: -sort $(value)
  joinfeatures:
    arg: -joinfeatures $(value)
  annotation:
    arg: -annotation $(value)
  html:
    arg: -html $(value)
  id:
    arg: -id $(value)
  description:
    arg: -description $(value)
  scale:
    arg: -scale $(value)
  width:
    arg: -width $(value)
  collapse:
    arg: -collapse $(value)
  forward:
    arg: -forward $(value)
  reverse:
    arg: -reverse $(value)
  unknown:
    arg: -unknown $(value)
  strand:
    arg: -strand $(value)
  sourceshow:
    arg: -sourceshow $(value)
  position:
    arg: -position $(value)
  typeshow:
    arg: -typeshow $(value)
  tagshow:
    arg: -tagshow $(value)
  valueshow:
    arg: -valueshow $(value)
  stricttags:
    arg: -stricttags $(value)
  help:
    arg: -help $(value)
  _outfile:
    arg: -outfile $(value)
    default: outfile.showfeat

outputs:
  feature-record:
    name: feature-record
    path: outfile.showfeat
    media-type: text/plain
  log:
    name: log
    path: stdout
    media-type: text/plain
  error-log:
    name: error-log
    path: stderr
    media-type: text/plain

execution:
  runners:
    default:
      type: SlivkaQueueRunner
...
