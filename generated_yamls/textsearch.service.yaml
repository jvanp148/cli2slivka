---
slivka-version: 0.8.3
name: textsearch
description: Search the textual description of sequence(s)
version: '6.6.0.0'
author: EMBOSS
license: GPL
classifiers:
- 'Operation :: Sequence retrieval (by keyword)'
- 'Topic :: Data search and retrieval'

parameters:
  sequence:
    name: sequence
    type: file
    required: true
  sformat-sequence:
    name: sformat_sequence
    type: choice
    required: false
    choices:
      abi: abi
      ace: ace
      acedb: acedb
      bam: bam
      biomart: biomart
      clustal: clustal
      codata: codata
      dbid: dbid
      embl: embl
      ensembl: ensembl
      experiment: experiment
      fasta: fasta
      fastq: fastq
      fastq-illumina: fastq-illumina
      fastq-sanger: fastq-sanger
      fastq-solexa: fastq-solexa
      fitch: fitch
      gcg: gcg
      genbank: genbank
      genpept: genpept
      gff2: gff2
      gff3: gff3
      gifasta: gifasta
      hennig86: hennig86
      ig: ig
      igstrict: igstrict
      jackknifer: jackknifer
      mase: mase
      mega: mega
      msf: msf
      nbrf: nbrf
      nexus: nexus
      pdb: pdb
      pdbnuc: pdbnuc
      pdbnucseq: pdbnucseq
      pdbseq: pdbseq
      pearson: pearson
      phylip: phylip
      phylipnon: phylipnon
      raw: raw
      refseqp: refseqp
      sam: sam
      selex: selex
      staden: staden
      stockholm: stockholm
      strider: strider
      swiss: swiss
      text: text
      treecon: treecon
  sbegin-sequence:
    name: sbegin_sequence
    type: integer
    required: false
  send-sequence:
    name: send_sequence
    type: integer
    required: false
  sprotein-sequence:
    name: sprotein_sequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  snucleotide-sequence:
    name: snucleotide_sequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  sreverse-sequence:
    name: sreverse_sequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  slower-sequence:
    name: slower_sequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  supper-sequence:
    name: supper_sequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  pattern:
    name: pattern
    type: text
    required: true
    description: "Enter a pattern to search for. The search pattern is a regular expression. Use a | to indicate OR. For example: human|mouse will find text with either 'human' OR 'mouse' in the text"
  casesensitive:
    name: casesensitive
    type: choice
    required: false
    description: Do a case-sensitive search
    choices:
      yes: Y
      no: N
  html:
    name: html
    type: choice
    required: false
    description: Format output as an HTML table
    choices:
      yes: Y
      no: N
  only:
    name: only
    type: choice
    required: false
    description: "Display the specified columns. This is a way of shortening the command line if you only want a few things to be displayed. Instead of specifying: '-nohead -noname -nousa -noacc -nodesc' to get only the name output, you can specify '-only -name'"
    choices:
      yes: Y
      no: N
  heading:
    name: heading
    type: choice
    required: false
    description: Display column headings
    choices:
      yes: Y
      no: N
  usa:
    name: usa
    type: choice
    required: false
    description: Display the USA of the sequence
    choices:
      yes: Y
      no: N
  accession:
    name: accession
    type: choice
    required: false
    description: Display 'accession' column
    choices:
      yes: Y
      no: N
  name:
    name: name
    type: choice
    required: false
    description: Display 'name' column
    choices:
      yes: Y
      no: N
  description:
    name: description
    type: choice
    required: false
    description: Display 'description' column
    choices:
      yes: Y
      no: N
  help:
    name: help
    type: choice
    required: false
    description: Help documentation of the tool.
    choices:
      yes: Y
      no: N

command: textsearch

args:
  sequence:
    arg: -sequence $(value)
    symlink: sequence.dat
  sformat-sequence:
    arg: -sformat1 $(value)
  sbegin-sequence:
    arg: -sbegin1 $(value)
  send-sequence:
    arg: -send1 $(value)
  sprotein-sequence:
    arg: -sprotein1 $(value)
  snucleotide-sequence:
    arg: -snucleotide1 $(value)
  sreverse-sequence:
    arg: -sreverse1 $(value)
  slower-sequence:
    arg: -slower1 $(value)
  supper-sequence:
    arg: -supper1 $(value)
  pattern:
    arg: -pattern $(value)
  casesensitive:
    arg: -casesensitive $(value)
  html:
    arg: -html $(value)
  only:
    arg: -only $(value)
  heading:
    arg: -heading $(value)
  usa:
    arg: -usa $(value)
  accession:
    arg: -accession $(value)
  name:
    arg: -name $(value)
  description:
    arg: -description $(value)
  help:
    arg: -help $(value)
  _outfile:
    arg: -outfile $(value)
    default: outfile.out

outputs:
  sequence-metadata:
    name: sequence-metadata
    path: outfile.out
    media-type: text/plain
  log:
    name: log
    path: stdout
    media-type: text/plain
  error-log:
    name: error-log
    path: stderr
    media-type: text/plain

execution:
  runners:
    default:
      type: SlivkaQueueRunner
...
