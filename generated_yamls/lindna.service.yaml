---
slivka-version: 0.8.3
name: lindna
description: Draw linear maps of DNA constructs
version: '6.6.0.0'
author: EMBOSS
license: GPL
classifiers:
- 'Operation :: Map rendering'
- 'Topic :: Data visualisation'
- 'Topic :: Nucleic acid sequence analysis'

parameters:
  infile:
    name: infile
    type: text
    required: false
    description: Commands to the lindna drawing program file
  ruler:
    name: ruler
    type: choice
    required: false
    description: Draw a ruler
    choices:
      yes: Y
      no: N
  blocktype:
    name: blocktype
    type: text
    required: false
    description: Type of blocks
  graph-format:
    name: graph_format
    type: choice
    required: false
    description: Format of the graphical output
    choices:
      png: png
      colourps: colourps
  maxgroups:
    name: maxgroups
    type: integer
    required: false
    description: Maximum number of groups
    min: 1
  maxlabels:
    name: maxlabels
    type: integer
    required: false
    description: Maximum number of labels
    min: 1
  intersymbol:
    name: intersymbol
    type: text
    required: false
    description: Type of junctions between blocks
  intercolour:
    name: intercolour
    type: integer
    required: false
    description: Colour of junctions between blocks (enter a colour number)
    min: 0
    max: 15
  interticks:
    name: interticks
    type: choice
    required: false
    description: Horizontal junctions between ticks
    choices:
      yes: Y
      no: N
  gapsize:
    name: gapsize
    type: integer
    required: false
    description: Interval between ticks in the ruler. A zero value allows the application to choose a gap size
    min: 0
  ticklines:
    name: ticklines
    type: choice
    required: false
    description: Vertical lines at the ruler's ticks
    choices:
      yes: Y
      no: N
  textheight:
    name: textheight
    type: decimal
    required: false
    description: "Height of text multiplier. Height of text. Enter a number <1.0 or >1.0 to decrease or increase the size, respectively"
    min: 0.0
  textlength:
    name: textlength
    type: decimal
    required: false
    description: "Length of text multiplier. Length of text. Enter a number <1.0 or >1.0 to decrease or increase the size, respectively"
    min: 0.0
  margin:
    name: margin
    type: decimal
    required: false
    description: "Width of left margin multiplier. Width of left margin. This is the region left to the groups where the names of the groups are displayed. Enter a number <1.0 or >1.0 to decrease or increase the size, respectively"
    min: 0.0
  tickheight:
    name: tickheight
    type: decimal
    required: false
    description: "Height of ticks multiplier. Height of ticks. Enter a number <1.0 or >1.0 to decrease or increase the size, respectively"
    min: 0.0
  blockheight:
    name: blockheight
    type: decimal
    required: false
    description: "Height of blocks multilpier. Height of blocks. Enter a number <1.0 or >1.0 to decrease or increase the size, respectively"
    min: 0.0
  rangeheight:
    name: rangeheight
    type: decimal
    required: false
    description: "Height of range ends multiplier. Height of range ends. Enter a number <1.0 or >1.0 to decrease or increase the size, respectively"
    min: 0.0
  gapgroup:
    name: gapgroup
    type: decimal
    required: false
    description: "Space between groups mutliplier. Space between groups. Enter a number <1.0 or >1.0 to decrease or increase the size, respectively"
    min: 0.0
  postext:
    name: postext
    type: decimal
    required: false
    description: "Space between text and ticks, blocks, and ranges multiplier. Space between text and ticks, blocks, and ranges. Enter a number <1.0 or >1.0 to decrease or increase the size, respectively"
    min: 0.0
  blocktype-open:
    name: blocktype_Open
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  blocktype-filled:
    name: blocktype_Filled
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  blocktype-outline:
    name: blocktype_Outline
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  intersymbol-straight:
    name: intersymbol_Straight
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  intersymbol-up:
    name: intersymbol_Up
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  intersymbol-down:
    name: intersymbol_Down
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  intersymbol-no:
    name: intersymbol_No
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  help:
    name: help
    type: choice
    required: false
    description: Help documentation of the tool.
    choices:
      yes: Y
      no: N

command: lindna

args:
  infile:
    arg: -infile $(value)
  ruler:
    arg: -ruler $(value)
  blocktype:
    arg: -blocktype $(value)
  graph-format:
    arg: -graph_format $(value)
  maxgroups:
    arg: -maxgroups $(value)
  maxlabels:
    arg: -maxlabels $(value)
  intersymbol:
    arg: -intersymbol $(value)
  intercolour:
    arg: -intercolour $(value)
  interticks:
    arg: -interticks $(value)
  gapsize:
    arg: -gapsize $(value)
  ticklines:
    arg: -ticklines $(value)
  textheight:
    arg: -textheight $(value)
  textlength:
    arg: -textlength $(value)
  margin:
    arg: -margin $(value)
  tickheight:
    arg: -tickheight $(value)
  blockheight:
    arg: -blockheight $(value)
  rangeheight:
    arg: -rangeheight $(value)
  gapgroup:
    arg: -gapgroup $(value)
  postext:
    arg: -postext $(value)
  blocktype-open:
    arg: -blocktype_Open $(value)
  blocktype-filled:
    arg: -blocktype_Filled $(value)
  blocktype-outline:
    arg: -blocktype_Outline $(value)
  intersymbol-straight:
    arg: -intersymbol_Straight $(value)
  intersymbol-up:
    arg: -intersymbol_Up $(value)
  intersymbol-down:
    arg: -intersymbol_Down $(value)
  intersymbol-no:
    arg: -intersymbol_No $(value)
  help:
    arg: -help $(value)

outputs:
  log:
    name: log
    path: stdout
    media-type: text/plain
  error-log:
    name: error-log
    path: stderr
    media-type: text/plain

execution:
  runners:
    default:
      type: SlivkaQueueRunner
...
