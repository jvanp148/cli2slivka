---
slivka-version: 0.8.3
name: codcmp
description: Codon usage table comparison
version: '6.6.0.0'
author: EMBOSS
license: GPL
classifiers:
- 'Operation :: Codon usage table comparison'
- 'Topic :: Codon usage analysis'

parameters:
  first:
    name: first
    type: text
    required: true
    description: First codon usage file
  second:
    name: second
    type: text
    required: true
    description: Second codon usage file for comparison
  help:
    name: help
    type: choice
    required: false
    description: Help documentation of the tool.
    choices:
      yes: Y
      no: N

command: codcmp

args:
  first:
    arg: -first $(value)
  second:
    arg: -second $(value)
  help:
    arg: -help $(value)
  _outfile:
    arg: -outfile $(value)
    default: outfile.out

outputs:
  codon-usage-fraction-difference:
    name: codon-usage-fraction-difference
    path: outfile.out
    media-type: text/plain
  log:
    name: log
    path: stdout
    media-type: text/plain
  error-log:
    name: error-log
    path: stderr
    media-type: text/plain

execution:
  runners:
    default:
      type: SlivkaQueueRunner
...
