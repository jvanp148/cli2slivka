    arg: -rank_subspecies $(value)
  rank-subtribe:
    arg: -rank_subtribe $(value)
  rank-infraclass:
    arg: -rank_infraclass $(value)
  rank-infraorder:
    arg: -rank_infraorder $(value)
  rank-parvorder:
    arg: -rank_parvorder $(value)
  help:
    arg: -help $(value)
  _outfile:
    arg: -outfile $(value)
    default: outfile.txt

outputs:
  outfile:
    name: outfile
    path: outfile.txt
    media-type: text/plain
  log:
    name: log
    path: stdout
    media-type: text/plain
  error-log:
    name: error-log
    path: stderr
    media-type: text/plain

execution:
  runners:
    default:
      type: SlivkaQueueRunner
...
