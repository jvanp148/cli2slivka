---
slivka-version: 0.8.3
name: taxgetrank
description: Get parents of taxon(s)
version: '6.6.0.0'
author: EMBOSS
license: GPL
classifiers:
- 'Operation :: Data retrieval'
- 'Topic :: Taxonomy'

parameters:
  taxons:
    name: taxons
    type: text
    required: false
  rank:
    name: rank
    type: text
    required: false
    description: "Taxonomic rank(s). Multiple ranks can be specified, or '*' for all"
  hidden:
    name: hidden
    type: choice
    required: false
    description: Show taxons hidden in GenBank
    choices:
      yes: Y
      no: N
  rank-kingdom:
    name: rank_kingdom
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  rank-phylum:
    name: rank_phylum
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  rank-class:
    name: rank_class
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  rank-order:
    name: rank_order
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  rank-family:
    name: rank_family
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  rank-genus:
    name: rank_genus
    type: choice
    required: false
    choices:
      yes: Y
