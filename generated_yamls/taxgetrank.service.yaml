    type: choice
    required: false
    choices:
      yes: Y
      no: N
  rank-tribe:
    name: rank_tribe
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  rank-varietas:
    name: rank_varietas
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  rank-species-group:
    name: rank_species_group
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  rank-species-subgroup:
    name: rank_species_subgroup
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  rank-no-rank:
    name: rank_no_rank
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  rank-superkingdom:
    name: rank_superkingdom
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  rank-superphylum:
    name: rank_superphylum
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  rank-superclass:
    name: rank_superclass
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  rank-superorder:
    name: rank_superorder
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  rank-superfamily:
    name: rank_superfamily
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  rank-subkingdom:
    name: rank_subkingdom
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  rank-subphylum:
    name: rank_subphylum
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  rank-subclass:
    name: rank_subclass
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  rank-suborder:
    name: rank_suborder
    type: choice
    required: false
    choices:
      yes: Y
