    arg: -rank_species_group $(value)
  rank-species-subgroup:
    arg: -rank_species_subgroup $(value)
  rank-no-rank:
    arg: -rank_no_rank $(value)
  rank-superkingdom:
    arg: -rank_superkingdom $(value)
  rank-superphylum:
    arg: -rank_superphylum $(value)
  rank-superclass:
    arg: -rank_superclass $(value)
  rank-superorder:
    arg: -rank_superorder $(value)
  rank-superfamily:
    arg: -rank_superfamily $(value)
  rank-subkingdom:
    arg: -rank_subkingdom $(value)
  rank-subphylum:
    arg: -rank_subphylum $(value)
  rank-subclass:
    arg: -rank_subclass $(value)
  rank-suborder:
    arg: -rank_suborder $(value)
