    choices:
      yes: Y
      no: N

command: taxgetrank

args:
  taxons:
    arg: -taxons $(value)
  rank:
    arg: -rank $(value)
  hidden:
    arg: -hidden $(value)
  rank-kingdom:
    arg: -rank_kingdom $(value)
  rank-phylum:
    arg: -rank_phylum $(value)
