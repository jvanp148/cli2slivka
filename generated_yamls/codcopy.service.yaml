---
slivka-version: 0.8.3
name: codcopy
description: Copy and reformat a codon usage table
version: '6.6.0.0'
author: EMBOSS
license: GPL
classifiers:
- 'Operation :: Codon usage table reformatting'
- 'Topic :: Data search and retrieval'
- 'Topic :: Codon usage analysis'

parameters:
  infile:
    name: infile
    type: text
    required: true
  help:
    name: help
    type: choice
    required: false
    description: Help documentation of the tool.
    choices:
      yes: Y
      no: N

command: codcopy

args:
  infile:
    arg: -infile $(value)
  help:
    arg: -help $(value)
  _outfile:
    arg: -outfile $(value)
    default: outfile.txt

outputs:
  outfile:
    name: outfile
    path: outfile.txt
    media-type: text/plain
  log:
    name: log
    path: stdout
    media-type: text/plain
  error-log:
    name: error-log
    path: stderr
    media-type: text/plain

execution:
  runners:
    default:
      type: SlivkaQueueRunner
...
