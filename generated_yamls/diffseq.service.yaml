---
slivka-version: 0.8.3
name: diffseq
description: Compare and report features of two similar sequences
version: '6.6.0.0'
author: EMBOSS
license: GPL
classifiers:
- 'Operation :: Feature comparison'
- 'Topic :: Sequence sites and features'
- 'Topic :: Sequence alignment'

parameters:
  asequence:
    name: asequence
    type: file
    required: true
  sformat-asequence:
    name: sformat_asequence
    type: choice
    required: false
    choices:
      abi: abi
      ace: ace
      acedb: acedb
      bam: bam
      biomart: biomart
      clustal: clustal
      codata: codata
      dbid: dbid
      embl: embl
      ensembl: ensembl
      experiment: experiment
      fasta: fasta
      fastq: fastq
      fastq-illumina: fastq-illumina
      fastq-sanger: fastq-sanger
      fastq-solexa: fastq-solexa
      fitch: fitch
      gcg: gcg
      genbank: genbank
      genpept: genpept
      gff2: gff2
      gff3: gff3
      gifasta: gifasta
      hennig86: hennig86
      ig: ig
      igstrict: igstrict
      jackknifer: jackknifer
      mase: mase
      mega: mega
      msf: msf
      nbrf: nbrf
      nexus: nexus
      pdb: pdb
      pdbnuc: pdbnuc
      pdbnucseq: pdbnucseq
      pdbseq: pdbseq
      pearson: pearson
      phylip: phylip
      phylipnon: phylipnon
      raw: raw
      refseqp: refseqp
      sam: sam
      selex: selex
      staden: staden
      stockholm: stockholm
      strider: strider
      swiss: swiss
      text: text
      treecon: treecon
  sbegin-asequence:
    name: sbegin_asequence
    type: integer
    required: false
  send-asequence:
    name: send_asequence
    type: integer
    required: false
  sprotein-asequence:
    name: sprotein_asequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  snucleotide-asequence:
    name: snucleotide_asequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  sreverse-asequence:
    name: sreverse_asequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  slower-asequence:
    name: slower_asequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  supper-asequence:
    name: supper_asequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  bsequence:
    name: bsequence
    type: file
    required: true
  sformat-bsequence:
    name: sformat_bsequence
    type: choice
    required: false
    choices:
      abi: abi
      ace: ace
      acedb: acedb
      bam: bam
      biomart: biomart
      clustal: clustal
      codata: codata
      dbid: dbid
      embl: embl
      ensembl: ensembl
      experiment: experiment
      fasta: fasta
      fastq: fastq
      fastq-illumina: fastq-illumina
      fastq-sanger: fastq-sanger
      fastq-solexa: fastq-solexa
      fitch: fitch
      gcg: gcg
      genbank: genbank
      genpept: genpept
      gff2: gff2
      gff3: gff3
      gifasta: gifasta
      hennig86: hennig86
      ig: ig
      igstrict: igstrict
      jackknifer: jackknifer
      mase: mase
      mega: mega
      msf: msf
      nbrf: nbrf
      nexus: nexus
      pdb: pdb
      pdbnuc: pdbnuc
      pdbnucseq: pdbnucseq
      pdbseq: pdbseq
      pearson: pearson
      phylip: phylip
      phylipnon: phylipnon
      raw: raw
      refseqp: refseqp
      sam: sam
      selex: selex
      staden: staden
      stockholm: stockholm
      strider: strider
      swiss: swiss
      text: text
      treecon: treecon
  sbegin-bsequence:
    name: sbegin_bsequence
    type: integer
    required: false
  send-bsequence:
    name: send_bsequence
    type: integer
    required: false
  sprotein-bsequence:
    name: sprotein_bsequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  snucleotide-bsequence:
    name: snucleotide_bsequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  sreverse-bsequence:
    name: sreverse_bsequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  slower-bsequence:
    name: slower_bsequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  supper-bsequence:
    name: supper_bsequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  wordsize:
    name: wordsize
    type: integer
    required: false
    description: "Word size. The similar regions between the two sequences are found by creating a hash table of 'wordsize'd subsequences. 10 is a reasonable default. Making this value larger (20?) may speed up the program slightly, but will mean that any two differences within 'wordsize' of each other will be grouped as a single region of difference. This value may be made smaller (4?) to improve the resolution of nearby differences, but the program will go much slower."
    min: 2
  aoutfeat:
    name: aoutfeat
    type: text
    required: false
    description: File for output of first sequence's features
  boutfeat:
    name: boutfeat
    type: text
    required: false
    description: File for output of second sequence's features
  globaldifferences:
    name: globaldifferences
    type: choice
    required: false
    description: "Force reporting of differences at the start and end. Normally this program will find regions of identity that are the length of the specified word-size or greater and will then report the regions of difference between these matching regions. This works well and is what most people want if they are working with long overlapping nucleic acid sequences. You are usually not interested in the non-overlapping ends of these sequences. If you have protein sequences or short RNA sequences however, you will be interested in differences at the very ends . It this option is set to be true then the differences at the ends will also be reported."
    choices:
      yes: Y
      no: N
  offormat-aoutfeat:
    name: offormat_aoutfeat
    type: choice
    required: false
    description: Format of the output features (aoutfeat)
    choices:
      gff: gff
      gff2: gff2
      embl: embl
      genbank: genbank
      ddbj: ddbj
      pir: pir
      swiss: swiss
      dasgff: dasgff
  offormat-boutfeat:
    name: offormat_boutfeat
    type: choice
    required: false
    description: Format of the output features (boutfeat)
    choices:
      gff: gff
      gff2: gff2
      embl: embl
      genbank: genbank
      ddbj: ddbj
      pir: pir
      swiss: swiss
      dasgff: dasgff
  help:
    name: help
    type: choice
    required: false
    description: Help documentation of the tool.
    choices:
      yes: Y
      no: N

command: diffseq

args:
  asequence:
    arg: -asequence $(value)
    symlink: asequence.dat
  sformat-asequence:
    arg: -sformat1 $(value)
  sbegin-asequence:
    arg: -sbegin1 $(value)
  send-asequence:
    arg: -send1 $(value)
  sprotein-asequence:
    arg: -sprotein1 $(value)
  snucleotide-asequence:
    arg: -snucleotide1 $(value)
  sreverse-asequence:
    arg: -sreverse1 $(value)
  slower-asequence:
    arg: -slower1 $(value)
  supper-asequence:
    arg: -supper1 $(value)
  bsequence:
    arg: -bsequence $(value)
    symlink: bsequence.dat
  sformat-bsequence:
    arg: -sformat2 $(value)
  sbegin-bsequence:
    arg: -sbegin2 $(value)
  send-bsequence:
    arg: -send2 $(value)
  sprotein-bsequence:
    arg: -sprotein2 $(value)
  snucleotide-bsequence:
    arg: -snucleotide2 $(value)
  sreverse-bsequence:
    arg: -sreverse2 $(value)
  slower-bsequence:
    arg: -slower2 $(value)
  supper-bsequence:
    arg: -supper2 $(value)
  wordsize:
    arg: -wordsize $(value)
  aoutfeat:
    arg: -aoutfeat $(value)
  boutfeat:
    arg: -boutfeat $(value)
  globaldifferences:
    arg: -globaldifferences $(value)
  offormat-aoutfeat:
    arg: -offormat_aoutfeat $(value)
  offormat-boutfeat:
    arg: -offormat_boutfeat $(value)
  help:
    arg: -help $(value)
  _outfile:
    arg: -outfile $(value)
    default: outfile.out

outputs:
  feature-record:
    name: feature-record
    path: outfile.out
    media-type: text/plain
  log:
    name: log
    path: stdout
    media-type: text/plain
  error-log:
    name: error-log
    path: stderr
    media-type: text/plain

execution:
  runners:
    default:
      type: SlivkaQueueRunner
...
