---
slivka-version: 0.8.3
name: restrict
description: Report restriction enzyme cleavage sites in
                  a nucleotide sequence
version: '6.6.0.0'
author: EMBOSS
license: GPL
classifiers:
- 'Operation :: Restriction site recognition'
- 'Topic :: Nucleic acid restriction'

parameters:
  sequence:
    name: sequence
    type: file
    required: true
  sformat-sequence:
    name: sformat_sequence
    type: choice
    required: false
    choices:
      abi: abi
      ace: ace
      acedb: acedb
      bam: bam
      biomart: biomart
      clustal: clustal
      codata: codata
      dbid: dbid
      embl: embl
      ensembl: ensembl
      experiment: experiment
      fasta: fasta
      fastq: fastq
      fastq-illumina: fastq-illumina
      fastq-sanger: fastq-sanger
      fastq-solexa: fastq-solexa
      fitch: fitch
      gcg: gcg
      genbank: genbank
      genpept: genpept
      gff2: gff2
      gff3: gff3
      gifasta: gifasta
      hennig86: hennig86
      ig: ig
      igstrict: igstrict
      jackknifer: jackknifer
      mase: mase
      mega: mega
      msf: msf
      nbrf: nbrf
      nexus: nexus
      pdb: pdb
      pdbnuc: pdbnuc
      pdbnucseq: pdbnucseq
      pdbseq: pdbseq
      pearson: pearson
      phylip: phylip
      phylipnon: phylipnon
      raw: raw
      refseqp: refseqp
      sam: sam
      selex: selex
      staden: staden
      stockholm: stockholm
      strider: strider
      swiss: swiss
      text: text
      treecon: treecon
  sbegin-sequence:
    name: sbegin_sequence
    type: integer
    required: false
  send-sequence:
    name: send_sequence
    type: integer
    required: false
  sprotein-sequence:
    name: sprotein_sequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  snucleotide-sequence:
    name: snucleotide_sequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  sreverse-sequence:
    name: sreverse_sequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  slower-sequence:
    name: slower_sequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  supper-sequence:
    name: supper_sequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  sitelen:
    name: sitelen
    type: integer
    required: false
    description: Minimum recognition site length. This sets the minimum length of the restriction enzyme recognition site. Any enzymes with sites shorter than this will be ignored.
    min: 2
    max: 20
  enzymes:
    name: enzymes
    type: text
    required: false
    description: "Comma separated enzyme list. The name 'all' reads in all enzyme names from the REBASE database. You can specify enzymes by giving their names with commas between then, such as: 'HincII,hinfI,ppiI,hindiii'. The case of the names is not important. You can specify a file of enzyme names to read in by giving the name of the file holding the enzyme names with a '@' character in front of it, for example, '@enz.list'. Blank lines and lines starting with a hash character or '!' are ignored and all other lines are concatenated together with a comma character ',' and then treated as the list of enzymes to search for. An example of a file of enzyme names is: ! my enzymes HincII, ppiII ! other enzymes hindiii HinfI PpiI"
  datafile:
    name: datafile
    type: text
    required: false
    description: Restriction enzyme data file (optional)
  mfile:
    name: mfile
    type: text
    required: false
    description: Restriction enzyme methylation data file
  min:
    name: min
    type: integer
    required: false
    description: Minimum cuts per RE. This sets the minimum number of cuts for any restriction enzyme that will be considered. Any enzymes that cut fewer times than this will be ignored.
    min: 1
    max: 1000
  max:
    name: max
    type: integer
    required: false
    description: Maximum cuts per RE. This sets the maximum number of cuts for any restriction enzyme that will be considered. Any enzymes that cut more times than this will be ignored.
  solofragment:
    name: solofragment
    type: choice
    required: false
    description: List individual enzymes with their fragments. This gives the fragment lengths of the forward sense strand produced by complete restriction by each restriction enzyme on its own. Results are added to the tail section of the report.
    choices:
      yes: Y
      no: N
  single:
    name: single
    type: choice
    required: false
    description: Force single site only cuts. If this is set then this forces the values of the mincuts and maxcuts qualifiers to both be 1. Any other value you may have set them to will be ignored.
    choices:
      yes: Y
      no: N
  blunt:
    name: blunt
    type: choice
    required: false
    description: Allow blunt end cutters. This allows those enzymes which cut at the same position on the forward and reverse strands to be considered.
    choices:
      yes: Y
      no: N
  sticky:
    name: sticky
    type: choice
    required: false
    description: "Allow sticky end cutters. This allows those enzymes which cut at different positions on the forward and reverse strands, leaving an overhang, to be considered."
    choices:
      yes: Y
      no: N
  ambiguity:
    name: ambiguity
    type: choice
    required: false
    description: Allow ambiguous matches. This allows those enzymes which have one or more 'N' ambiguity codes in their pattern to be considered
    choices:
      yes: Y
      no: N
  plasmid:
    name: plasmid
    type: choice
    required: false
    description: Allow circular DNA. If this is set then this allows searches for restriction enzyme recognition site and cut positions that span the end of the sequence to be considered.
    choices:
      yes: Y
      no: N
  methylation:
    name: methylation
    type: choice
    required: false
    description: Use methylation data. If this is set then RE recognition sites will not match methylated bases.
    choices:
      yes: Y
      no: N
  commercial:
    name: commercial
    type: choice
    required: false
    description: "Only enzymes with suppliers. If this is set, then only those enzymes with a commercial supplier will be searched for. This qualifier is ignored if you have specified an explicit list of enzymes to search for, rather than searching through 'all' the enzymes in the REBASE database. It is assumed that, if you are asking for an explicit enzyme, then you probably know where to get it from and so all enzymes names that you have asked to be searched for, and which cut, will be reported whether or not they have a commercial supplier."
    choices:
      yes: Y
      no: N
  limit:
    name: limit
    type: choice
    required: false
    description: "Limits reports to one isoschizomer. This limits the reporting of enzymes to just one enzyme from each group of isoschizomers. The enzyme chosen to represent an isoschizomer group is the prototype indicated in the data file 'embossre.equ', which is created by the program 'rebaseextract'. If you prefer different prototypes to be used, make a copy of embossre.equ in your home directory and edit it. If this value is set to be false then all of the input enzymes will be reported. You might like to set this to false if you are supplying an explicit set of enzymes rather than searching 'all' of them."
    choices:
      yes: Y
      no: N
  alphabetic:
    name: alphabetic
    type: choice
    required: false
    description: Sort output alphabetically
    choices:
      yes: Y
      no: N
  fragments:
    name: fragments
    type: choice
    required: false
    description: Show fragment lengths. This gives the fragment lengths of the forward sense strand produced by complete restriction using all of the input enzymes together. Results are added to the tail section of the report.
    choices:
      yes: Y
      no: N
  help:
    name: help
    type: choice
    required: false
    description: Help documentation of the tool.
    choices:
      yes: Y
      no: N

command: restrict

args:
  sequence:
    arg: -sequence $(value)
    symlink: sequence.dat
  sformat-sequence:
    arg: -sformat1 $(value)
  sbegin-sequence:
    arg: -sbegin1 $(value)
  send-sequence:
    arg: -send1 $(value)
  sprotein-sequence:
    arg: -sprotein1 $(value)
  snucleotide-sequence:
    arg: -snucleotide1 $(value)
  sreverse-sequence:
    arg: -sreverse1 $(value)
  slower-sequence:
    arg: -slower1 $(value)
  supper-sequence:
    arg: -supper1 $(value)
  sitelen:
    arg: -sitelen $(value)
  enzymes:
    arg: -enzymes $(value)
  datafile:
    arg: -datafile $(value)
  mfile:
    arg: -mfile $(value)
  min:
    arg: -min $(value)
  max:
    arg: -max $(value)
  solofragment:
    arg: -solofragment $(value)
  single:
    arg: -single $(value)
  blunt:
    arg: -blunt $(value)
  sticky:
    arg: -sticky $(value)
  ambiguity:
    arg: -ambiguity $(value)
  plasmid:
    arg: -plasmid $(value)
  methylation:
    arg: -methylation $(value)
  commercial:
    arg: -commercial $(value)
  limit:
    arg: -limit $(value)
  alphabetic:
    arg: -alphabetic $(value)
  fragments:
    arg: -fragments $(value)
  help:
    arg: -help $(value)
  _outfile:
    arg: -outfile $(value)
    default: outfile.txt

outputs:
  outfile:
    name: outfile
    path: outfile.txt
    media-type: text/plain
  log:
    name: log
    path: stdout
    media-type: text/plain
  error-log:
    name: error-log
    path: stderr
    media-type: text/plain

execution:
  runners:
    default:
      type: SlivkaQueueRunner
...
