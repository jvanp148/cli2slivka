---
slivka-version: 0.8.3
name: polydot
description: Draw dotplots for all-against-all comparison of a
                  sequence set
version: '6.6.0.0'
author: EMBOSS
license: GPL
classifiers:
- 'Operation :: Dotplot plotting'
- 'Topic :: Sequence comparison'

parameters:
  sequences:
    name: sequences
    type: file
    required: true
    description: File containing a sequence alignment
  sformat-sequences:
    name: sformat_sequences
    type: choice
    required: false
    choices:
      abi: abi
      ace: ace
      acedb: acedb
      bam: bam
      biomart: biomart
      clustal: clustal
      codata: codata
      dbid: dbid
      embl: embl
      ensembl: ensembl
      experiment: experiment
      fasta: fasta
      fastq: fastq
      fastq-illumina: fastq-illumina
      fastq-sanger: fastq-sanger
      fastq-solexa: fastq-solexa
      fitch: fitch
      gcg: gcg
      genbank: genbank
      genpept: genpept
      gff2: gff2
      gff3: gff3
      gifasta: gifasta
      hennig86: hennig86
      ig: ig
      igstrict: igstrict
      jackknifer: jackknifer
      mase: mase
      mega: mega
      msf: msf
      nbrf: nbrf
      nexus: nexus
      pdb: pdb
      pdbnuc: pdbnuc
      pdbnucseq: pdbnucseq
      pdbseq: pdbseq
      pearson: pearson
      phylip: phylip
      phylipnon: phylipnon
      raw: raw
      refseqp: refseqp
      sam: sam
      selex: selex
      staden: staden
      stockholm: stockholm
      strider: strider
      swiss: swiss
      text: text
      treecon: treecon
  sbegin-sequences:
    name: sbegin_sequences
    type: integer
    required: false
  send-sequences:
    name: send_sequences
    type: integer
    required: false
  sprotein-sequences:
    name: sprotein_sequences
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  snucleotide-sequences:
    name: snucleotide_sequences
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  sreverse-sequences:
    name: sreverse_sequences
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  slower-sequences:
    name: slower_sequences
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  supper-sequences:
    name: supper_sequences
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  wordsize:
    name: wordsize
    type: integer
    required: false
    description: Word size
    min: 2
  outfeat:
    name: outfeat
    type: text
    required: false
  graph-format:
    name: graph_format
    type: choice
    required: false
    description: Format of the graphical output
    choices:
      png: png
      colourps: colourps
  gap:
    name: gap
    type: integer
    required: false
    description: "Gap (in residues) between dotplots. This specifies the size of the gap that is used to separate the individual dotplots in the display. The size is measured in residues, as displayed in the output."
    min: 0
  boxit:
    name: boxit
    type: choice
    required: false
    description: Draw a box around each dotplot
    choices:
      yes: Y
      no: N
  dumpfeat:
    name: dumpfeat
    type: choice
    required: false
    description: Dump all matches as feature files
    choices:
      yes: Y
      no: N
  offormat-outfeat:
    name: offormat_outfeat
    type: choice
    required: false
    description: Format of the output features (outfeat)
    choices:
      gff: gff
      gff2: gff2
      embl: embl
      genbank: genbank
      ddbj: ddbj
      pir: pir
      swiss: swiss
      dasgff: dasgff
  graphics-in-postscript:
    name: Graphics_in_Postscript
    type: text
    required: false
  graphics-in-png:
    name: Graphics_in_PNG
    type: text
    required: false
  help:
    name: help
    type: choice
    required: false
    description: Help documentation of the tool.
    choices:
      yes: Y
      no: N

command: polydot

args:
  sequences:
    arg: -sequences $(value)
    symlink: sequences.dat
  sformat-sequences:
    arg: -sformat1 $(value)
  sbegin-sequences:
    arg: -sbegin1 $(value)
  send-sequences:
    arg: -send1 $(value)
  sprotein-sequences:
    arg: -sprotein1 $(value)
  snucleotide-sequences:
    arg: -snucleotide1 $(value)
  sreverse-sequences:
    arg: -sreverse1 $(value)
  slower-sequences:
    arg: -slower1 $(value)
  supper-sequences:
    arg: -supper1 $(value)
  wordsize:
    arg: -wordsize $(value)
  outfeat:
    arg: -outfeat $(value)
  graph-format:
    arg: -graph_format $(value)
  gap:
    arg: -gap $(value)
  boxit:
    arg: -boxit $(value)
  dumpfeat:
    arg: -dumpfeat $(value)
  offormat-outfeat:
    arg: -offormat_outfeat $(value)
  graphics-in-postscript:
    arg: -Graphics_in_Postscript $(value)
  graphics-in-png:
    arg: -Graphics_in_PNG $(value)
  help:
    arg: -help $(value)
  _outfile:
    arg: -outfile $(value)
    default: outfile.out

outputs:
  output:
    name: output
    path: outfile.out
    media-type: text/plain
  log:
    name: log
    path: stdout
    media-type: text/plain
  error-log:
    name: error-log
    path: stderr
    media-type: text/plain

execution:
  runners:
    default:
      type: SlivkaQueueRunner
...
