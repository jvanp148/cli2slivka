---
slivka-version: 0.8.3
name: listor
description: Write a list file of the logical OR of two
                  sets of sequences
version: '6.6.0.0'
author: EMBOSS
license: GPL
classifiers:
- 'Operation :: Listfile processing'
- 'Topic :: Data handling'

parameters:
  firstsequences:
    name: firstsequences
    type: file
    required: true
  sformat-firstsequences:
    name: sformat_firstsequences
    type: choice
    required: false
    choices:
      abi: abi
      ace: ace
      acedb: acedb
      bam: bam
      biomart: biomart
      clustal: clustal
      codata: codata
      dbid: dbid
      embl: embl
      ensembl: ensembl
      experiment: experiment
      fasta: fasta
      fastq: fastq
      fastq-illumina: fastq-illumina
      fastq-sanger: fastq-sanger
      fastq-solexa: fastq-solexa
      fitch: fitch
      gcg: gcg
      genbank: genbank
      genpept: genpept
      gff2: gff2
      gff3: gff3
      gifasta: gifasta
      hennig86: hennig86
      ig: ig
      igstrict: igstrict
      jackknifer: jackknifer
      mase: mase
      mega: mega
      msf: msf
      nbrf: nbrf
      nexus: nexus
      pdb: pdb
      pdbnuc: pdbnuc
      pdbnucseq: pdbnucseq
      pdbseq: pdbseq
      pearson: pearson
      phylip: phylip
      phylipnon: phylipnon
      raw: raw
      refseqp: refseqp
      sam: sam
      selex: selex
      staden: staden
      stockholm: stockholm
      strider: strider
      swiss: swiss
      text: text
      treecon: treecon
  sbegin-firstsequences:
    name: sbegin_firstsequences
    type: integer
    required: false
  send-firstsequences:
    name: send_firstsequences
    type: integer
    required: false
  sprotein-firstsequences:
    name: sprotein_firstsequences
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  snucleotide-firstsequences:
    name: snucleotide_firstsequences
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  sreverse-firstsequences:
    name: sreverse_firstsequences
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  slower-firstsequences:
    name: slower_firstsequences
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  supper-firstsequences:
    name: supper_firstsequences
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  secondsequences:
    name: secondsequences
    type: file
    required: true
  sformat-secondsequences:
    name: sformat_secondsequences
    type: choice
    required: false
    choices:
      abi: abi
      ace: ace
      acedb: acedb
      bam: bam
      biomart: biomart
      clustal: clustal
      codata: codata
      dbid: dbid
      embl: embl
      ensembl: ensembl
      experiment: experiment
      fasta: fasta
      fastq: fastq
      fastq-illumina: fastq-illumina
      fastq-sanger: fastq-sanger
      fastq-solexa: fastq-solexa
      fitch: fitch
      gcg: gcg
      genbank: genbank
      genpept: genpept
      gff2: gff2
      gff3: gff3
      gifasta: gifasta
      hennig86: hennig86
      ig: ig
      igstrict: igstrict
      jackknifer: jackknifer
      mase: mase
      mega: mega
      msf: msf
      nbrf: nbrf
      nexus: nexus
      pdb: pdb
      pdbnuc: pdbnuc
      pdbnucseq: pdbnucseq
      pdbseq: pdbseq
      pearson: pearson
      phylip: phylip
      phylipnon: phylipnon
      raw: raw
      refseqp: refseqp
      sam: sam
      selex: selex
      staden: staden
      stockholm: stockholm
      strider: strider
      swiss: swiss
      text: text
      treecon: treecon
  sbegin-secondsequences:
    name: sbegin_secondsequences
    type: integer
    required: false
  send-secondsequences:
    name: send_secondsequences
    type: integer
    required: false
  sprotein-secondsequences:
    name: sprotein_secondsequences
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  snucleotide-secondsequences:
    name: snucleotide_secondsequences
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  sreverse-secondsequences:
    name: sreverse_secondsequences
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  slower-secondsequences:
    name: slower_secondsequences
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  supper-secondsequences:
    name: supper_secondsequences
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  operator:
    name: operator
    type: choice
    required: false
    description: "Logical operator to combine sequence lists. The following logical operators combine the sequences in the following ways: OR - gives all that occur in one set or the other AND - gives only those which occur in both sets XOR - gives those which only occur in one set or the other, but not in both NOT - gives those which occur in the first set except for those that also occur in the second"
    choices:
      OR: OR
      AND: AND
      XOR: XOR
      NOT: NOT
  help:
    name: help
    type: choice
    required: false
    description: Help documentation of the tool.
    choices:
      yes: Y
      no: N

command: listor

args:
  firstsequences:
    arg: -firstsequences $(value)
    symlink: firstsequences.dat
  sformat-firstsequences:
    arg: -sformat1 $(value)
  sbegin-firstsequences:
    arg: -sbegin1 $(value)
  send-firstsequences:
    arg: -send1 $(value)
  sprotein-firstsequences:
    arg: -sprotein1 $(value)
  snucleotide-firstsequences:
    arg: -snucleotide1 $(value)
  sreverse-firstsequences:
    arg: -sreverse1 $(value)
  slower-firstsequences:
    arg: -slower1 $(value)
  supper-firstsequences:
    arg: -supper1 $(value)
  secondsequences:
    arg: -secondsequences $(value)
    symlink: secondsequences.dat
  sformat-secondsequences:
    arg: -sformat2 $(value)
  sbegin-secondsequences:
    arg: -sbegin2 $(value)
  send-secondsequences:
    arg: -send2 $(value)
  sprotein-secondsequences:
    arg: -sprotein2 $(value)
  snucleotide-secondsequences:
    arg: -snucleotide2 $(value)
  sreverse-secondsequences:
    arg: -sreverse2 $(value)
  slower-secondsequences:
    arg: -slower2 $(value)
  supper-secondsequences:
    arg: -supper2 $(value)
  operator:
    arg: -operator $(value)
  help:
    arg: -help $(value)
  _outfile:
    arg: -outfile $(value)
    default: outfile.list

outputs:
  outfile:
    name: outfile
    path: outfile.list
    media-type: text/plain
  log:
    name: log
    path: stdout
    media-type: text/plain
  error-log:
    name: error-log
    path: stderr
    media-type: text/plain

execution:
  runners:
    default:
      type: SlivkaQueueRunner
...
