---
slivka-version: 0.8.3
name: mwcontam
description: Find weights common to multiple molecular weights files
version: '6.6.0.0'
author: EMBOSS
license: GPL
classifiers:
- 'Operation :: Protein molecular weight calculation'
- 'Topic :: Sequence composition analysis'
- 'Topic :: Protein and peptide identification'

parameters:
  tolerance:
    name: tolerance
    type: decimal
    required: false
    description: Ppm tolerance
  help:
    name: help
    type: choice
    required: false
    description: Help documentation of the tool.
    choices:
      yes: Y
      no: N

command: mwcontam

args:
  tolerance:
    arg: -tolerance $(value)
  help:
    arg: -help $(value)
  _outfile:
    arg: -outfile $(value)
    default: outfile.mwcontam

outputs:
  outfile:
    name: outfile
    path: outfile.mwcontam
    media-type: text/plain
  log:
    name: log
    path: stdout
    media-type: text/plain
  error-log:
    name: error-log
    path: stderr
    media-type: text/plain

execution:
  runners:
    default:
      type: SlivkaQueueRunner
...
