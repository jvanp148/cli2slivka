---
slivka-version: 0.8.3
name: dbxtax
description: Index NCBI taxonomy using b+tree indices
version: '6.6.0.0'
author: EMBOSS
license: GPL
classifiers:
- 'Operation :: Data indexing'
- 'Topic :: Data handling'

parameters:
  dbname:
    name: dbname
    type: text
    required: false
    description: Basename for index files
  dbresource:
    name: dbresource
    type: text
    required: false
    description: Resource name
  fields:
    name: fields
    type: text
    required: false
    description: Index fields
  compressed:
    name: compressed
    type: choice
    required: false
    description: Compressed index files
    choices:
      yes: Y
      no: N
  release:
    name: release
    type: text
    required: false
    description: Release number
  date:
    name: date
    type: text
    required: false
    description: Index date
  fields-id:
    name: fields_id
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  fields-acc:
    name: fields_acc
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  fields-tax:
    name: fields_tax
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  fields-rnk:
    name: fields_rnk
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  fields-up:
    name: fields_up
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  fields-gc:
    name: fields_gc
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  fields-mgc:
    name: fields_mgc
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  help:
    name: help
    type: choice
    required: false
    description: Help documentation of the tool.
    choices:
      yes: Y
      no: N

command: dbxtax

args:
  dbname:
    arg: -dbname $(value)
  dbresource:
    arg: -dbresource $(value)
  fields:
    arg: -fields $(value)
  compressed:
    arg: -compressed $(value)
  release:
    arg: -release $(value)
  date:
    arg: -date $(value)
  fields-id:
    arg: -fields_id $(value)
  fields-acc:
    arg: -fields_acc $(value)
  fields-tax:
    arg: -fields_tax $(value)
  fields-rnk:
    arg: -fields_rnk $(value)
  fields-up:
    arg: -fields_up $(value)
  fields-gc:
    arg: -fields_gc $(value)
  fields-mgc:
    arg: -fields_mgc $(value)
  help:
    arg: -help $(value)
  _outfile:
    arg: -outfile $(value)
    default: outfile.txt
  _indexoutdir:
    arg: -indexoutdir $(value)
    default: indexoutdir.txt

outputs:
  outfile:
    name: outfile
    path: outfile.txt
    media-type: text/plain
  indexoutdir:
    name: indexoutdir
    path: indexoutdir.txt
    media-type: text/plain
  log:
    name: log
    path: stdout
    media-type: text/plain
  error-log:
    name: error-log
    path: stderr
    media-type: text/plain

execution:
  runners:
    default:
      type: SlivkaQueueRunner
...
