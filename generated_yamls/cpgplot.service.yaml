---
slivka-version: 0.8.3
name: cpgplot
description: Identify and plot CpG islands in nucleotide sequence(s)
version: '6.6.0.0'
author: EMBOSS
license: GPL
classifiers:
- 'Operation :: CpG island and isochore detection'
- 'Topic :: Sequence composition analysis'

parameters:
  sequence:
    name: sequence
    type: file
    required: true
  sformat-sequence:
    name: sformat_sequence
    type: choice
    required: false
    choices:
      abi: abi
      ace: ace
      acedb: acedb
      bam: bam
      biomart: biomart
      clustal: clustal
      codata: codata
      dbid: dbid
      embl: embl
      ensembl: ensembl
      experiment: experiment
      fasta: fasta
      fastq: fastq
      fastq-illumina: fastq-illumina
      fastq-sanger: fastq-sanger
      fastq-solexa: fastq-solexa
      fitch: fitch
      gcg: gcg
      genbank: genbank
      genpept: genpept
      gff2: gff2
      gff3: gff3
      gifasta: gifasta
      hennig86: hennig86
      ig: ig
      igstrict: igstrict
      jackknifer: jackknifer
      mase: mase
      mega: mega
      msf: msf
      nbrf: nbrf
      nexus: nexus
      pdb: pdb
      pdbnuc: pdbnuc
      pdbnucseq: pdbnucseq
      pdbseq: pdbseq
      pearson: pearson
      phylip: phylip
      phylipnon: phylipnon
      raw: raw
      refseqp: refseqp
      sam: sam
      selex: selex
      staden: staden
      stockholm: stockholm
      strider: strider
      swiss: swiss
      text: text
      treecon: treecon
  sbegin-sequence:
    name: sbegin_sequence
    type: integer
    required: false
  send-sequence:
    name: send_sequence
    type: integer
    required: false
  sprotein-sequence:
    name: sprotein_sequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  snucleotide-sequence:
    name: snucleotide_sequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  sreverse-sequence:
    name: sreverse_sequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  slower-sequence:
    name: slower_sequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  supper-sequence:
    name: supper_sequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  window:
    name: window
    type: integer
    required: false
    description: Window size. The percentage CG content and the Observed frequency of CG is calculated within a window whose size is set by this parameter. The window is moved down the sequence and these statistics are calculated at each position that the window is moved to.
    min: 1
  minoe:
    name: minoe
    type: decimal
    required: false
    description: Minimum observed/expected. This sets the minimum average observed to expected ratio of C plus G to CpG in a set of 10 windows that are required before a CpG island is reported.
    min: 0.0
    max: 10.0
  minpc:
    name: minpc
    type: decimal
    required: false
    description: Minimum percentage. This sets the minimum average percentage of G plus C a set of 10 windows that are required before a CpG island is reported.
    min: 0.0
    max: 100.0
  graph-format:
    name: graph_format
    type: choice
    required: false
    description: Format of the graphical output
    choices:
      png: png
      colourps: colourps
  minlen:
    name: minlen
    type: integer
    required: false
    description: Minimum length of an island. This sets the minimum length that a CpG island has to be before it is reported.
    min: 1
  plot:
    name: plot
    type: choice
    required: false
    description: Plot CpG island score
    choices:
      yes: Y
      no: N
  obsexp:
    name: obsexp
    type: choice
    required: false
    description: Show observed/expected threshold line. If this is set to true then the graph of the observed to expected ratio of C plus G to CpG within a window is displayed.
    choices:
      yes: Y
      no: N
  cg:
    name: cg
    type: choice
    required: false
    description: Show CpG rich regions. If this is set to true then the graph of the regions which have been determined to be CpG islands is displayed.
    choices:
      yes: Y
      no: N
  pc:
    name: pc
    type: choice
    required: false
    description: Show percentage line. If this is set to true then the graph of the percentage C plus G within a window is displayed.
    choices:
      yes: Y
      no: N
  offormat-outfeat:
    name: offormat_outfeat
    type: choice
    required: false
    description: Format of the output features (outfeat)
    choices:
      gff: gff
      gff2: gff2
      embl: embl
      genbank: genbank
      ddbj: ddbj
      pir: pir
      swiss: swiss
      dasgff: dasgff
  help:
    name: help
    type: choice
    required: false
    description: Help documentation of the tool.
    choices:
      yes: Y
      no: N

command: cpgplot

args:
  sequence:
    arg: -sequence $(value)
    symlink: sequence.dat
  sformat-sequence:
    arg: -sformat1 $(value)
  sbegin-sequence:
    arg: -sbegin1 $(value)
  send-sequence:
    arg: -send1 $(value)
  sprotein-sequence:
    arg: -sprotein1 $(value)
  snucleotide-sequence:
    arg: -snucleotide1 $(value)
  sreverse-sequence:
    arg: -sreverse1 $(value)
  slower-sequence:
    arg: -slower1 $(value)
  supper-sequence:
    arg: -supper1 $(value)
  window:
    arg: -window $(value)
  minoe:
    arg: -minoe $(value)
  minpc:
    arg: -minpc $(value)
  graph-format:
    arg: -graph_format $(value)
  minlen:
    arg: -minlen $(value)
  plot:
    arg: -plot $(value)
  obsexp:
    arg: -obsexp $(value)
  cg:
    arg: -cg $(value)
  pc:
    arg: -pc $(value)
  offormat-outfeat:
    arg: -offormat_outfeat $(value)
  help:
    arg: -help $(value)
  _outfile:
    arg: -outfile $(value)
    default: outfile.txt
  _outfeat:
    arg: -outfeat $(value)
    default: outfeat.txt

outputs:
  outfile:
    name: outfile
    path: outfile.txt
    media-type: text/plain
  outfeat:
    name: outfeat
    path: outfeat.txt
    media-type: text/plain
  log:
    name: log
    path: stdout
    media-type: text/plain
  error-log:
    name: error-log
    path: stderr
    media-type: text/plain

execution:
  runners:
    default:
      type: SlivkaQueueRunner
...
