---
slivka-version: 0.8.3
name: infoseq
description: Display basic information about sequences
version: '6.6.0.0'
author: EMBOSS
license: GPL
classifiers:
- 'Operation :: Sequence retrieval'
- 'Topic :: Data search and retrieval'

parameters:
  sequence:
    name: sequence
    type: file
    required: true
  sformat-sequence:
    name: sformat_sequence
    type: choice
    required: false
    choices:
      abi: abi
      ace: ace
      acedb: acedb
      bam: bam
      biomart: biomart
      clustal: clustal
      codata: codata
      dbid: dbid
      embl: embl
      ensembl: ensembl
      experiment: experiment
      fasta: fasta
      fastq: fastq
      fastq-illumina: fastq-illumina
      fastq-sanger: fastq-sanger
      fastq-solexa: fastq-solexa
      fitch: fitch
      gcg: gcg
      genbank: genbank
      genpept: genpept
      gff2: gff2
      gff3: gff3
      gifasta: gifasta
      hennig86: hennig86
      ig: ig
      igstrict: igstrict
      jackknifer: jackknifer
      mase: mase
      mega: mega
      msf: msf
      nbrf: nbrf
      nexus: nexus
      pdb: pdb
      pdbnuc: pdbnuc
      pdbnucseq: pdbnucseq
      pdbseq: pdbseq
      pearson: pearson
      phylip: phylip
      phylipnon: phylipnon
      raw: raw
      refseqp: refseqp
      sam: sam
      selex: selex
      staden: staden
      stockholm: stockholm
      strider: strider
      swiss: swiss
      text: text
      treecon: treecon
  sbegin-sequence:
    name: sbegin_sequence
    type: integer
    required: false
  send-sequence:
    name: send_sequence
    type: integer
    required: false
  sprotein-sequence:
    name: sprotein_sequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  snucleotide-sequence:
    name: snucleotide_sequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  sreverse-sequence:
    name: sreverse_sequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  slower-sequence:
    name: slower_sequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  supper-sequence:
    name: supper_sequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  columns:
    name: columns
    type: choice
    required: false
    description: "Print information in neat, aligned columns. Set this option on (Y) to print the sequence information into neat, aligned columns in the output file. Alternatively, leave it unset (N), in which case the information records will be delimited by a character, which you may specify by using the -delimiter option. In other words, if -columns is set on, the -delimiter option is overriden."
    choices:
      yes: Y
      no: N
  delimiter:
    name: delimiter
    type: text
    required: false
    description: "Delimiter of records in text output file. This string, which is usually a single character only, is used to delimit individual records in the text output file. It could be a space character, a tab character, a pipe character or any other character or string."
  html:
    name: html
    type: choice
    required: false
    description: Format output as an HTML table
    choices:
      yes: Y
      no: N
  only:
    name: only
    type: choice
    required: false
    description: "Display the specified columns. This is a way of shortening the command line if you only want a few things to be displayed. Instead of specifying: '-nohead -noname -noacc -notype -nopgc -nodesc' to get only the length output, you can specify '-only -length'"
    choices:
      yes: Y
      no: N
  heading:
    name: heading
    type: choice
    required: false
    description: Display column headings
    choices:
      yes: Y
      no: N
  usa:
    name: usa
    type: choice
    required: false
    description: Display the USA of the sequence
    choices:
      yes: Y
      no: N
  database:
    name: database
    type: choice
    required: false
    description: Display 'database' column
    choices:
      yes: Y
      no: N
  name:
    name: name
    type: choice
    required: false
    description: Display 'name' column
    choices:
      yes: Y
      no: N
  accession:
    name: accession
    type: choice
    required: false
    description: Display 'accession' column
    choices:
      yes: Y
      no: N
  gi:
    name: gi
    type: choice
    required: false
    description: Display 'GI' column
    choices:
      yes: Y
      no: N
  seqversion:
    name: seqversion
    type: choice
    required: false
    description: Display 'version' column
    choices:
      yes: Y
      no: N
  type:
    name: type
    type: choice
    required: false
    description: Display 'type' column
    choices:
      yes: Y
      no: N
  length:
    name: length
    type: choice
    required: false
    description: Display 'length' column
    choices:
      yes: Y
      no: N
  pgc:
    name: pgc
    type: choice
    required: false
    description: Display 'percent GC content' column
    choices:
      yes: Y
      no: N
  organism:
    name: organism
    type: choice
    required: false
    description: Display 'organism' column
    choices:
      yes: Y
      no: N
  description:
    name: description
    type: choice
    required: false
    description: Display 'description' column
    choices:
      yes: Y
      no: N
  help:
    name: help
    type: choice
    required: false
    description: Help documentation of the tool.
    choices:
      yes: Y
      no: N

command: infoseq

args:
  sequence:
    arg: -sequence $(value)
    symlink: sequence.dat
  sformat-sequence:
    arg: -sformat1 $(value)
  sbegin-sequence:
    arg: -sbegin1 $(value)
  send-sequence:
    arg: -send1 $(value)
  sprotein-sequence:
    arg: -sprotein1 $(value)
  snucleotide-sequence:
    arg: -snucleotide1 $(value)
  sreverse-sequence:
    arg: -sreverse1 $(value)
  slower-sequence:
    arg: -slower1 $(value)
  supper-sequence:
    arg: -supper1 $(value)
  columns:
    arg: -columns $(value)
  delimiter:
    arg: -delimiter $(value)
  html:
    arg: -html $(value)
  only:
    arg: -only $(value)
  heading:
    arg: -heading $(value)
  usa:
    arg: -usa $(value)
  database:
    arg: -database $(value)
  name:
    arg: -name $(value)
  accession:
    arg: -accession $(value)
  gi:
    arg: -gi $(value)
  seqversion:
    arg: -seqversion $(value)
  type:
    arg: -type $(value)
  length:
    arg: -length $(value)
  pgc:
    arg: -pgc $(value)
  organism:
    arg: -organism $(value)
  description:
    arg: -description $(value)
  help:
    arg: -help $(value)
  _outfile:
    arg: -outfile $(value)
    default: outfile.txt

outputs:
  outfile:
    name: outfile
    path: outfile.txt
    media-type: text/plain
  log:
    name: log
    path: stdout
    media-type: text/plain
  error-log:
    name: error-log
    path: stderr
    media-type: text/plain

execution:
  runners:
    default:
      type: SlivkaQueueRunner
...
