---
slivka-version: 0.8.3
name: embossdata
description: Find and retrieve EMBOSS data files
version: '6.6.0.0'
author: EMBOSS
license: GPL
classifiers:
- 'Operation :: Data loading'
- 'Operation :: Data retrieval'
- 'Topic :: Data handling'

parameters:
  filename:
    name: filename
    type: text
    required: false
    description: Data file name. This specifies the name of the file that should be fetched into the current directory or searched for in all of the directories that EMBOSS programs search when looking for a data file. The name of the file is not altered when it is fetched.
  showall:
    name: showall
    type: choice
    required: false
    description: Show all potential EMBOSS data files
    choices:
      yes: Y
      no: N
  fetch:
    name: fetch
    type: choice
    required: false
    description: Fetch a data file
    choices:
      yes: Y
      no: N
  reject:
    name: reject
    type: text
    required: false
    description: Directories to ignore. This specifies the names of the sub-directories of the EMBOSS data directory that should be ignored when displaying data directories.
  reject-none:
    name: reject_None
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  reject-aaindex:
    name: reject_AAINDEX
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  reject-cvs:
    name: reject_CVS
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  reject-codons:
    name: reject_CODONS
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  reject-prints:
    name: reject_PRINTS
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  reject-prosite:
    name: reject_PROSITE
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  reject-rebase:
    name: reject_REBASE
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  help:
    name: help
    type: choice
    required: false
    description: Help documentation of the tool.
    choices:
      yes: Y
      no: N

command: embossdata

args:
  filename:
    arg: -filename $(value)
  showall:
    arg: -showall $(value)
  fetch:
    arg: -fetch $(value)
  reject:
    arg: -reject $(value)
  reject-none:
    arg: -reject_None $(value)
  reject-aaindex:
    arg: -reject_AAINDEX $(value)
  reject-cvs:
    arg: -reject_CVS $(value)
  reject-codons:
    arg: -reject_CODONS $(value)
  reject-prints:
    arg: -reject_PRINTS $(value)
  reject-prosite:
    arg: -reject_PROSITE $(value)
  reject-rebase:
    arg: -reject_REBASE $(value)
  help:
    arg: -help $(value)
  _output:
    arg: -output $(value)
    default: output.txt

outputs:
  output:
    name: output
    path: output.txt
    media-type: text/plain
  log:
    name: log
    path: stdout
    media-type: text/plain
  error-log:
    name: error-log
    path: stderr
    media-type: text/plain

execution:
  runners:
    default:
      type: SlivkaQueueRunner
...
