---
slivka-version: 0.8.3
name: infoassembly
description: Display information about assemblies
version: '6.6.0.0'
author: EMBOSS
license: GPL
classifiers:
- 'Operation :: Data retrieval'
- 'Topic :: Data search and retrieval'

parameters:
  gcbiasmetricsoutfile:
    name: gcbiasmetricsoutfile
    type: text
    required: false
    description: GC bias metrics
  qualvaluesdistoutfile:
    name: qualvaluesdistoutfile
    type: text
    required: false
    description: Distribution of quality values for the reads
  refsequence:
    name: refsequence
    type: file
    required: false
    description: Reference sequences in the assembly
  sformat-refsequence:
    name: sformat_refsequence
    type: choice
    required: false
    choices:
      abi: abi
      ace: ace
      acedb: acedb
      bam: bam
      biomart: biomart
      clustal: clustal
      codata: codata
      dbid: dbid
      embl: embl
      ensembl: ensembl
      experiment: experiment
      fasta: fasta
      fastq: fastq
      fastq-illumina: fastq-illumina
      fastq-sanger: fastq-sanger
      fastq-solexa: fastq-solexa
      fitch: fitch
      gcg: gcg
      genbank: genbank
      genpept: genpept
      gff2: gff2
      gff3: gff3
      gifasta: gifasta
      hennig86: hennig86
      ig: ig
      igstrict: igstrict
      jackknifer: jackknifer
      mase: mase
      mega: mega
      msf: msf
      nbrf: nbrf
      nexus: nexus
      pdb: pdb
      pdbnuc: pdbnuc
      pdbnucseq: pdbnucseq
      pdbseq: pdbseq
      pearson: pearson
      phylip: phylip
      phylipnon: phylipnon
      raw: raw
      refseqp: refseqp
      sam: sam
      selex: selex
      staden: staden
      stockholm: stockholm
      strider: strider
      swiss: swiss
      text: text
      treecon: treecon
  sbegin-refsequence:
    name: sbegin_refsequence
    type: integer
    required: false
  send-refsequence:
    name: send_refsequence
    type: integer
    required: false
  sprotein-refsequence:
    name: sprotein_refsequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  snucleotide-refsequence:
    name: snucleotide_refsequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  sreverse-refsequence:
    name: sreverse_refsequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  slower-refsequence:
    name: slower_refsequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  supper-refsequence:
    name: supper_refsequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  windowsize:
    name: windowsize
    type: integer
    required: false
    description: Window size. The size of windows on the genome that are used to bin reads.
  bisulfite:
    name: bisulfite
    type: choice
    required: false
    description: "Bisulfite treated. If this is true, it is assumed that the reads were bisulfite treated"
    choices:
      yes: Y
      no: N
  help:
    name: help
    type: choice
    required: false
    description: Help documentation of the tool.
    choices:
      yes: Y
      no: N

command: infoassembly

args:
  gcbiasmetricsoutfile:
    arg: -gcbiasmetricsoutfile $(value)
  qualvaluesdistoutfile:
    arg: -qualvaluesdistoutfile $(value)
  refsequence:
    arg: -refsequence $(value)
    symlink: refsequence.dat
  sformat-refsequence:
    arg: -sformat1 $(value)
  sbegin-refsequence:
    arg: -sbegin1 $(value)
  send-refsequence:
    arg: -send1 $(value)
  sprotein-refsequence:
    arg: -sprotein1 $(value)
  snucleotide-refsequence:
    arg: -snucleotide1 $(value)
  sreverse-refsequence:
    arg: -sreverse1 $(value)
  slower-refsequence:
    arg: -slower1 $(value)
  supper-refsequence:
    arg: -supper1 $(value)
  windowsize:
    arg: -windowsize $(value)
  bisulfite:
    arg: -bisulfite $(value)
  help:
    arg: -help $(value)
  _outfile:
    arg: -outfile $(value)
    default: outfile.out

outputs:
  output:
    name: output
    path: outfile.out
    media-type: text/plain
  log:
    name: log
    path: stdout
    media-type: text/plain
  error-log:
    name: error-log
    path: stderr
    media-type: text/plain

execution:
  runners:
    default:
      type: SlivkaQueueRunner
...
