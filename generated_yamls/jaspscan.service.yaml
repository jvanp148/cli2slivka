---
slivka-version: 0.8.3
name: jaspscan
description: Scan DNA sequences for transcription
                  factors
version: '6.6.0.0'
author: EMBOSS
license: GPL
classifiers:
- 'Operation :: Transcription factor binding site prediction'
- 'Topic :: Transcription'

parameters:
  sequence:
    name: sequence
    type: file
    required: true
  sformat-sequence:
    name: sformat_sequence
    type: choice
    required: false
    choices:
      abi: abi
      ace: ace
      acedb: acedb
      bam: bam
      biomart: biomart
      clustal: clustal
      codata: codata
      dbid: dbid
      embl: embl
      ensembl: ensembl
      experiment: experiment
      fasta: fasta
      fastq: fastq
      fastq-illumina: fastq-illumina
      fastq-sanger: fastq-sanger
      fastq-solexa: fastq-solexa
      fitch: fitch
      gcg: gcg
      genbank: genbank
      genpept: genpept
      gff2: gff2
      gff3: gff3
      gifasta: gifasta
      hennig86: hennig86
      ig: ig
      igstrict: igstrict
      jackknifer: jackknifer
      mase: mase
      mega: mega
      msf: msf
      nbrf: nbrf
      nexus: nexus
      pdb: pdb
      pdbnuc: pdbnuc
      pdbnucseq: pdbnucseq
      pdbseq: pdbseq
      pearson: pearson
      phylip: phylip
      phylipnon: phylipnon
      raw: raw
      refseqp: refseqp
      sam: sam
      selex: selex
      staden: staden
      stockholm: stockholm
      strider: strider
      swiss: swiss
      text: text
      treecon: treecon
  sbegin-sequence:
    name: sbegin_sequence
    type: integer
    required: false
  send-sequence:
    name: send_sequence
    type: integer
    required: false
  sprotein-sequence:
    name: sprotein_sequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  snucleotide-sequence:
    name: snucleotide_sequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  sreverse-sequence:
    name: sreverse_sequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  slower-sequence:
    name: slower_sequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  supper-sequence:
    name: supper_sequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  menu:
    name: menu
    type: choice
    required: false
    description: Jaspar matrix set
    choices:
      C: C
      F: F
      P: P
      N: N
      O: O
      S: S
      B: B
      L: L
      H: H
  matrices:
    name: matrices
    type: text
    required: false
    description: "Comma separated matrix list. The name 'all' reads in all matrix files from the selected JASPAR matrix set. You can specify individual matrices by giving their names with commas between then, such as: 'ma0001.1,ma0015*'. The case of the names is not important. You can specify a file of matrix names to read in by giving the name of the file holding the matrix names with a '@' character in front of it, for example, '@matrix.list'. Blank lines and lines starting with a hash character or '!' are ignored and all other lines are concatenated together with a comma character ',' and then treated as the list of enzymes to search for. An example of a file of matrix names is: ! my matrices ma0001.1, ma0002.1 ! other matrices ma0010.1 ma0032* ma0053.1"
  threshold:
    name: threshold
    type: decimal
    required: false
    description: Threshold percentage. If the matrix score is greater than or equal to this percentage then a hit will be reported
  exclude:
    name: exclude
    type: text
    required: false
    description: Comma separated matrix list for exclusion. The names of any matrices to exclude from the 'matrices' list. Matrices are specified in the same way as for the selection list.
  both:
    name: both
    type: choice
    required: false
    description: Scan both strands. If set then both the forward and reverse strands are searched
    choices:
      yes: Y
      no: N
  help:
    name: help
    type: choice
    required: false
    description: Help documentation of the tool.
    choices:
      yes: Y
      no: N

command: jaspscan

args:
  sequence:
    arg: -sequence $(value)
    symlink: sequence.dat
  sformat-sequence:
    arg: -sformat1 $(value)
  sbegin-sequence:
    arg: -sbegin1 $(value)
  send-sequence:
    arg: -send1 $(value)
  sprotein-sequence:
    arg: -sprotein1 $(value)
  snucleotide-sequence:
    arg: -snucleotide1 $(value)
  sreverse-sequence:
    arg: -sreverse1 $(value)
  slower-sequence:
    arg: -slower1 $(value)
  supper-sequence:
    arg: -supper1 $(value)
  menu:
    arg: -menu $(value)
  matrices:
    arg: -matrices $(value)
  threshold:
    arg: -threshold $(value)
  exclude:
    arg: -exclude $(value)
  both:
    arg: -both $(value)
  help:
    arg: -help $(value)
  _outfile:
    arg: -outfile $(value)
    default: outfile.txt

outputs:
  outfile:
    name: outfile
    path: outfile.txt
    media-type: text/plain
  log:
    name: log
    path: stdout
    media-type: text/plain
  error-log:
    name: error-log
    path: stderr
    media-type: text/plain

execution:
  runners:
    default:
      type: SlivkaQueueRunner
...
