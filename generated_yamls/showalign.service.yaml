---
slivka-version: 0.8.3
name: showalign
description: Display a multiple sequence alignment in pretty format
version: '6.6.0.0'
author: EMBOSS
license: GPL
classifiers:
- 'Operation :: Sequence rendering'
- 'Operation :: Data retrieval'
- 'Topic :: Data search and retrieval'
- 'Topic :: Sequence alignment'

parameters:
  sequence:
    name: sequence
    type: file
    required: true
    description: The sequence alignment to be displayed.
  sformat-sequence:
    name: sformat_sequence
    type: choice
    required: false
    choices:
      abi: abi
      ace: ace
      acedb: acedb
      bam: bam
      biomart: biomart
      clustal: clustal
      codata: codata
      dbid: dbid
      embl: embl
      ensembl: ensembl
      experiment: experiment
      fasta: fasta
      fastq: fastq
      fastq-illumina: fastq-illumina
      fastq-sanger: fastq-sanger
      fastq-solexa: fastq-solexa
      fitch: fitch
      gcg: gcg
      genbank: genbank
      genpept: genpept
      gff2: gff2
      gff3: gff3
      gifasta: gifasta
      hennig86: hennig86
      ig: ig
      igstrict: igstrict
      jackknifer: jackknifer
      mase: mase
      mega: mega
      msf: msf
      nbrf: nbrf
      nexus: nexus
      pdb: pdb
      pdbnuc: pdbnuc
      pdbnucseq: pdbnucseq
      pdbseq: pdbseq
      pearson: pearson
      phylip: phylip
      phylipnon: phylipnon
      raw: raw
      refseqp: refseqp
      sam: sam
      selex: selex
      staden: staden
      stockholm: stockholm
      strider: strider
      swiss: swiss
      text: text
      treecon: treecon
  sbegin-sequence:
    name: sbegin_sequence
    type: integer
    required: false
  send-sequence:
    name: send_sequence
    type: integer
    required: false
  sprotein-sequence:
    name: sprotein_sequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  snucleotide-sequence:
    name: snucleotide_sequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  sreverse-sequence:
    name: sreverse_sequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  slower-sequence:
    name: slower_sequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  supper-sequence:
    name: supper_sequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  matrix:
    name: matrix
    type: text
    required: false
    description: Similarity scoring Matrix file. This is the scoring matrix file used when comparing sequences. By default it is the file 'EBLOSUM62' (for proteins) or the file 'EDNAFULL' (for nucleic sequences). These files are found in the 'data' directory of the EMBOSS installation.
  refseq:
    name: refseq
    type: text
    required: false
    description: "The number or the name of the reference sequence. If you give the number in the alignment or the name of a sequence, it will be taken to be the reference sequence. The reference sequence is always shown in full and is the one against which all the other sequences are compared. If this is set to 0 then the consensus sequence will be used as the reference sequence. By default the consensus sequence is used as the reference sequence."
  bottom:
    name: bottom
    type: choice
    required: false
    description: Display the reference sequence at the bottom. If this is true then the reference sequence is displayed at the bottom of the alignment instead of the top.
    choices:
      yes: Y
      no: N
  show:
    name: show
    type: choice
    required: false
    description: What to show
    choices:
      A: A
      I: I
      N: N
      S: S
      D: D
  order:
    name: order
    type: choice
    required: false
    description: Output order of the sequences
    choices:
      I: I
      A: A
      S: S
  similarcase:
    name: similarcase
    type: choice
    required: false
    description: "Show similar residues in lower-case. If this is set True, then when -show is set to 'Similarities' or 'Non-identities' and a residue is similar but not identical to the reference sequence residue, it will be changed to lower-case. If -show is set to 'All' then non-identical, non-similar residues will be changed to lower-case. If this is False then no change to the case of the residues is made on the basis of their similarity to the reference sequence."
    choices:
      yes: Y
      no: N
  consensus:
    name: consensus
    type: choice
    required: false
    description: Display the consensus line. If this is true then the consensus line is displayed.
    choices:
      yes: Y
      no: N
  uppercase:
    name: uppercase
    type: text
    required: false
    description: "Regions to put in uppercase (eg: 4-57,78-94). Regions to put in uppercase. If this is left blank, then the sequence case is left alone. A set of regions is specified by a set of pairs of positions. The positions are integers. They are separated by any non-digit, non-alpha character. Examples of region specifications are: 24-45, 56-78 1:45, 67=99;765..888 1,5,8,10,23,45,57,99"
  number:
    name: number
    type: choice
    required: false
    description: Number the sequences. If this option is true then a line giving the positions in the alignment is displayed every 10 characters above the alignment.
    choices:
      yes: Y
      no: N
  ruler:
    name: ruler
    type: choice
    required: false
    description: Display ruler. If this option is true then a ruler line marking every 5th and 10th character in the alignment is displayed.
    choices:
      yes: Y
      no: N
  width:
    name: width
    type: integer
    required: false
    description: Width of sequence to display
    min: 1
  margin:
    name: margin
    type: integer
    required: false
    description: Length of margin for sequence names. This sets the length of the left-hand margin for sequence names. If the margin is set at 0 then no margin and no names are displayed. If the margin is set to a value that is less than the length of a sequence name then the sequence name is displayed truncated to the length of the margin. If the margin is set to -1 then the minimum margin width that will allow all the sequence names to be displayed in full plus a space at the end of the name will automatically be selected.
    min: -1
  html:
    name: html
    type: choice
    required: false
    description: Use HTML formatting
    choices:
      yes: Y
      no: N
  highlight:
    name: highlight
    type: text
    required: false
    description: "Regions to colour in HTML (eg: 4-57 red 78-94 green). Regions to colour if formatting for HTML. If this is left blank, then the sequence is left alone. A set of regions is specified by a set of pairs of positions. The positions are integers. They are followed by any valid HTML font colour. Examples of region specifications are: 24-45 blue 56-78 orange 1-100 green 120-156 red A file of ranges to colour (one range per line) can be specified as '@filename'."
  plurality:
    name: plurality
    type: decimal
    required: false
    description: Plurality check % for consensus. Set a cut-off for the % of positive scoring matches below which there is no consensus. The default plurality is taken as 50% of the total weight of all the sequences in the alignment.
    min: 0.0
    max: 100.0
  setcase:
    name: setcase
    type: decimal
    required: false
    description: Threshold above which the consensus is given in uppercase. Sets the threshold for the scores of the positive matches above which the consensus is in upper-case and below which the consensus is in lower-case. By default this is set to be half of the (weight-adjusted) number of sequences in the alignment.
  identity:
    name: identity
    type: decimal
    required: false
    description: "Required % of identities at a position for consensus. Provides the facility of setting the required number of identities at a position for it to give a consensus. Therefore, if this is set to 100% only columns of identities contribute to the consensus."
    min: 0.0
    max: 100.0
  gaps:
    name: gaps
    type: choice
    required: false
    description: "Use gap characters in consensus. If this option is true then gap characters can appear in the consensus. The alternative is 'N' for nucleotide, or 'X' for protein"
    choices:
      yes: Y
      no: N
  help:
    name: help
    type: choice
    required: false
    description: Help documentation of the tool.
    choices:
      yes: Y
      no: N

command: showalign

args:
  sequence:
    arg: -sequence $(value)
    symlink: sequence.dat
  sformat-sequence:
    arg: -sformat1 $(value)
  sbegin-sequence:
    arg: -sbegin1 $(value)
  send-sequence:
    arg: -send1 $(value)
  sprotein-sequence:
    arg: -sprotein1 $(value)
  snucleotide-sequence:
    arg: -snucleotide1 $(value)
  sreverse-sequence:
    arg: -sreverse1 $(value)
  slower-sequence:
    arg: -slower1 $(value)
  supper-sequence:
    arg: -supper1 $(value)
  matrix:
    arg: -matrix $(value)
  refseq:
    arg: -refseq $(value)
  bottom:
    arg: -bottom $(value)
  show:
    arg: -show $(value)
  order:
    arg: -order $(value)
  similarcase:
    arg: -similarcase $(value)
  consensus:
    arg: -consensus $(value)
  uppercase:
    arg: -uppercase $(value)
  number:
    arg: -number $(value)
  ruler:
    arg: -ruler $(value)
  width:
    arg: -width $(value)
  margin:
    arg: -margin $(value)
  html:
    arg: -html $(value)
  highlight:
    arg: -highlight $(value)
  plurality:
    arg: -plurality $(value)
  setcase:
    arg: -setcase $(value)
  identity:
    arg: -identity $(value)
  gaps:
    arg: -gaps $(value)
  help:
    arg: -help $(value)
  _outfile:
    arg: -outfile $(value)
    default: outfile.txt

outputs:
  outfile:
    name: outfile
    path: outfile.txt
    media-type: text/plain
  log:
    name: log
    path: stdout
    media-type: text/plain
  error-log:
    name: error-log
    path: stderr
    media-type: text/plain

execution:
  runners:
    default:
      type: SlivkaQueueRunner
...
