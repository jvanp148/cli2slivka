---
slivka-version: 0.8.3
name: hmoment
description: Calculate and plot hydrophobic moment for protein sequence(s)
version: '6.6.0.0'
author: EMBOSS
license: GPL
classifiers:
- 'Operation :: Protein hydropathy calculation (from sequence)'
- 'Operation :: Protein hydrophobic moment plotting'
- 'Topic :: Protein hydropathy'

parameters:
  seqall:
    name: seqall
    type: file
    required: true
  sformat-seqall:
    name: sformat_seqall
    type: choice
    required: false
    choices:
      abi: abi
      ace: ace
      acedb: acedb
      bam: bam
      biomart: biomart
      clustal: clustal
      codata: codata
      dbid: dbid
      embl: embl
      ensembl: ensembl
      experiment: experiment
      fasta: fasta
      fastq: fastq
      fastq-illumina: fastq-illumina
      fastq-sanger: fastq-sanger
      fastq-solexa: fastq-solexa
      fitch: fitch
      gcg: gcg
      genbank: genbank
      genpept: genpept
      gff2: gff2
      gff3: gff3
      gifasta: gifasta
      hennig86: hennig86
      ig: ig
      igstrict: igstrict
      jackknifer: jackknifer
      mase: mase
      mega: mega
      msf: msf
      nbrf: nbrf
      nexus: nexus
      pdb: pdb
      pdbnuc: pdbnuc
      pdbnucseq: pdbnucseq
      pdbseq: pdbseq
      pearson: pearson
      phylip: phylip
      phylipnon: phylipnon
      raw: raw
      refseqp: refseqp
      sam: sam
      selex: selex
      staden: staden
      stockholm: stockholm
      strider: strider
      swiss: swiss
      text: text
      treecon: treecon
  sbegin-seqall:
    name: sbegin_seqall
    type: integer
    required: false
  send-seqall:
    name: send_seqall
    type: integer
    required: false
  sprotein-seqall:
    name: sprotein_seqall
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  snucleotide-seqall:
    name: snucleotide_seqall
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  sreverse-seqall:
    name: sreverse_seqall
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  slower-seqall:
    name: slower_seqall
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  supper-seqall:
    name: supper_seqall
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  graph-format:
    name: graph_format
    type: choice
    required: false
    description: Format of the graphical output
    choices:
      png: png
      colourps: colourps
  window:
    name: window
    type: integer
    required: false
    description: Window
  aangle:
    name: aangle
    type: integer
    required: false
    description: Alpha helix angle (degrees)
  bangle:
    name: bangle
    type: integer
    required: false
    description: Beta sheet angle (degrees)
  baseline:
    name: baseline
    type: decimal
    required: false
    description: Graph marker line
  plot:
    name: plot
    type: choice
    required: false
    description: Produce graphic
    choices:
      yes: Y
      no: N
  double:
    name: double
    type: choice
    required: false
    description: Plot two graphs
    choices:
      yes: Y
      no: N
  graphics-in-postscript:
    name: Graphics_in_Postscript
    type: text
    required: false
  graphics-in-png:
    name: Graphics_in_PNG
    type: text
    required: false
  help:
    name: help
    type: choice
    required: false
    description: Help documentation of the tool.
    choices:
      yes: Y
      no: N

command: hmoment

args:
  seqall:
    arg: -seqall $(value)
    symlink: seqall.dat
  sformat-seqall:
    arg: -sformat1 $(value)
  sbegin-seqall:
    arg: -sbegin1 $(value)
  send-seqall:
    arg: -send1 $(value)
  sprotein-seqall:
    arg: -sprotein1 $(value)
  snucleotide-seqall:
    arg: -snucleotide1 $(value)
  sreverse-seqall:
    arg: -sreverse1 $(value)
  slower-seqall:
    arg: -slower1 $(value)
  supper-seqall:
    arg: -supper1 $(value)
  graph-format:
    arg: -graph_format $(value)
  window:
    arg: -window $(value)
  aangle:
    arg: -aangle $(value)
  bangle:
    arg: -bangle $(value)
  baseline:
    arg: -baseline $(value)
  plot:
    arg: -plot $(value)
  double:
    arg: -double $(value)
  graphics-in-postscript:
    arg: -Graphics_in_Postscript $(value)
  graphics-in-png:
    arg: -Graphics_in_PNG $(value)
  help:
    arg: -help $(value)
  _outfile:
    arg: -outfile $(value)
    default: outfile.out

outputs:
  peptide-hydrophobic-moment:
    name: peptide-hydrophobic-moment
    path: outfile.out
    media-type: text/plain
  log:
    name: log
    path: stdout
    media-type: text/plain
  error-log:
    name: error-log
    path: stderr
    media-type: text/plain

execution:
  runners:
    default:
      type: SlivkaQueueRunner
...
