---
slivka-version: 0.8.3
name: coderet
description: Extract CDS, mRNA and translations from
                  feature tables
version: '6.6.0.0'
author: EMBOSS
license: GPL
classifiers:
- 'Operation :: DNA translation'
- 'Operation :: DNA transcription'
- 'Operation :: Coding region prediction'
- 'Topic :: Data search and retrieval'
- 'Topic :: Translation'

