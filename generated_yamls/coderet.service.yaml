      no: N
  cdsoutseq:
    name: cdsoutseq
    type: text
    required: false
    description: Coding nucleotide output sequence(s) (optional). Returns sequence.
  mrnaoutseq:
    name: mrnaoutseq
    type: text
    required: false
    description: Messenger RNA nucleotide output sequence(s) (optional). Returns sequence.
  translationoutseq:
