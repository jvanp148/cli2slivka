command: coderet

args:
  seqall:
    arg: -seqall $(value)
    symlink: seqall.dat
  sformat-seqall:
    arg: -sformat1 $(value)
  sbegin-seqall:
    arg: -sbegin1 $(value)
  send-seqall:
    arg: -send1 $(value)
  sprotein-seqall:
    arg: -sprotein1 $(value)
  snucleotide-seqall:
    arg: -snucleotide1 $(value)
  sreverse-seqall:
    arg: -sreverse1 $(value)
  slower-seqall:
    arg: -slower1 $(value)
  supper-seqall:
    arg: -supper1 $(value)
  cdsoutseq:
    arg: -cdsoutseq $(value)
  mrnaoutseq:
    arg: -mrnaoutseq $(value)
  translationoutseq:
    arg: -translationoutseq $(value)
  restoutseq:
    arg: -restoutseq $(value)
  osformat-cdsoutseq:
    arg: -osformat_cdsoutseq $(value)
  osformat-mrnaoutseq:
    arg: -osformat_mrnaoutseq $(value)
  osformat-translationoutseq:
    arg: -osformat_translationoutseq $(value)
  osformat-restoutseq:
    arg: -osformat_restoutseq $(value)
  help:
    arg: -help $(value)
  _outfile:
    arg: -outfile $(value)
    default: outfile.out

outputs:
  sequence-record:
    name: sequence-record
    path: outfile.out
    media-type: text/plain
  log:
    name: log
    path: stdout
    media-type: text/plain
  error-log:
    name: error-log
    path: stderr
    media-type: text/plain

execution:
  runners:
    default:
      type: SlivkaQueueRunner
...
