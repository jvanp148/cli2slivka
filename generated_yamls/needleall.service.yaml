---
slivka-version: 0.8.3
name: needleall
description: Many-to-many pairwise alignments of two sequence sets
version: '6.6.0.0'
author: EMBOSS
license: GPL
classifiers:
- 'Operation :: Pairwise sequence alignment construction (global)'
- 'Topic :: Sequence alignment'

parameters:
  asequence:
    name: asequence
    type: file
    required: true
  sformat-asequence:
    name: sformat_asequence
    type: choice
    required: false
    choices:
      abi: abi
      ace: ace
      acedb: acedb
      bam: bam
      biomart: biomart
      clustal: clustal
      codata: codata
      dbid: dbid
      embl: embl
      ensembl: ensembl
      experiment: experiment
      fasta: fasta
      fastq: fastq
      fastq-illumina: fastq-illumina
      fastq-sanger: fastq-sanger
      fastq-solexa: fastq-solexa
      fitch: fitch
      gcg: gcg
      genbank: genbank
      genpept: genpept
      gff2: gff2
      gff3: gff3
      gifasta: gifasta
      hennig86: hennig86
      ig: ig
      igstrict: igstrict
      jackknifer: jackknifer
      mase: mase
      mega: mega
      msf: msf
      nbrf: nbrf
      nexus: nexus
      pdb: pdb
      pdbnuc: pdbnuc
      pdbnucseq: pdbnucseq
      pdbseq: pdbseq
      pearson: pearson
      phylip: phylip
      phylipnon: phylipnon
      raw: raw
      refseqp: refseqp
      sam: sam
      selex: selex
      staden: staden
      stockholm: stockholm
      strider: strider
      swiss: swiss
      text: text
      treecon: treecon
  sbegin-asequence:
    name: sbegin_asequence
    type: integer
    required: false
  send-asequence:
    name: send_asequence
    type: integer
    required: false
  sprotein-asequence:
    name: sprotein_asequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  snucleotide-asequence:
    name: snucleotide_asequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  sreverse-asequence:
    name: sreverse_asequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  slower-asequence:
    name: slower_asequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  supper-asequence:
    name: supper_asequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  bsequence:
    name: bsequence
    type: file
    required: true
  sformat-bsequence:
    name: sformat_bsequence
    type: choice
    required: false
    choices:
      abi: abi
      ace: ace
      acedb: acedb
      bam: bam
      biomart: biomart
      clustal: clustal
      codata: codata
      dbid: dbid
      embl: embl
      ensembl: ensembl
      experiment: experiment
      fasta: fasta
      fastq: fastq
      fastq-illumina: fastq-illumina
      fastq-sanger: fastq-sanger
      fastq-solexa: fastq-solexa
      fitch: fitch
      gcg: gcg
      genbank: genbank
      genpept: genpept
      gff2: gff2
      gff3: gff3
      gifasta: gifasta
      hennig86: hennig86
      ig: ig
      igstrict: igstrict
      jackknifer: jackknifer
      mase: mase
      mega: mega
      msf: msf
      nbrf: nbrf
      nexus: nexus
      pdb: pdb
      pdbnuc: pdbnuc
      pdbnucseq: pdbnucseq
      pdbseq: pdbseq
      pearson: pearson
      phylip: phylip
      phylipnon: phylipnon
      raw: raw
      refseqp: refseqp
      sam: sam
      selex: selex
      staden: staden
      stockholm: stockholm
      strider: strider
      swiss: swiss
      text: text
      treecon: treecon
  sbegin-bsequence:
    name: sbegin_bsequence
    type: integer
    required: false
  send-bsequence:
    name: send_bsequence
    type: integer
    required: false
  sprotein-bsequence:
    name: sprotein_bsequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  snucleotide-bsequence:
    name: snucleotide_bsequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  sreverse-bsequence:
    name: sreverse_bsequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  slower-bsequence:
    name: slower_bsequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  supper-bsequence:
    name: supper_bsequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  gapopen:
    name: gapopen
    type: decimal
    required: false
    description: "Gap opening penalty. The gap open penalty is the score taken away when a gap is created. The best value depends on the choice of comparison matrix. The default value assumes you are using the EBLOSUM62 matrix for protein sequences, and the EDNAFULL matrix for nucleotide sequences."
    min: 0.0
    max: 100.0
  gapextend:
    name: gapextend
    type: decimal
    required: false
    description: "Gap extension penalty. The gap extension, penalty is added to the standard gap penalty for each base or residue in the gap. This is how long gaps are penalized. Usually you will expect a few long gaps rather than many short gaps, so the gap extension penalty should be lower than the gap penalty. An exception is where one or both sequences are single reads with possible sequencing errors in which case you would expect many single base gaps. You can get this result by setting the gap open penalty to zero (or very low) and using the gap extension penalty to control gap scoring."
    min: 0.0
    max: 10.0
  datafile:
    name: datafile
    type: text
    required: false
    description: Matrix file. This is the scoring matrix file used when comparing sequences. By default it is the file 'EBLOSUM62' (for proteins) or the file 'EDNAFULL' (for nucleic sequences). These files are found in the 'data' directory of the EMBOSS installation.
  endweight:
    name: endweight
    type: choice
    required: false
    description: Apply end gap penalties
    choices:
      yes: Y
      no: N
  endopen:
    name: endopen
    type: decimal
    required: false
    description: "End gap opening penalty. The end gap open penalty is the score taken away when an end gap is created. The best value depends on the choice of comparison matrix. The default value assumes you are using the EBLOSUM62 matrix for protein sequences, and the EDNAFULL matrix for nucleotide sequences."
    min: 0.0
    max: 100.0
  endextend:
    name: endextend
    type: decimal
    required: false
    description: "End gap extension penalty. The end gap extension, penalty is added to the end gap penalty for each base or residue in the end gap."
    min: 0.0
    max: 10.0
  minscore:
    name: minscore
    type: decimal
    required: false
    description: Minimum alignment score to report an alignment.
    min: -10.0
    max: 100.0
  brief:
    name: brief
    type: choice
    required: false
    description: Brief identity and similarity
    choices:
      yes: Y
      no: N
  errfile:
    name: errfile
    type: text
    required: false
    description: Program needleall errors output file. Error file to be written to
  help:
    name: help
    type: choice
    required: false
    description: Help documentation of the tool.
    choices:
      yes: Y
      no: N

command: needleall

args:
  asequence:
    arg: -asequence $(value)
    symlink: asequence.dat
  sformat-asequence:
    arg: -sformat1 $(value)
  sbegin-asequence:
    arg: -sbegin1 $(value)
  send-asequence:
    arg: -send1 $(value)
  sprotein-asequence:
    arg: -sprotein1 $(value)
  snucleotide-asequence:
    arg: -snucleotide1 $(value)
  sreverse-asequence:
    arg: -sreverse1 $(value)
  slower-asequence:
    arg: -slower1 $(value)
  supper-asequence:
    arg: -supper1 $(value)
  bsequence:
    arg: -bsequence $(value)
    symlink: bsequence.dat
  sformat-bsequence:
    arg: -sformat2 $(value)
  sbegin-bsequence:
    arg: -sbegin2 $(value)
  send-bsequence:
    arg: -send2 $(value)
  sprotein-bsequence:
    arg: -sprotein2 $(value)
  snucleotide-bsequence:
    arg: -snucleotide2 $(value)
  sreverse-bsequence:
    arg: -sreverse2 $(value)
  slower-bsequence:
    arg: -slower2 $(value)
  supper-bsequence:
    arg: -supper2 $(value)
  gapopen:
    arg: -gapopen $(value)
  gapextend:
    arg: -gapextend $(value)
  datafile:
    arg: -datafile $(value)
  endweight:
    arg: -endweight $(value)
  endopen:
    arg: -endopen $(value)
  endextend:
    arg: -endextend $(value)
  minscore:
    arg: -minscore $(value)
  brief:
    arg: -brief $(value)
  errfile:
    arg: -errfile $(value)
  help:
    arg: -help $(value)
  _outfile:
    arg: -outfile $(value)
    default: outfile.out

outputs:
  sequence-alignment:
    name: sequence-alignment
    path: outfile.out
    media-type: text/plain
  log:
    name: log
    path: stdout
    media-type: text/plain
  error-log:
    name: error-log
    path: stderr
    media-type: text/plain

execution:
  runners:
    default:
      type: SlivkaQueueRunner
...
