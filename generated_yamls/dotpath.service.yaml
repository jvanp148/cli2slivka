---
slivka-version: 0.8.3
name: dotpath
description: Draw a non-overlapping wordmatch dotplot of two sequences
version: '6.6.0.0'
author: EMBOSS
license: GPL
classifiers:
- 'Operation :: Sequence word comparison'
- 'Operation :: Dotplot plotting'
- 'Topic :: Sequence comparison'

parameters:
  asequence:
    name: asequence
    type: file
    required: true
  sformat-asequence:
    name: sformat_asequence
    type: choice
    required: false
    choices:
      abi: abi
      ace: ace
      acedb: acedb
      bam: bam
      biomart: biomart
      clustal: clustal
      codata: codata
      dbid: dbid
      embl: embl
      ensembl: ensembl
      experiment: experiment
      fasta: fasta
      fastq: fastq
      fastq-illumina: fastq-illumina
      fastq-sanger: fastq-sanger
      fastq-solexa: fastq-solexa
      fitch: fitch
      gcg: gcg
      genbank: genbank
      genpept: genpept
      gff2: gff2
      gff3: gff3
      gifasta: gifasta
      hennig86: hennig86
      ig: ig
      igstrict: igstrict
      jackknifer: jackknifer
      mase: mase
      mega: mega
      msf: msf
      nbrf: nbrf
      nexus: nexus
      pdb: pdb
      pdbnuc: pdbnuc
      pdbnucseq: pdbnucseq
      pdbseq: pdbseq
      pearson: pearson
      phylip: phylip
      phylipnon: phylipnon
      raw: raw
      refseqp: refseqp
      sam: sam
      selex: selex
      staden: staden
      stockholm: stockholm
      strider: strider
      swiss: swiss
      text: text
      treecon: treecon
  sbegin-asequence:
    name: sbegin_asequence
    type: integer
    required: false
  send-asequence:
    name: send_asequence
    type: integer
    required: false
  sprotein-asequence:
    name: sprotein_asequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  snucleotide-asequence:
    name: snucleotide_asequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  sreverse-asequence:
    name: sreverse_asequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  slower-asequence:
    name: slower_asequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  supper-asequence:
    name: supper_asequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  bsequence:
    name: bsequence
    type: file
    required: true
  sformat-bsequence:
    name: sformat_bsequence
    type: choice
    required: false
    choices:
      abi: abi
      ace: ace
      acedb: acedb
      bam: bam
      biomart: biomart
      clustal: clustal
      codata: codata
      dbid: dbid
      embl: embl
      ensembl: ensembl
      experiment: experiment
      fasta: fasta
      fastq: fastq
      fastq-illumina: fastq-illumina
      fastq-sanger: fastq-sanger
      fastq-solexa: fastq-solexa
      fitch: fitch
      gcg: gcg
      genbank: genbank
      genpept: genpept
      gff2: gff2
      gff3: gff3
      gifasta: gifasta
      hennig86: hennig86
      ig: ig
      igstrict: igstrict
      jackknifer: jackknifer
      mase: mase
      mega: mega
      msf: msf
      nbrf: nbrf
      nexus: nexus
      pdb: pdb
      pdbnuc: pdbnuc
      pdbnucseq: pdbnucseq
      pdbseq: pdbseq
      pearson: pearson
      phylip: phylip
      phylipnon: phylipnon
      raw: raw
      refseqp: refseqp
      sam: sam
      selex: selex
      staden: staden
      stockholm: stockholm
      strider: strider
      swiss: swiss
      text: text
      treecon: treecon
  sbegin-bsequence:
    name: sbegin_bsequence
    type: integer
    required: false
  send-bsequence:
    name: send_bsequence
    type: integer
    required: false
  sprotein-bsequence:
    name: sprotein_bsequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  snucleotide-bsequence:
    name: snucleotide_bsequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  sreverse-bsequence:
    name: sreverse_bsequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  slower-bsequence:
    name: slower_bsequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  supper-bsequence:
    name: supper_bsequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  wordsize:
    name: wordsize
    type: integer
    required: false
    description: Word size
    min: 2
  graph-format:
    name: graph_format
    type: choice
    required: false
    description: Format of the graphical output
    choices:
      png: png
      colourps: colourps
  overlaps:
    name: overlaps
    type: choice
    required: false
    description: Display the overlapping matches. Displays the overlapping matches (in red) as well as the minimal set of non-overlapping matches
    choices:
      yes: Y
      no: N
  boxit:
    name: boxit
    type: choice
    required: false
    description: Draw a box around dotplot
    choices:
      yes: Y
      no: N
  graphics-in-postscript:
    name: Graphics_in_Postscript
    type: text
    required: false
  graphics-in-png:
    name: Graphics_in_PNG
    type: text
    required: false
  help:
    name: help
    type: choice
    required: false
    description: Help documentation of the tool.
    choices:
      yes: Y
      no: N

command: dotpath

args:
  asequence:
    arg: -asequence $(value)
    symlink: asequence.dat
  sformat-asequence:
    arg: -sformat1 $(value)
  sbegin-asequence:
    arg: -sbegin1 $(value)
  send-asequence:
    arg: -send1 $(value)
  sprotein-asequence:
    arg: -sprotein1 $(value)
  snucleotide-asequence:
    arg: -snucleotide1 $(value)
  sreverse-asequence:
    arg: -sreverse1 $(value)
  slower-asequence:
    arg: -slower1 $(value)
  supper-asequence:
    arg: -supper1 $(value)
  bsequence:
    arg: -bsequence $(value)
    symlink: bsequence.dat
  sformat-bsequence:
    arg: -sformat2 $(value)
  sbegin-bsequence:
    arg: -sbegin2 $(value)
  send-bsequence:
    arg: -send2 $(value)
  sprotein-bsequence:
    arg: -sprotein2 $(value)
  snucleotide-bsequence:
    arg: -snucleotide2 $(value)
  sreverse-bsequence:
    arg: -sreverse2 $(value)
  slower-bsequence:
    arg: -slower2 $(value)
  supper-bsequence:
    arg: -supper2 $(value)
  wordsize:
    arg: -wordsize $(value)
  graph-format:
    arg: -graph_format $(value)
  overlaps:
    arg: -overlaps $(value)
  boxit:
    arg: -boxit $(value)
  graphics-in-postscript:
    arg: -Graphics_in_Postscript $(value)
  graphics-in-png:
    arg: -Graphics_in_PNG $(value)
  help:
    arg: -help $(value)
  _outfile:
    arg: -outfile $(value)
    default: outfile.out

outputs:
  output:
    name: output
    path: outfile.out
    media-type: text/plain
  log:
    name: log
    path: stdout
    media-type: text/plain
  error-log:
    name: error-log
    path: stderr
    media-type: text/plain

execution:
  runners:
    default:
      type: SlivkaQueueRunner
...
