---
slivka-version: 0.8.3
name: epestfind
description: Find PEST motifs as potential proteolytic
                  cleavage sites
version: '6.6.0.0'
author: EMBOSS
license: GPL
classifiers:
- 'Operation :: Protein cleavage site prediction'
- 'Topic :: Sequence motifs'
- 'Topic :: Protein and peptide identification'

parameters:
  sequence:
    name: sequence
    type: file
    required: true
    description: Protein sequence USA to be analysed.
  sformat-sequence:
    name: sformat_sequence
    type: choice
    required: false
    choices:
      abi: abi
      ace: ace
      acedb: acedb
      bam: bam
      biomart: biomart
      clustal: clustal
      codata: codata
      dbid: dbid
      embl: embl
      ensembl: ensembl
      experiment: experiment
      fasta: fasta
      fastq: fastq
      fastq-illumina: fastq-illumina
      fastq-sanger: fastq-sanger
      fastq-solexa: fastq-solexa
      fitch: fitch
      gcg: gcg
      genbank: genbank
      genpept: genpept
      gff2: gff2
      gff3: gff3
      gifasta: gifasta
      hennig86: hennig86
      ig: ig
      igstrict: igstrict
      jackknifer: jackknifer
      mase: mase
      mega: mega
      msf: msf
      nbrf: nbrf
      nexus: nexus
      pdb: pdb
      pdbnuc: pdbnuc
      pdbnucseq: pdbnucseq
      pdbseq: pdbseq
      pearson: pearson
      phylip: phylip
      phylipnon: phylipnon
      raw: raw
      refseqp: refseqp
      sam: sam
      selex: selex
      staden: staden
      stockholm: stockholm
      strider: strider
      swiss: swiss
      text: text
      treecon: treecon
  sbegin-sequence:
    name: sbegin_sequence
    type: integer
    required: false
  send-sequence:
    name: send_sequence
    type: integer
    required: false
  sprotein-sequence:
    name: sprotein_sequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  snucleotide-sequence:
    name: snucleotide_sequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  sreverse-sequence:
    name: sreverse_sequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  slower-sequence:
    name: slower_sequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  supper-sequence:
    name: supper_sequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  window:
    name: window
    type: integer
    required: false
    description: Window length. Minimal distance between positively charged amino acids.
    min: 2
  order:
    name: order
    type: choice
    required: false
    description: "Sort order of results. Name of the output file which holds the results of the analysis. Results may be sorted by length, position and score."
    choices:
      length: length
      position: position
      score: score
  graph-format:
    name: graph_format
    type: choice
    required: false
    description: Format of the graphical output
    choices:
      png: png
      colourps: colourps
  mwdata:
    name: mwdata
    type: text
    required: false
    description: Molecular weights data file
  threshold:
    name: threshold
    type: decimal
    required: false
    description: "Threshold score. Threshold value to discriminate weak from potential PEST motifs. Valid PEST motifs are discriminated into 'poor' and 'potential' motifs depending on this threshold score. By default, the default value is set to +5.0 based on experimental data. Alterations are not recommended since significance is a matter of biology, not mathematics."
    min: -55.0
    max: 55.0
  mono:
    name: mono
    type: choice
    required: false
    description: Use monoisotopic weights
    choices:
      yes: Y
      no: N
  potential:
    name: potential
    type: choice
    required: false
    description: Display potential PEST motifs. Decide whether potential PEST motifs should be printed.
    choices:
      yes: Y
      no: N
  poor:
    name: poor
    type: choice
    required: false
    description: Display poor PEST motifs. Decide whether poor PEST motifs should be printed.
    choices:
      yes: Y
      no: N
  invalid:
    name: invalid
    type: choice
    required: false
    description: Display invalid PEST motifs. Decide whether invalid PEST motifs should be printed.
    choices:
      yes: Y
      no: N
  map:
    name: map
    type: choice
    required: false
    description: Display PEST motifs map. Decide whether PEST motifs should be mapped to sequence.
    choices:
      yes: Y
      no: N
  help:
    name: help
    type: choice
    required: false
    description: Help documentation of the tool.
    choices:
      yes: Y
      no: N

command: epestfind

args:
  sequence:
    arg: -sequence $(value)
    symlink: sequence.dat
  sformat-sequence:
    arg: -sformat1 $(value)
  sbegin-sequence:
    arg: -sbegin1 $(value)
  send-sequence:
    arg: -send1 $(value)
  sprotein-sequence:
    arg: -sprotein1 $(value)
  snucleotide-sequence:
    arg: -snucleotide1 $(value)
  sreverse-sequence:
    arg: -sreverse1 $(value)
  slower-sequence:
    arg: -slower1 $(value)
  supper-sequence:
    arg: -supper1 $(value)
  window:
    arg: -window $(value)
  order:
    arg: -order $(value)
  graph-format:
    arg: -graph_format $(value)
  mwdata:
    arg: -mwdata $(value)
  threshold:
    arg: -threshold $(value)
  mono:
    arg: -mono $(value)
  potential:
    arg: -potential $(value)
  poor:
    arg: -poor $(value)
  invalid:
    arg: -invalid $(value)
  map:
    arg: -map $(value)
  help:
    arg: -help $(value)
  _outfile:
    arg: -outfile $(value)
    default: outfile.txt

outputs:
  outfile:
    name: outfile
    path: outfile.txt
    media-type: text/plain
  log:
    name: log
    path: stdout
    media-type: text/plain
  error-log:
    name: error-log
    path: stderr
    media-type: text/plain

execution:
  runners:
    default:
      type: SlivkaQueueRunner
...
