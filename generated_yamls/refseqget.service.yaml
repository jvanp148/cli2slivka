---
slivka-version: 0.8.3
name: refseqget
description: Get reference sequence
version: '6.6.0.0'
author: EMBOSS
license: GPL
classifiers:
- 'Operation :: Data retrieval'
- 'Topic :: Data search and retrieval'

parameters:
  help:
    name: help
    type: choice
    required: false
    description: Help documentation of the tool.
    choices:
      yes: Y
      no: N

command: refseqget

args:
  help:
    arg: -help $(value)
  _output:
    arg: -output $(value)
    default: output.txt

outputs:
  output:
    name: output
    path: output.txt
    media-type: text/plain
  log:
    name: log
    path: stdout
    media-type: text/plain
  error-log:
    name: error-log
    path: stderr
    media-type: text/plain

execution:
  runners:
    default:
      type: SlivkaQueueRunner
...
