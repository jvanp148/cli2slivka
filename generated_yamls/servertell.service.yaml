---
slivka-version: 0.8.3
name: servertell
description: Display information about a public server
version: '6.6.0.0'
author: EMBOSS
license: GPL
classifiers:
- 'Operation :: Data retrieval (database metadata)'
- 'Topic :: Data handling'

parameters:
  server:
    name: server
    type: text
    required: false
    description: Server name. The name of the server defined locally for use by EMBOSS.
  full:
    name: full
    type: choice
    required: false
    description: Verbose output. The default behaviour is to report for relevant servers only basic information from the EMBOSS server definition
    choices:
      yes: Y
      no: N
  help:
    name: help
    type: choice
    required: false
    description: Help documentation of the tool.
    choices:
      yes: Y
      no: N

command: servertell

args:
  server:
    arg: -server $(value)
  full:
    arg: -full $(value)
  help:
    arg: -help $(value)
  _output:
    arg: -output $(value)
    default: output.txt

outputs:
  output:
    name: output
    path: output.txt
    media-type: text/plain
  log:
    name: log
    path: stdout
    media-type: text/plain
  error-log:
    name: error-log
    path: stderr
    media-type: text/plain

execution:
  runners:
    default:
      type: SlivkaQueueRunner
...
