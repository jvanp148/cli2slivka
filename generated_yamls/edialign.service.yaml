---
slivka-version: 0.8.3
name: edialign
description: Local multiple alignment of sequences
version: '6.6.0.0'
author: EMBOSS
license: GPL
classifiers:
- 'Operation :: Multiple sequence alignment construction (local)'
- 'Topic :: Sequence alignment'

parameters:
  sequences:
    name: sequences
    type: file
    required: true
  sformat-sequences:
    name: sformat_sequences
    type: choice
    required: false
    choices:
      abi: abi
      ace: ace
      acedb: acedb
      bam: bam
      biomart: biomart
      clustal: clustal
      codata: codata
      dbid: dbid
      embl: embl
      ensembl: ensembl
      experiment: experiment
      fasta: fasta
      fastq: fastq
      fastq-illumina: fastq-illumina
      fastq-sanger: fastq-sanger
      fastq-solexa: fastq-solexa
      fitch: fitch
      gcg: gcg
      genbank: genbank
      genpept: genpept
      gff2: gff2
      gff3: gff3
      gifasta: gifasta
      hennig86: hennig86
      ig: ig
      igstrict: igstrict
      jackknifer: jackknifer
      mase: mase
      mega: mega
      msf: msf
      nbrf: nbrf
      nexus: nexus
      pdb: pdb
      pdbnuc: pdbnuc
      pdbnucseq: pdbnucseq
      pdbseq: pdbseq
      pearson: pearson
      phylip: phylip
      phylipnon: phylipnon
      raw: raw
      refseqp: refseqp
      sam: sam
      selex: selex
      staden: staden
      stockholm: stockholm
      strider: strider
      swiss: swiss
      text: text
      treecon: treecon
  sbegin-sequences:
    name: sbegin_sequences
    type: integer
    required: false
  send-sequences:
    name: send_sequences
    type: integer
    required: false
  sprotein-sequences:
    name: sprotein_sequences
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  snucleotide-sequences:
    name: snucleotide_sequences
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  sreverse-sequences:
    name: sreverse_sequences
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  slower-sequences:
    name: slower_sequences
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  supper-sequences:
    name: supper_sequences
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  nucmode:
    name: nucmode
    type: text
    required: false
    description: "Nucleic acid sequence alignment mode (simple, translated or mixed)"
  revcomp:
    name: revcomp
    type: choice
    required: false
    description: Also consider the reverse complement
    choices:
      yes: Y
      no: N
  overlapw:
    name: overlapw
    type: text
    required: false
    description: Use overlap weights. By default overlap weights are used when Nseq =<35 but you can set this to 'yes' or 'no'
  linkage:
    name: linkage
    type: text
    required: false
    description: "Clustering method to construct sequence tree (UPGMA, minimum linkage or maximum linkage)"
  maxfragl:
    name: maxfragl
    type: integer
    required: false
    description: Maximum fragment length
    min: 0
  fragmat:
    name: fragmat
    type: choice
    required: false
    description: Consider only N-fragment pairs that start with two matches
    choices:
      yes: Y
      no: N
  fragsim:
    name: fragsim
    type: integer
    required: false
    description: Consider only P-fragment pairs if first amino acid or codon pair has similarity score of at least n
    min: 0
  itscore:
    name: itscore
    type: choice
    required: false
    description: Use iterative score
    choices:
      yes: Y
      no: N
  threshold:
    name: threshold
    type: decimal
    required: false
    description: Threshold for considering diagonal for alignment
    min: 0.0
  mask:
    name: mask
    type: choice
    required: false
    description: Replace unaligned characters by stars '*' rather then putting them in lowercase
    choices:
      yes: Y
      no: N
  dostars:
    name: dostars
    type: choice
    required: false
    description: Activate writing of stars instead of numbers
    choices:
      yes: Y
      no: N
  starnum:
    name: starnum
    type: integer
    required: false
    description: Put up to n stars '*' instead of digits 0-9 to indicate level of conservation
    min: 0
  outseq:
    name: outseq
    type: text
    required: false
    description: Returns sequence.
  osformat-outseq:
    name: osformat_outseq
    type: choice
    required: false
    description: Format of the output sequence (outseq)
    choices:
      acedb: acedb
      asn1: asn1
      bam: bam
      clustal: clustal
      codata: codata
      das: das
      dasdna: dasdna
      embl: embl
      experiment: experiment
      fasta: fasta
      fastq-illumina: fastq-illumina
      fastq-sanger: fastq-sanger
      fastq-solexa: fastq-solexa
      fitch: fitch
      gcg: gcg
      genbank: genbank
      genpept: genpept
      gff2: gff2
      gff3: gff3
      gifasta: gifasta
      hennig86: hennig86
      ig: ig
      jackknifer: jackknifer
      jackknifernon: jackknifernon
      mase: mase
      mega: mega
      meganon: meganon
      msf: msf
      nbrf: nbrf
      ncbi: ncbi
      nexus: nexus
      nexusnon: nexusnon
      phylip: phylip
      phylipnon: phylipnon
      pir: pir
      raw: raw
      refseq: refseq
      refseqp: refseqp
      sam: sam
      selex: selex
      staden: staden
      strider: strider
      swiss: swiss
      text: text
      treecon: treecon
  nucmode-n:
    name: nucmode_n
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  nucmode-nt:
    name: nucmode_nt
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  nucmode-ma:
    name: nucmode_ma
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  overlapw-default-when-nseq-35-:
    name: overlapw_default__when_Nseq____35_
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  overlapw-yes:
    name: overlapw_yes
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  overlapw-no:
    name: overlapw_no
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  linkage-upgma:
    name: linkage_UPGMA
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  linkage-max:
    name: linkage_max
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  linkage-min:
    name: linkage_min
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  help:
    name: help
    type: choice
    required: false
    description: Help documentation of the tool.
    choices:
      yes: Y
      no: N

command: edialign

args:
  sequences:
    arg: -sequences $(value)
    symlink: sequences.dat
  sformat-sequences:
    arg: -sformat1 $(value)
  sbegin-sequences:
    arg: -sbegin1 $(value)
  send-sequences:
    arg: -send1 $(value)
  sprotein-sequences:
    arg: -sprotein1 $(value)
  snucleotide-sequences:
    arg: -snucleotide1 $(value)
  sreverse-sequences:
    arg: -sreverse1 $(value)
  slower-sequences:
    arg: -slower1 $(value)
  supper-sequences:
    arg: -supper1 $(value)
  nucmode:
    arg: -nucmode $(value)
  revcomp:
    arg: -revcomp $(value)
  overlapw:
    arg: -overlapw $(value)
  linkage:
    arg: -linkage $(value)
  maxfragl:
    arg: -maxfragl $(value)
  fragmat:
    arg: -fragmat $(value)
  fragsim:
    arg: -fragsim $(value)
  itscore:
    arg: -itscore $(value)
  threshold:
    arg: -threshold $(value)
  mask:
    arg: -mask $(value)
  dostars:
    arg: -dostars $(value)
  starnum:
    arg: -starnum $(value)
  outseq:
    arg: -outseq $(value)
  osformat-outseq:
    arg: -osformat_outseq $(value)
  nucmode-n:
    arg: -nucmode_n $(value)
  nucmode-nt:
    arg: -nucmode_nt $(value)
  nucmode-ma:
    arg: -nucmode_ma $(value)
  overlapw-default-when-nseq-35-:
    arg: -overlapw_default__when_Nseq____35_ $(value)
  overlapw-yes:
    arg: -overlapw_yes $(value)
  overlapw-no:
    arg: -overlapw_no $(value)
  linkage-upgma:
    arg: -linkage_UPGMA $(value)
  linkage-max:
    arg: -linkage_max $(value)
  linkage-min:
    arg: -linkage_min $(value)
  help:
    arg: -help $(value)
  _outfile:
    arg: -outfile $(value)
    default: outfile.out

outputs:
  sequence-alignment:
    name: sequence-alignment
    path: outfile.out
    media-type: text/plain
  log:
    name: log
    path: stdout
    media-type: text/plain
  error-log:
    name: error-log
    path: stderr
    media-type: text/plain

execution:
  runners:
    default:
      type: SlivkaQueueRunner
...
