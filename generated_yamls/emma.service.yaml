---
slivka-version: 0.8.3
name: emma
description: Multiple sequence alignment (ClustalW wrapper)
version: '6.6.0.0'
author: EMBOSS
license: GPL
classifiers:
- 'Operation :: Multiple sequence alignment construction (phylogenetic tree-based)'
- 'Topic :: Sequence alignment'

parameters:
  sequence:
    name: sequence
    type: file
    required: true
  sformat-sequence:
    name: sformat_sequence
    type: choice
    required: false
    choices:
      abi: abi
      ace: ace
      acedb: acedb
      bam: bam
      biomart: biomart
      clustal: clustal
      codata: codata
      dbid: dbid
      embl: embl
      ensembl: ensembl
      experiment: experiment
      fasta: fasta
      fastq: fastq
      fastq-illumina: fastq-illumina
      fastq-sanger: fastq-sanger
      fastq-solexa: fastq-solexa
      fitch: fitch
      gcg: gcg
      genbank: genbank
      genpept: genpept
      gff2: gff2
      gff3: gff3
      gifasta: gifasta
      hennig86: hennig86
      ig: ig
      igstrict: igstrict
      jackknifer: jackknifer
      mase: mase
      mega: mega
      msf: msf
      nbrf: nbrf
      nexus: nexus
      pdb: pdb
      pdbnuc: pdbnuc
      pdbnucseq: pdbnucseq
      pdbseq: pdbseq
      pearson: pearson
      phylip: phylip
      phylipnon: phylipnon
      raw: raw
      refseqp: refseqp
      sam: sam
      selex: selex
      staden: staden
      stockholm: stockholm
      strider: strider
      swiss: swiss
      text: text
      treecon: treecon
  sbegin-sequence:
    name: sbegin_sequence
    type: integer
    required: false
  send-sequence:
    name: send_sequence
    type: integer
    required: false
  sprotein-sequence:
    name: sprotein_sequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  snucleotide-sequence:
    name: snucleotide_sequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  sreverse-sequence:
    name: sreverse_sequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  slower-sequence:
    name: slower_sequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  supper-sequence:
    name: supper_sequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  dendoutfile:
    name: dendoutfile
    type: text
    required: false
    description: Dendrogram (tree file) from clustalw output file
  onlydend:
    name: onlydend
    type: choice
    required: false
    description: Only produce dendrogram file
    choices:
      yes: Y
      no: N
  dendreuse:
    name: dendreuse
    type: choice
    required: false
    description: Do alignment using an old dendrogram
    choices:
      yes: Y
      no: N
  dendfile:
    name: dendfile
    type: text
    required: false
    description: Dendrogram (tree file) from clustalw file (optional)
  slowalign:
    name: slowalign
    type: choice
    required: false
    description: "Do you want to carry out slow pairwise alignment. A distance is calculated between every pair of sequences and these are used to construct the dendrogram which guides the final multiple alignment. The scores are calculated from separate pairwise alignments. These can be calculated using 2 methods: dynamic programming (slow but accurate) or by the method of Wilbur and Lipman (extremely fast but approximate). The slow-accurate method is fine for short sequences but will be VERY SLOW for many (e.g. >100) long (e.g. >1000 residue) sequences."
    choices:
      yes: Y
      no: N
  pwmatrix:
    name: pwmatrix
    type: choice
    required: false
    description: "Protein pairwise alignment matrix options. The scoring table which describes the similarity of each amino acid to each other. There are three 'in-built' series of weight matrices offered. Each consists of several matrices which work differently at different evolutionary distances. To see the exact details, read the documentation. Crudely, we store several matrices in memory, spanning the full range of amino acid distance (from almost identical sequences to highly divergent ones). For very similar sequences, it is best to use a strict weight matrix which only gives a high score to identities and the most favoured conservative substitutions. For more divergent sequences, it is appropriate to use 'softer' matrices which give a high score to many other frequent substitutions. 1) BLOSUM (Henikoff). These matrices appear to be the best available for carrying out data base similarity (homology searches). The matrices used are: Blosum80, 62, 45 and 30. 2) PAM (Dayhoff). These have been extremely widely used since the late '70s. We use the PAM 120, 160, 250 and 350 matrices. 3) GONNET . These matrices were derived using almost the same procedure as the Dayhoff one (above) but are much more up to date and are based on a far larger data set. They appear to be more sensitive than the Dayhoff series. We use the GONNET 40, 80, 120, 160, 250 and 350 matrices. We also supply an identity matrix which gives a score of 1.0 to two identical amino acids and a score of zero otherwise. This matrix is not very useful."
    choices:
      b: b
      p: p
      g: g
      i: i
      o: o
  pwdnamatrix:
    name: pwdnamatrix
    type: choice
    required: false
    description: DNA pairwise alignment matrix options. The scoring table which describes the scores assigned to matches and mismatches (including IUB ambiguity codes).
    choices:
      i: i
      c: c
      o: o
  pairwisedatafile:
    name: pairwisedatafile
    type: text
    required: false
    description: Comparison matrix file (optional)
  matrix:
    name: matrix
    type: choice
    required: false
    description: "Protein multiple alignment matrix options. This gives a menu where you are offered a choice of weight matrices. The default for proteins is the PAM series derived by Gonnet and colleagues. Note, a series is used! The actual matrix that is used depends on how similar the sequences to be aligned at this alignment step are. Different matrices work differently at each evolutionary distance. There are three 'in-built' series of weight matrices offered. Each consists of several matrices which work differently at different evolutionary distances. To see the exact details, read the documentation. Crudely, we store several matrices in memory, spanning the full range of amino acid distance (from almost identical sequences to highly divergent ones). For very similar sequences, it is best to use a strict weight matrix which only gives a high score to identities and the most favoured conservative substitutions. For more divergent sequences, it is appropriate to use 'softer' matrices which give a high score to many other frequent substitutions. 1) BLOSUM (Henikoff). These matrices appear to be the best available for carrying out data base similarity (homology searches). The matrices used are: Blosum80, 62, 45 and 30. 2) PAM (Dayhoff). These have been extremely widely used since the late '70s. We use the PAM 120, 160, 250 and 350 matrices. 3) GONNET . These matrices were derived using almost the same procedure as the Dayhoff one (above) but are much more up to date and are based on a far larger data set. They appear to be more sensitive than the Dayhoff series. We use the GONNET 40, 80, 120, 160, 250 and 350 matrices. We also supply an identity matrix which gives a score of 1.0 to two identical amino acids and a score of zero otherwise. This matrix is not very useful. Alternatively, you can read in your own (just one matrix, not a series)."
    choices:
      b: b
      p: p
      g: g
      i: i
      o: o
  dnamatrix:
    name: dnamatrix
    type: choice
    required: false
    description: Nucleotide multiple alignment matrix options. This gives a menu where a single matrix (not a series) can be selected.
    choices:
      i: i
      c: c
      o: o
  mamatrixfile:
    name: mamatrixfile
    type: text
    required: false
    description: Comparison matrix file (optional)
  pwgapopen:
    name: pwgapopen
    type: decimal
    required: false
    description: "Slow pairwise alignment: gap opening penalty. The penalty for opening a gap in the pairwise alignments."
    min: 0.0
  pwgapextend:
    name: pwgapextend
    type: decimal
    required: false
    description: "Slow pairwise alignment: gap extension penalty. The penalty for extending a gap by 1 residue in the pairwise alignments."
    min: 0.0
  ktup:
    name: ktup
    type: integer
    required: false
    description: "Fast pairwise alignment: similarity scores: K-Tuple size. This is the size of exactly matching fragment that is used. INCREASE for speed (max= 2 for proteins; 4 for DNA), DECREASE for sensitivity. For longer sequences (e.g. >1000 residues) you may need to increase the default."
    min: 0
    max: 4
  gapw:
    name: gapw
    type: integer
    required: false
    description: "Fast pairwise alignment: similarity scores: gap penalty. This is a penalty for each gap in the fast alignments. It has little affect on the speed or sensitivity except for extreme values."
    min: 0
  topdiags:
    name: topdiags
    type: integer
    required: false
    description: "Fast pairwise alignment: similarity scores: number of diagonals to be considered. The number of k-tuple matches on each diagonal (in an imaginary dot-matrix plot) is calculated. Only the best ones (with most matches) are used in the alignment. This parameter specifies how many. Decrease for speed; increase for sensitivity."
    min: 0
  window:
    name: window
    type: integer
    required: false
    description: "Fast pairwise alignment: similarity scores: diagonal window size. This is the number of diagonals around each of the 'best' diagonals that will be used. Decrease for speed; increase for sensitivity."
    min: 0
  nopercent:
    name: nopercent
    type: choice
    required: false
    description: "Fast pairwise alignment: similarity scores: suppresses percentage score"
    choices:
      yes: Y
      no: N
  gapopen:
    name: gapopen
    type: decimal
    required: false
    description: "Multiple alignment: Gap opening penalty. The penalty for opening a gap in the alignment. Increasing the gap opening penalty will make gaps less frequent."
    min: 0.0
  gapextend:
    name: gapextend
    type: decimal
    required: false
    description: "Multiple alignment: Gap extension penalty. The penalty for extending a gap by 1 residue. Increasing the gap extension penalty will make gaps shorter. Terminal gaps are not penalised."
    min: 0.0
  endgaps:
    name: endgaps
    type: choice
    required: false
    description: "Use end gap separation penalty. End gap separation: treats end gaps just like internal gaps for the purposes of avoiding gaps that are too close (set by 'gap separation distance'). If you turn this off, end gaps will be ignored for this purpose. This is useful when you wish to align fragments where the end gaps are not biologically meaningful."
    choices:
      yes: Y
      no: N
  gapdist:
    name: gapdist
    type: integer
    required: false
    description: "Gap separation distance: tries to decrease the chances of gaps being too close to each other. Gaps that are less than this distance apart are penalised more than other gaps. This does not prevent close gaps; it makes them less frequent, promoting a block-like appearance of the alignment."
    min: 0
  norgap:
    name: norgap
    type: choice
    required: false
    description: "No residue specific gaps. Residue specific penalties: amino acid specific gap penalties that reduce or increase the gap opening penalties at each position in the alignment or sequence. As an example, positions that are rich in glycine are more likely to have an adjacent gap than positions that are rich in valine."
    choices:
      yes: Y
      no: N
  hgapres:
    name: hgapres
    type: text
    required: false
    description: List of hydrophilic residues. This is a set of the residues 'considered' to be hydrophilic. It is used when introducing Hydrophilic gap penalties.
  nohgap:
    name: nohgap
    type: choice
    required: false
    description: "No hydrophilic gaps. Hydrophilic gap penalties: used to increase the chances of a gap within a run (5 or more residues) of hydrophilic amino acids; these are likely to be loop or random coil regions where gaps are more common. The residues that are 'considered' to be hydrophilic are set by '-hgapres'."
    choices:
      yes: Y
      no: N
  maxdiv:
    name: maxdiv
    type: integer
    required: false
    description: "Cut-off to delay the alignment of the most divergent sequences. This switch, delays the alignment of the most distantly related sequences until after the most closely related sequences have been aligned. The setting shows the percent identity level required to delay the addition of a sequence; sequences that are less identical than this level to any other sequences will be aligned later."
    min: 0
    max: 100
  outseq:
    name: outseq
    type: text
    required: false
    description: Returns sequence.
  osformat-outseq:
    name: osformat_outseq
    type: choice
    required: false
    description: Format of the output sequence (outseq)
    choices:
      acedb: acedb
      asn1: asn1
      bam: bam
      clustal: clustal
      codata: codata
      das: das
      dasdna: dasdna
      embl: embl
      experiment: experiment
      fasta: fasta
      fastq-illumina: fastq-illumina
      fastq-sanger: fastq-sanger
      fastq-solexa: fastq-solexa
      fitch: fitch
      gcg: gcg
      genbank: genbank
      genpept: genpept
      gff2: gff2
      gff3: gff3
      gifasta: gifasta
      hennig86: hennig86
      ig: ig
      jackknifer: jackknifer
      jackknifernon: jackknifernon
      mase: mase
      mega: mega
      meganon: meganon
      msf: msf
      nbrf: nbrf
      ncbi: ncbi
      nexus: nexus
      nexusnon: nexusnon
      phylip: phylip
      phylipnon: phylipnon
      pir: pir
      raw: raw
      refseq: refseq
      refseqp: refseqp
      sam: sam
      selex: selex
      staden: staden
      strider: strider
      swiss: swiss
      text: text
      treecon: treecon
  help:
    name: help
    type: choice
    required: false
    description: Help documentation of the tool.
    choices:
      yes: Y
      no: N

command: emma

args:
  sequence:
    arg: -sequence $(value)
    symlink: sequence.dat
  sformat-sequence:
    arg: -sformat1 $(value)
  sbegin-sequence:
    arg: -sbegin1 $(value)
  send-sequence:
    arg: -send1 $(value)
  sprotein-sequence:
    arg: -sprotein1 $(value)
  snucleotide-sequence:
    arg: -snucleotide1 $(value)
  sreverse-sequence:
    arg: -sreverse1 $(value)
  slower-sequence:
    arg: -slower1 $(value)
  supper-sequence:
    arg: -supper1 $(value)
  dendoutfile:
    arg: -dendoutfile $(value)
  onlydend:
    arg: -onlydend $(value)
  dendreuse:
    arg: -dendreuse $(value)
  dendfile:
    arg: -dendfile $(value)
  slowalign:
    arg: -slowalign $(value)
  pwmatrix:
    arg: -pwmatrix $(value)
  pwdnamatrix:
    arg: -pwdnamatrix $(value)
  pairwisedatafile:
    arg: -pairwisedatafile $(value)
  matrix:
    arg: -matrix $(value)
  dnamatrix:
    arg: -dnamatrix $(value)
  mamatrixfile:
    arg: -mamatrixfile $(value)
  pwgapopen:
    arg: -pwgapopen $(value)
  pwgapextend:
    arg: -pwgapextend $(value)
  ktup:
    arg: -ktup $(value)
  gapw:
    arg: -gapw $(value)
  topdiags:
    arg: -topdiags $(value)
  window:
    arg: -window $(value)
  nopercent:
    arg: -nopercent $(value)
  gapopen:
    arg: -gapopen $(value)
  gapextend:
    arg: -gapextend $(value)
  endgaps:
    arg: -endgaps $(value)
  gapdist:
    arg: -gapdist $(value)
  norgap:
    arg: -norgap $(value)
  hgapres:
    arg: -hgapres $(value)
  nohgap:
    arg: -nohgap $(value)
  maxdiv:
    arg: -maxdiv $(value)
  outseq:
    arg: -outseq $(value)
  osformat-outseq:
    arg: -osformat_outseq $(value)
  help:
    arg: -help $(value)
  _outfile:
    arg: -outfile $(value)
    default: outfile.out

outputs:
  output:
    name: output
    path: outfile.out
    media-type: text/plain
  log:
    name: log
    path: stdout
    media-type: text/plain
  error-log:
    name: error-log
    path: stderr
    media-type: text/plain

execution:
  runners:
    default:
      type: SlivkaQueueRunner
...
