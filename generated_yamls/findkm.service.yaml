---
slivka-version: 0.8.3
name: findkm
description: Calculate and plot enzyme reaction data
version: '6.6.0.0'
author: EMBOSS
license: GPL
classifiers:
- 'Operation :: Enzyme kinetics calculation'
- 'Topic :: Enzymes and reactions'

parameters:
  infile:
    name: infile
    type: text
    required: true
    description: Enzyme kinetics data (application-specific) file
  graph-format:
    name: graph_format
    type: choice
    required: false
    description: Format of the graphical output
    choices:
      png: png
      colourps: colourps
  plot:
    name: plot
    type: choice
    required: false
    description: S/V vs S
    choices:
      yes: Y
      no: N
  help:
    name: help
    type: choice
    required: false
    description: Help documentation of the tool.
    choices:
      yes: Y
      no: N

command: findkm

args:
  infile:
    arg: -infile $(value)
  graph-format:
    arg: -graph_format $(value)
  plot:
    arg: -plot $(value)
  help:
    arg: -help $(value)
  _outfile:
    arg: -outfile $(value)
    default: outfile.txt
  _Graphics_in_Postscript:
    arg: -Graphics_in_Postscript $(value)
    default: Graphics_in_Postscript.txt
  _Graphics_in_PNG:
    arg: -Graphics_in_PNG $(value)
    default: Graphics_in_PNG.txt

outputs:
  outfile:
    name: outfile
    path: outfile.txt
    media-type: text/plain
  Graphics_in_Postscript:
    name: Graphics_in_Postscript
    path: Graphics_in_Postscript.txt
    media-type: text/plain
  Graphics_in_PNG:
    name: Graphics_in_PNG
    path: Graphics_in_PNG.txt
    media-type: text/plain
  log:
    name: log
    path: stdout
    media-type: text/plain
  error-log:
    name: error-log
    path: stderr
    media-type: text/plain

execution:
  runners:
    default:
      type: SlivkaQueueRunner
...
