---
slivka-version: 0.8.3
name: restover
description: Find restriction enzymes producing a specific overhang
version: '6.6.0.0'
author: EMBOSS
license: GPL
classifiers:
- 'Operation :: Restriction site recognition'
- 'Topic :: Nucleic acid restriction'

parameters:
  sequence:
    name: sequence
    type: file
    required: true
  sformat-sequence:
    name: sformat_sequence
    type: choice
    required: false
    choices:
      abi: abi
      ace: ace
      acedb: acedb
      bam: bam
      biomart: biomart
      clustal: clustal
      codata: codata
      dbid: dbid
      embl: embl
      ensembl: ensembl
      experiment: experiment
      fasta: fasta
      fastq: fastq
      fastq-illumina: fastq-illumina
      fastq-sanger: fastq-sanger
      fastq-solexa: fastq-solexa
      fitch: fitch
      gcg: gcg
      genbank: genbank
      genpept: genpept
      gff2: gff2
      gff3: gff3
      gifasta: gifasta
      hennig86: hennig86
      ig: ig
      igstrict: igstrict
      jackknifer: jackknifer
      mase: mase
      mega: mega
      msf: msf
      nbrf: nbrf
      nexus: nexus
      pdb: pdb
      pdbnuc: pdbnuc
      pdbnucseq: pdbnucseq
      pdbseq: pdbseq
      pearson: pearson
      phylip: phylip
      phylipnon: phylipnon
      raw: raw
      refseqp: refseqp
      sam: sam
      selex: selex
      staden: staden
      stockholm: stockholm
      strider: strider
      swiss: swiss
      text: text
      treecon: treecon
  sbegin-sequence:
    name: sbegin_sequence
    type: integer
    required: false
  send-sequence:
    name: send_sequence
    type: integer
    required: false
  sprotein-sequence:
    name: sprotein_sequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  snucleotide-sequence:
    name: snucleotide_sequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  sreverse-sequence:
    name: sreverse_sequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  slower-sequence:
    name: slower_sequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  supper-sequence:
    name: supper_sequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  seqcomp:
    name: seqcomp
    type: text
    required: true
    description: Overlap sequence
  datafile:
    name: datafile
    type: text
    required: false
    description: Restriction enzyme data file (optional)
  mfile:
    name: mfile
    type: text
    required: false
    description: Restriction enzyme methylation data file
  min:
    name: min
    type: integer
    required: false
    description: Minimum cuts per RE
    min: 1
    max: 1000
  max:
    name: max
    type: integer
    required: false
    description: Maximum cuts per RE
  single:
    name: single
    type: choice
    required: false
    description: Force single site only cuts
    choices:
      yes: Y
      no: N
  threeprime:
    name: threeprime
    type: choice
    required: false
    description: "Use 3' overhang e.g. BamHI has CTAG as a 5' overhang, and ApaI has CCGG as 3' overhang"
    choices:
      yes: Y
      no: N
  blunt:
    name: blunt
    type: choice
    required: false
    description: Allow blunt end cutters
    choices:
      yes: Y
      no: N
  sticky:
    name: sticky
    type: choice
    required: false
    description: Allow sticky end cutters
    choices:
      yes: Y
      no: N
  ambiguity:
    name: ambiguity
    type: choice
    required: false
    description: Allow ambiguous matches
    choices:
      yes: Y
      no: N
  plasmid:
    name: plasmid
    type: choice
    required: false
    description: Allow circular DNA
    choices:
      yes: Y
      no: N
  methylation:
    name: methylation
    type: choice
    required: false
    description: Use methylation data. If this is set then RE recognition sites will not match methylated bases.
    choices:
      yes: Y
      no: N
  commercial:
    name: commercial
    type: choice
    required: false
    description: Only enzymes with suppliers
    choices:
      yes: Y
      no: N
  html:
    name: html
    type: choice
    required: false
    description: Create HTML output
    choices:
      yes: Y
      no: N
  limit:
    name: limit
    type: choice
    required: false
    description: Limits reports to one isoschizomer
    choices:
      yes: Y
      no: N
  alphabetic:
    name: alphabetic
    type: choice
    required: false
    description: Sort output alphabetically
    choices:
      yes: Y
      no: N
  fragments:
    name: fragments
    type: choice
    required: false
    description: Show fragment lengths
    choices:
      yes: Y
      no: N
  help:
    name: help
    type: choice
    required: false
    description: Help documentation of the tool.
    choices:
      yes: Y
      no: N

command: restover

args:
  sequence:
    arg: -sequence $(value)
    symlink: sequence.dat
  sformat-sequence:
    arg: -sformat1 $(value)
  sbegin-sequence:
    arg: -sbegin1 $(value)
  send-sequence:
    arg: -send1 $(value)
  sprotein-sequence:
    arg: -sprotein1 $(value)
  snucleotide-sequence:
    arg: -snucleotide1 $(value)
  sreverse-sequence:
    arg: -sreverse1 $(value)
  slower-sequence:
    arg: -slower1 $(value)
  supper-sequence:
    arg: -supper1 $(value)
  seqcomp:
    arg: -seqcomp $(value)
  datafile:
    arg: -datafile $(value)
  mfile:
    arg: -mfile $(value)
  min:
    arg: -min $(value)
  max:
    arg: -max $(value)
  single:
    arg: -single $(value)
  threeprime:
    arg: -threeprime $(value)
  blunt:
    arg: -blunt $(value)
  sticky:
    arg: -sticky $(value)
  ambiguity:
    arg: -ambiguity $(value)
  plasmid:
    arg: -plasmid $(value)
  methylation:
    arg: -methylation $(value)
  commercial:
    arg: -commercial $(value)
  html:
    arg: -html $(value)
  limit:
    arg: -limit $(value)
  alphabetic:
    arg: -alphabetic $(value)
  fragments:
    arg: -fragments $(value)
  help:
    arg: -help $(value)
  _outfile:
    arg: -outfile $(value)
    default: outfile.txt

outputs:
  outfile:
    name: outfile
    path: outfile.txt
    media-type: text/plain
  log:
    name: log
    path: stdout
    media-type: text/plain
  error-log:
    name: error-log
    path: stderr
    media-type: text/plain

execution:
  runners:
    default:
      type: SlivkaQueueRunner
...
