---
slivka-version: 0.8.3
name: files
description: Copying and merging files to standard output
version: '1.0'
author: EMBOSS
license: GPL

parameters:
  input:
    name: input
    type: text
    required: false
  output:
    name: output
    type: text
    required: false
  help:
    name: help
    type: choice
    required: false
    description: Help documentation of the tool.
    choices:
      yes: Y
      no: N

command: copy-files.pl

args:
  input:
    arg: -input $(value)
  output:
    arg: -output $(value)
  help:
    arg: -help $(value)
  _outfile:
    arg: -outfile $(value)
    default: outfile.out

outputs:
  output:
    name: output
    path: outfile.out
    media-type: text/plain
  log:
    name: log
    path: stdout
    media-type: text/plain
  error-log:
    name: error-log
    path: stderr
    media-type: text/plain

execution:
  runners:
    default:
      type: SlivkaQueueRunner
...
