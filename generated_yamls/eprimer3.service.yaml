---
slivka-version: 0.8.3
name: eprimer3
description: Pick PCR primers and hybridization oligos
version: '6.6.0.0'
author: EMBOSS
license: GPL
classifiers:
- 'Operation :: PCR primer design'
- 'Operation :: Microarray probe design'
- 'Topic :: Nucleic acid analysis'

parameters:
  sequence:
    name: sequence
    type: file
    required: true
    description: The sequence from which to choose primers. The sequence must be presented 5' to 3'
  sformat-sequence:
    name: sformat_sequence
    type: choice
    required: false
    choices:
      abi: abi
      ace: ace
      acedb: acedb
      bam: bam
      biomart: biomart
      clustal: clustal
      codata: codata
      dbid: dbid
      embl: embl
      ensembl: ensembl
      experiment: experiment
      fasta: fasta
      fastq: fastq
      fastq-illumina: fastq-illumina
      fastq-sanger: fastq-sanger
      fastq-solexa: fastq-solexa
      fitch: fitch
      gcg: gcg
      genbank: genbank
      genpept: genpept
      gff2: gff2
      gff3: gff3
      gifasta: gifasta
      hennig86: hennig86
      ig: ig
      igstrict: igstrict
      jackknifer: jackknifer
      mase: mase
      mega: mega
      msf: msf
      nbrf: nbrf
      nexus: nexus
      pdb: pdb
      pdbnuc: pdbnuc
      pdbnucseq: pdbnucseq
      pdbseq: pdbseq
      pearson: pearson
      phylip: phylip
      phylipnon: phylipnon
      raw: raw
      refseqp: refseqp
      sam: sam
      selex: selex
      staden: staden
      stockholm: stockholm
      strider: strider
      swiss: swiss
      text: text
      treecon: treecon
  sbegin-sequence:
    name: sbegin_sequence
    type: integer
    required: false
  send-sequence:
    name: send_sequence
    type: integer
    required: false
  sprotein-sequence:
    name: sprotein_sequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  snucleotide-sequence:
    name: snucleotide_sequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  sreverse-sequence:
    name: sreverse_sequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  slower-sequence:
    name: slower_sequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  supper-sequence:
    name: supper_sequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  selfend:
    name: selfend
    type: decimal
    required: false
    description: "Maximum 3' self complementarity. The maximum allowable 3'-anchored global alignment score when testing a single primer for self-complementarity, and the maximum allowable 3'-anchored global alignment score when testing for complementarity between forward and reverse primers. The 3'-anchored global alignment score is taken to predict the likelihood of PCR-priming primer-dimers, for example 5' ATGCCCTAGCTTCCGGATG 3' .............||| ||||| ..........3' AAGTCCTACATTTAGCCTAGT 5' or 5' AGGCTATGGGCCTCGCGA 3' ...............|||||| ............3' AGCGCTCCGGGTATCGGA 5' The scoring system is as for the Maximum Complementarity argument. In the examples above the scores are 7.00 and 6.00 respectively. Scores are non-negative, and a score of 0.00 indicates that there is no reasonable 3'-anchored global alignment between two oligos. In order to estimate 3'-anchored global alignments for candidate primers and primer pairs, Primer assumes that the sequence from which to choose primers is presented 5' to 3'. It is nonsensical to provide a larger value for this parameter than for the Maximum (local) Complementarity parameter because the score of a local alignment will always be at least as great as the score of a global alignment."
    min: 0.0
  primer:
    name: primer
    type: choice
    required: false
    description: Pick PCR primer(s). Tell EPrimer3 to pick primer(s)
    choices:
      yes: Y
      no: N
  task:
    name: task
    type: choice
    required: false
    description: "Task. Tell EPrimer3 what task to perform. Legal values are 1: 'Pick PCR primers', 2: 'Pick forward primer only', 3: 'Pick reverse primer only', 4: 'No primers needed'."
    choices:
      "1": "1"
      "2": "2"
      "3": "3"
      "4": "4"
  hybridprobe:
    name: hybridprobe
    type: choice
    required: false
    description: Pick hybridization probe. An 'internal oligo' is intended to be used as a hybridization probe (hyb probe) to detect the PCR product after amplification.
    choices:
      yes: Y
      no: N
  mishyblibraryfile:
    name: mishyblibraryfile
    type: text
    required: false
    description: "Primer3 internal oligo mishybridizing library file (optional). Similar to MISPRIMING-LIBRARY, except that the event we seek to avoid is hybridization of the internal oligo to sequences in this library rather than priming from them. The file must be in (a slightly restricted) FASTA format (W. B. Pearson and D.J. Lipman, PNAS 85:8 pp 2444-2448 [1988]); we briefly discuss the organization of this file below. If this parameter is specified then EPrimer3 locally aligns each candidate oligo against each library sequence and rejects those primers for which the local alignment score times a specified weight (see below) exceeds INTERNAL-OLIGO-MAX-MISHYB. (The maximum value of the weight is arbitrarily set to 12.0.) Each sequence entry in the FASTA-format file must begin with an 'id line' that starts with '>'. The contents of the id line is 'slightly restricted' in that EPrimer3 parses everything after any optional asterisk ('*') as a floating point number to use as the weight mentioned above. If the id line contains no asterisk then the weight defaults to 1.0. The alignment scoring system used is the same as for calculating complementarity among oligos (e.g. SELF-ANY). The remainder of an entry contains the sequence as lines following the id line up until a line starting with '>' or the end of the file. Whitespace and newlines are ignored. Characters 'A', 'T', 'G', 'C', 'a', 't', 'g', 'c' are retained and any other character is converted to 'N' (with the consequence that any IUB / IUPAC codes for ambiguous bases are converted to 'N'). There are no restrictions on line length. An empty value for this parameter indicates that no library should be used."
  mispriminglibraryfile:
    name: mispriminglibraryfile
    type: text
    required: false
    description: "Primer3 mispriming library file (optional). The name of a file containing a nucleotide sequence library of sequences to avoid amplifying (for example repetitive sequences, or possibly the sequences of genes in a gene family that should not be amplified.) The file must be in (a slightly restricted) FASTA format (W. B. Pearson and D.J. Lipman, PNAS 85:8 pp 2444-2448 [1988]); we briefly discuss the organization of this file below. If this parameter is specified then EPrimer3 locally aligns each candidate primer against each library sequence and rejects those primers for which the local alignment score times a specified weight (see below) exceeds MAX-MISPRIMING. (The maximum value of the weight is arbitrarily set to 100.0.) Each sequence entry in the FASTA-format file must begin with an 'id line' that starts with '>'. The contents of the id line is 'slightly restricted' in that EPrimer3 parses everything after any optional asterisk ('*') as a floating point number to use as the weight mentioned above. If the id line contains no asterisk then the weight defaults to 1.0. The alignment scoring system used is the same as for calculating complementarity among oligos (e.g. SELF-ANY). The remainder of an entry contains the sequence as lines following the id line up until a line starting with '>' or the end of the file. Whitespace and newlines are ignored. Characters 'A', 'T', 'G', 'C', 'a', 't', 'g', 'c' are retained and any other character is converted to 'N' (with the consequence that any IUB / IUPAC codes for ambiguous bases are converted to 'N'). There are no restrictions on line length. An empty value for this parameter indicates that no repeat library should be used."
  numreturn:
    name: numreturn
    type: integer
    required: false
    description: "Number of results to return. The maximum number of primer pairs to return. Primer pairs returned are sorted by their 'quality', in other words by the value of the objective function (where a lower number indicates a better primer pair). Caution: setting this parameter to a large value will increase running time."
    min: 0
  includedregion:
    name: includedregion
    type: text
    required: false
    description: "Included region(s). A sub-region of the given sequence in which to pick primers. For example, often the first dozen or so bases of a sequence are vector, and should be excluded from consideration. The value for this parameter has the form (start),(end) where (start) is the index of the first base to consider, and (end) is the last in the primer-picking region."
  targetregion:
    name: targetregion
    type: text
    required: false
    description: "Target region(s). If one or more Targets is specified then a legal primer pair must flank at least one of them. A Target might be a simple sequence repeat site (for example a CA repeat) or a single-base-pair polymorphism. The value should be a space-separated list of (start),(end) pairs where (start) is the index of the first base of a Target, and (end) is the last E.g. 50,51 requires primers to surround the 2 bases at positions 50 and 51."
  excludedregion:
    name: excludedregion
    type: text
    required: false
    description: "Excluded region(s). Primer oligos may not overlap any region specified in this tag. The associated value must be a space-separated list of (start),(end) pairs where (start) is the index of the first base of the excluded region, and and (end) is the last. This tag is useful for tasks such as excluding regions of low sequence quality or for excluding regions containing repetitive elements such as ALUs or LINEs. E.g. 401,407 68,70 forbids selection of primers in the 7 bases starting at 401 and the 3 bases at 68."
  forwardinput:
    name: forwardinput
    type: text
    required: false
    description: Forward input primer sequence to check. The sequence of a forward primer to check and around which to design reverse primers and optional internal oligos. Must be a substring of SEQUENCE.
  reverseinput:
    name: reverseinput
    type: text
    required: false
    description: Reverse input primer sequence to check. The sequence of a reverse primer to check and around which to design forward primers and optional internal oligos. Must be a substring of the reverse strand of SEQUENCE.
  gcclamp:
    name: gcclamp
    type: integer
    required: false
    description: GC clamp. Require the specified number of consecutive Gs and Cs at the 3' end of both the forward and reverse primer. (This parameter has no effect on the internal oligo if one is requested.)
    min: 0
  optsize:
    name: optsize
    type: integer
    required: false
    description: Primer optimum size. Optimum length (in bases) of a primer oligo. EPrimer3 will attempt to pick primers close to this length.
    min: 0
  minsize:
    name: minsize
    type: integer
    required: false
    description: Primer minimum size. Minimum acceptable length of a primer. Must be greater than 0 and less than or equal to MAX-SIZE.
    min: 1
  maxsize:
    name: maxsize
    type: integer
    required: false
    description: Primer maximum size. Maximum acceptable length (in bases) of a primer. Currently this parameter cannot be larger than 35. This limit is governed by the maximum oligo size for which EPrimer3's melting-temperature is valid.
    max: 35
  opttm:
    name: opttm
    type: decimal
    required: false
    description: "Primer optimum Tm. Optimum melting temperature(Celsius) for a primer oligo. EPrimer3 will try to pick primers with melting temperatures are close to this temperature. The oligo melting temperature formula in EPrimer3 is that given in Rychlik, Spencer and Rhoads, Nucleic Acids Research, vol 18, num 21, pp 6409-6412 and Breslauer, Frank, Bloecker and Marky, Proc. Natl. Acad. Sci. USA, vol 83, pp 3746-3750. Please refer to the former paper for background discussion."
  mintm:
    name: mintm
    type: decimal
    required: false
    description: Primer minimum Tm. Minimum acceptable melting temperature(Celsius) for a primer oligo.
  maxtm:
    name: maxtm
    type: decimal
    required: false
    description: Primer maximum Tm. Maximum acceptable melting temperature(Celsius) for a primer oligo.
  maxdifftm:
    name: maxdifftm
    type: decimal
    required: false
    description: Maximum difference in Tm of primers. Maximum acceptable (unsigned) difference between the melting temperatures of the forward and reverse primers.
  ogcpercent:
    name: ogcpercent
    type: decimal
    required: false
    description: Primer optimum GC percent.
  mingc:
    name: mingc
    type: decimal
    required: false
    description: Primer minimum GC percent. Minimum allowable percentage of Gs and Cs in any primer.
  maxgc:
    name: maxgc
    type: decimal
    required: false
    description: Primer maximum GC percent. Maximum allowable percentage of Gs and Cs in any primer generated by Primer.
  saltconc:
    name: saltconc
    type: decimal
    required: false
    description: Salt concentration (mM). The millimolar concentration of salt (usually KCl) in the PCR. EPrimer3 uses this argument to calculate oligo melting temperatures.
  dnaconc:
    name: dnaconc
    type: decimal
    required: false
    description: "DNA concentration (nM). The nanomolar concentration of annealing oligos in the PCR. EPrimer3 uses this argument to calculate oligo melting temperatures. The default (50nM) works well with the standard protocol used at the Whitehead/MIT Center for Genome Research--0.5 microliters of 20 micromolar concentration for each primer oligo in a 20 microliter reaction with 10 nanograms template, 0.025 units/microliter Taq polymerase in 0.1 mM each dNTP, 1.5mM MgCl2, 50mM KCl, 10mM Tris-HCL (pH 9.3) using 35 cycles with an annealing temperature of 56 degrees Celsius. This parameter corresponds to 'c' in Rychlik, Spencer and Rhoads' equation (ii) (Nucleic Acids Research, vol 18, num 21) where a suitable value (for a lower initial concentration of template) is 'empirically determined'. The value of this parameter is less than the actual concentration of oligos in the reaction because it is the concentration of annealing oligos, which in turn depends on the amount of template (including PCR product) in a given cycle. This concentration increases a great deal during a PCR; fortunately PCR seems quite robust for a variety of oligo melting temperatures. See ADVICE FOR PICKING PRIMERS."
  maxpolyx:
    name: maxpolyx
    type: integer
    required: false
    description: "Maximum polynucleotide repeat. The maximum allowable length of a mononucleotide repeat in a primer, for example AAAAAA."
    min: 0
  psizeopt:
    name: psizeopt
    type: integer
    required: false
    description: Product optimum size. The optimum size for the PCR product. 0 indicates that there is no optimum product size.
    min: 0
  prange:
    name: prange
    type: text
    required: false
    description: "Product size range. The associated values specify the lengths of the product that the user wants the primers to create, and is a space separated list of elements of the form (x)-(y) where an (x)-(y) pair is a legal range of lengths for the product. For example, if one wants PCR products to be between 100 to 150 bases (inclusive) then one would set this parameter to 100-150. If one desires PCR products in either the range from 100 to 150 bases or in the range from 200 to 250 bases then one would set this parameter to 100-150 200-250. EPrimer3 favors ranges to the left side of the parameter string. EPrimer3 will return legal primers pairs in the first range regardless the value of the objective function for these pairs. Only if there are an insufficient number of primers in the first range will EPrimer3 return primers in a subsequent range."
  ptmopt:
    name: ptmopt
    type: decimal
    required: false
    description: Product optimum Tm. The optimum melting temperature for the PCR product. 0 indicates that there is no optimum temperature.
  ptmmin:
    name: ptmmin
    type: decimal
    required: false
    description: Product minimum Tm. The minimum allowed melting temperature of the amplicon. Please see the documentation on the maximum melting temperature of the product for details.
  ptmmax:
    name: ptmmax
    type: decimal
    required: false
    description: "Product maximum Tm. The maximum allowed melting temperature of the amplicon. Product Tm is calculated using the formula from Bolton and McCarthy, PNAS 84:1390 (1962) as presented in Sambrook, Fritsch and Maniatis, Molecular Cloning, p 11.46 (1989, CSHL Press). Tm = 81.5 + 16.6(log10([Na+])) + .41*(%GC) - 600/length Where [Na+} is the molar sodium concentration, (%GC) is the percent of Gs and Cs in the sequence, and length is the length of the sequence. A similar formula is used by the prime primer selection program in GCG, which instead uses 675.0/length in the last term (after F. Baldino, Jr, M.-F. Chesselet, and M.E. Lewis, Methods in Enzymology 168:766 (1989) eqn (1) on page 766 without the mismatch and formamide terms). The formulas here and in Baldino et al. assume Na+ rather than K+. According to J.G. Wetmur, Critical Reviews in BioChem. and Mol. Bio. 26:227 (1991) 50 mM K+ should be equivalent in these formulae to .2 M Na+. EPrimer3 uses the same salt concentration value for calculating both the primer melting temperature and the oligo melting temperature. If you are planning to use the PCR product for hybridization later this behavior will not give you the Tm under hybridization conditions."
  oexcludedregion:
    name: oexcludedregion
    type: text
    required: false
    description: "Internal oligo excluded region. Middle oligos may not overlap any region specified by this tag. The associated value must be a space-separated list of (start),(end) pairs, where (start) is the index of the first base of an excluded region, and (end) is the last. Often one would make Target regions excluded regions for internal oligos."
  oligoinput:
    name: oligoinput
    type: text
    required: false
    description: Internal oligo input sequence (if any). The sequence of an internal oligo to check and around which to design forward and reverse primers. Must be a substring of SEQUENCE.
  osizeopt:
    name: osizeopt
    type: integer
    required: false
    description: Internal oligo optimum size. Optimum length (in bases) of an internal oligo. EPrimer3 will attempt to pick primers close to this length.
    min: 0
  ominsize:
    name: ominsize
    type: integer
    required: false
    description: Internal oligo minimum size. Minimum acceptable length of an internal oligo. Must be greater than 0 and less than or equal to INTERNAL-OLIGO-MAX-SIZE.
    min: 0
  omaxsize:
    name: omaxsize
    type: integer
    required: false
    description: Internal oligo maximum size. Maximum acceptable length (in bases) of an internal oligo. Currently this parameter cannot be larger than 35. This limit is governed by maximum oligo size for which EPrimer3's melting-temperature is valid.
    max: 35
  otmopt:
    name: otmopt
    type: decimal
    required: false
    description: "Internal oligo optimum Tm. Optimum melting temperature (Celsius) for an internal oligo. EPrimer3 will try to pick oligos with melting temperatures that are close to this temperature. The oligo melting temperature formula in EPrimer3 is that given in Rychlik, Spencer and Rhoads, Nucleic Acids Research, vol 18, num 21, pp 6409-6412 and Breslauer, Frank, Bloecker and Marky, Proc. Natl. Acad. Sci. USA, vol 83, pp 3746-3750. Please refer to the former paper for background discussion."
  otmmin:
    name: otmmin
    type: decimal
    required: false
    description: Internal oligo minimum Tm. Minimum acceptable melting temperature(Celsius) for an internal oligo.
  otmmax:
    name: otmmax
    type: decimal
    required: false
    description: Internal oligo maximum Tm. Maximum acceptable melting temperature (Celsius) for an internal oligo.
  ogcopt:
    name: ogcopt
    type: decimal
    required: false
    description: Internal oligo optimum GC percent.
  ogcmin:
    name: ogcmin
    type: decimal
    required: false
    description: Internal oligo minimum GC. Minimum allowable percentage of Gs and Cs in an internal oligo.
  ogcmax:
    name: ogcmax
    type: decimal
    required: false
    description: Internal oligo maximum GC. Maximum allowable percentage of Gs and Cs in any internal oligo generated by Primer.
  osaltconc:
    name: osaltconc
    type: decimal
    required: false
    description: Internal oligo salt concentration (mM). The millimolar concentration of salt (usually KCl) in the hybridization. EPrimer3 uses this argument to calculate internal oligo melting temperatures.
  odnaconc:
    name: odnaconc
    type: decimal
    required: false
    description: Internal oligo DNA concentration (nM). The nanomolar concentration of annealing internal oligo in the hybridization.
  oanyself:
    name: oanyself
    type: decimal
    required: false
    description: "Internal oligo maximum self complementarity. The maximum allowable local alignment score when testing an internal oligo for (local) self-complementarity. Local self-complementarity is taken to predict the tendency of oligos to anneal to themselves The scoring system gives 1.00 for complementary bases, -0.25 for a match of any base (or N) with an N, -1.00 for a mismatch, and -2.00 for a gap. Only single-base-pair gaps are allowed. For example, the alignment 5' ATCGNA 3' || | | 3' TA-CGT 5' is allowed (and yields a score of 1.75), but the alignment 5' ATCCGNA 3' || | | 3' TA--CGT 5' is not considered. Scores are non-negative, and a score of 0.00 indicates that there is no reasonable local alignment between two oligos."
    max: 9999.99
  oendself:
    name: oendself
    type: decimal
    required: false
    description: "Internal oligo maximum 3' self complementarity. The maximum allowable 3'-anchored global alignment score when testing a single oligo for self-complementarity. The scoring system is as for the Maximum Complementarity argument. In the examples above the scores are 7.00 and 6.00 respectively. Scores are non-negative, and a score of 0.00 indicates that there is no reasonable 3'-anchored global alignment between two oligos. In order to estimate 3'-anchored global alignments for candidate oligos, Primer assumes that the sequence from which to choose oligos is presented 5' to 3'. INTERNAL-OLIGO-SELF-END is meaningless when applied to internal oligos used for hybridization-based detection, since primer-dimer will not occur. We recommend that INTERNAL-OLIGO-SELF-END be set at least as high as INTERNAL-OLIGO-SELF-ANY."
    max: 9999.99
  opolyxmax:
    name: opolyxmax
    type: integer
    required: false
    description: "Internal oligo maximum polynucleotide repeat. The maximum allowable length of an internal oligo mononucleotide repeat, for example AAAAAA."
    min: 0
  omishybmax:
    name: omishybmax
    type: decimal
    required: false
    description: Internal oligo maximum mishybridization. Similar to MAX-MISPRIMING except that this parameter applies to the similarity of candidate internal oligos to the library specified in INTERNAL-OLIGO-MISHYB-LIBRARY.
    max: 9999.99
  explainflag:
    name: explainflag
    type: choice
    required: false
    description: "Explain flag. If this flag is true, produce LEFT-EXPLAIN, RIGHT-EXPLAIN, and INTERNAL-OLIGO-EXPLAIN output tags, which are intended to provide information on the number of oligos and primer pairs that EPrimer3 examined, and statistics on the number discarded for various reasons."
    choices:
      yes: Y
      no: N
  fileflag:
    name: fileflag
    type: choice
    required: false
    description: "Create results files for each sequence. If the associated value is true, then EPrimer3 creates two output files for each input SEQUENCE. File (sequence-id).for lists all acceptable forward primers for (sequence-id), and (sequence-id).rev lists all acceptable reverse primers for (sequence-id), where (sequence-id) is the value of the SEQUENCE-ID tag (which must be supplied). In addition, if the input tag TASK is 1 or 4, EPrimer3 produces a file (sequence-id).int, which lists all acceptable internal oligos."
    choices:
      yes: Y
      no: N
  firstbaseindex:
    name: firstbaseindex
    type: integer
    required: false
    description: First base index. This parameter is the index of the first base in the input sequence. For input and output using 1-based indexing (such as that used in GenBank and to which many users are accustomed) set this parameter to 1. For input and output using 0-based indexing set this parameter to 0. (This parameter also affects the indexes in the contents of the files produced when the primer file flag is set.)
  pickanyway:
    name: pickanyway
    type: choice
    required: false
    description: "Pick anyway. If true pick a primer pair even if LEFT-INPUT, RIGHT-INPUT, or INTERNAL-OLIGO-INPUT violates specific constraints."
    choices:
      yes: Y
      no: N
  maxmispriming:
    name: maxmispriming
    type: decimal
    required: false
    description: Primer maximum mispriming. The maximum allowed weighted similarity with any sequence in MISPRIMING-LIBRARY.
    max: 9999.99
  pairmaxmispriming:
    name: pairmaxmispriming
    type: decimal
    required: false
    description: Primer pair maximum mispriming. The maximum allowed sum of weighted similarities of a primer pair (one similarity for each primer) with any single sequence in MISPRIMING-LIBRARY.
    max: 9999.99
  numnsaccepted:
    name: numnsaccepted
    type: integer
    required: false
    description: Maximum Ns accepted in a primer. Maximum number of unknown bases (N) allowable in any primer.
    min: 0
  selfany:
    name: selfany
    type: decimal
    required: false
    description: "Maximum self complementarity. The maximum allowable local alignment score when testing a single primer for (local) self-complementarity and the maximum allowable local alignment score when testing for complementarity between forward and reverse primers. Local self-complementarity is taken to predict the tendency of primers to anneal to each other without necessarily causing self-priming in the PCR. The scoring system gives 1.00 for complementary bases, -0.25 for a match of any base (or N) with an N, -1.00 for a mismatch, and -2.00 for a gap. Only single-base-pair gaps are allowed. For example, the alignment 5' ATCGNA 3' ...|| | | 3' TA-CGT 5' is allowed (and yields a score of 1.75), but the alignment 5' ATCCGNA 3' ...|| | | 3' TA--CGT 5' is not considered. Scores are non-negative, and a score of 0.00 indicates that there is no reasonable local alignment between two oligos."
    min: 0.0
    max: 9999.99
  maxendstability:
    name: maxendstability
    type: decimal
    required: false
    description: "Maximum 3' end stability. The maximum stability for the five 3' bases of a forward or reverse primer. Bigger numbers mean more stable 3' ends. The value is the maximum delta G for duplex disruption for the five 3' bases as calculated using the nearest neighbor parameters published in Breslauer, Frank, Bloecker and Marky, Proc. Natl. Acad. Sci. USA, vol 83, pp 3746-3750. EPrimer3 uses a completely permissive default value for backward compatibility (which we may change in the next release). Rychlik recommends a maximum value of 9 (Wojciech Rychlik, 'Selection of Primers for Polymerase Chain Reaction' in BA White, Ed., 'Methods in Molecular Biology, Vol. 15: PCR Protocols: Current Methods and Applications', 1993, pp 31-40, Humana Press, Totowa NJ)."
    max: 999.9999
  help:
    name: help
    type: choice
    required: false
    description: Help documentation of the tool.
    choices:
      yes: Y
      no: N

command: eprimer3

args:
  sequence:
    arg: -sequence $(value)
    symlink: sequence.dat
  sformat-sequence:
    arg: -sformat1 $(value)
  sbegin-sequence:
    arg: -sbegin1 $(value)
  send-sequence:
    arg: -send1 $(value)
  sprotein-sequence:
    arg: -sprotein1 $(value)
  snucleotide-sequence:
    arg: -snucleotide1 $(value)
  sreverse-sequence:
    arg: -sreverse1 $(value)
  slower-sequence:
    arg: -slower1 $(value)
  supper-sequence:
    arg: -supper1 $(value)
  selfend:
    arg: -selfend $(value)
  primer:
    arg: -primer $(value)
  task:
    arg: -task $(value)
  hybridprobe:
    arg: -hybridprobe $(value)
  mishyblibraryfile:
    arg: -mishyblibraryfile $(value)
  mispriminglibraryfile:
    arg: -mispriminglibraryfile $(value)
  numreturn:
    arg: -numreturn $(value)
  includedregion:
    arg: -includedregion $(value)
  targetregion:
    arg: -targetregion $(value)
