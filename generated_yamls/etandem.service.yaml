---
slivka-version: 0.8.3
name: etandem
description: Find tandem repeats in a nucleotide sequence
version: '6.6.0.0'
author: EMBOSS
license: GPL
classifiers:
- 'Operation :: Repeat sequence detection'
- 'Topic :: Sequence composition analysis'

parameters:
  sequence:
    name: sequence
    type: file
    required: true
  sformat-sequence:
    name: sformat_sequence
    type: choice
    required: false
    choices:
      abi: abi
      ace: ace
      acedb: acedb
      bam: bam
      biomart: biomart
      clustal: clustal
      codata: codata
      dbid: dbid
      embl: embl
      ensembl: ensembl
      experiment: experiment
      fasta: fasta
      fastq: fastq
      fastq-illumina: fastq-illumina
      fastq-sanger: fastq-sanger
      fastq-solexa: fastq-solexa
      fitch: fitch
      gcg: gcg
      genbank: genbank
      genpept: genpept
      gff2: gff2
      gff3: gff3
      gifasta: gifasta
      hennig86: hennig86
      ig: ig
      igstrict: igstrict
      jackknifer: jackknifer
      mase: mase
      mega: mega
      msf: msf
      nbrf: nbrf
      nexus: nexus
      pdb: pdb
      pdbnuc: pdbnuc
      pdbnucseq: pdbnucseq
      pdbseq: pdbseq
      pearson: pearson
      phylip: phylip
      phylipnon: phylipnon
      raw: raw
      refseqp: refseqp
      sam: sam
      selex: selex
      staden: staden
      stockholm: stockholm
      strider: strider
      swiss: swiss
      text: text
      treecon: treecon
  sbegin-sequence:
    name: sbegin_sequence
    type: integer
    required: false
  send-sequence:
    name: send_sequence
    type: integer
    required: false
  sprotein-sequence:
    name: sprotein_sequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  snucleotide-sequence:
    name: snucleotide_sequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  sreverse-sequence:
    name: sreverse_sequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  slower-sequence:
    name: slower_sequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  supper-sequence:
    name: supper_sequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  minrepeat:
    name: minrepeat
    type: integer
    required: false
    description: Minimum repeat size
    min: 2
  maxrepeat:
    name: maxrepeat
    type: integer
    required: false
    description: Maximum repeat size
  threshold:
    name: threshold
    type: integer
    required: false
    description: Threshold score
  mismatch:
    name: mismatch
    type: choice
    required: false
    description: Allow N as a mismatch
    choices:
      yes: Y
      no: N
  uniform:
    name: uniform
    type: choice
    required: false
    description: Allow uniform consensus
    choices:
      yes: Y
      no: N
  help:
    name: help
    type: choice
    required: false
    description: Help documentation of the tool.
    choices:
      yes: Y
      no: N

command: etandem

args:
  sequence:
    arg: -sequence $(value)
    symlink: sequence.dat
  sformat-sequence:
    arg: -sformat1 $(value)
  sbegin-sequence:
    arg: -sbegin1 $(value)
  send-sequence:
    arg: -send1 $(value)
  sprotein-sequence:
    arg: -sprotein1 $(value)
  snucleotide-sequence:
    arg: -snucleotide1 $(value)
  sreverse-sequence:
    arg: -sreverse1 $(value)
  slower-sequence:
    arg: -slower1 $(value)
  supper-sequence:
    arg: -supper1 $(value)
  minrepeat:
    arg: -minrepeat $(value)
  maxrepeat:
    arg: -maxrepeat $(value)
  threshold:
    arg: -threshold $(value)
  mismatch:
    arg: -mismatch $(value)
  uniform:
    arg: -uniform $(value)
  help:
    arg: -help $(value)
  _outfile:
    arg: -outfile $(value)
    default: outfile.oldtan
  _origfile:
    arg: -origfile $(value)
    default: origfile.txt

outputs:
  outfile:
    name: outfile
    path: outfile.oldtan
    media-type: text/plain
  origfile:
    name: origfile
    path: origfile.txt
    media-type: text/plain
  log:
    name: log
    path: stdout
    media-type: text/plain
  error-log:
    name: error-log
    path: stderr
    media-type: text/plain

execution:
  runners:
    default:
      type: SlivkaQueueRunner
...
