---
slivka-version: 0.8.3
name: dbtell
description: Display information about a public database
version: '6.6.0.0'
author: EMBOSS
license: GPL
classifiers:
- 'Operation :: Data retrieval (database metadata)'
- 'Topic :: Data handling'

parameters:
  database:
    name: database
    type: text
    required: false
    description: Database name. The name of the database defined locally for use by EMBOSS.
  full:
    name: full
    type: choice
    required: false
    description: Verbose output. The default behaviour is to report for relevant databases only basic information from the EMBOSS database definition
    choices:
      yes: Y
      no: N
  server:
    name: server
    type: text
    required: false
    description: Server name. The name of the server defined locally for use by EMBOSS.
  help:
    name: help
    type: choice
    required: false
    description: Help documentation of the tool.
    choices:
      yes: Y
      no: N

command: dbtell

args:
  database:
    arg: -database $(value)
  full:
    arg: -full $(value)
  server:
    arg: -server $(value)
  help:
    arg: -help $(value)
  _outfile:
    arg: -outfile $(value)
    default: outfile.txt

outputs:
  outfile:
    name: outfile
    path: outfile.txt
    media-type: text/plain
  log:
    name: log
    path: stdout
    media-type: text/plain
  error-log:
    name: error-log
    path: stderr
    media-type: text/plain

execution:
  runners:
    default:
      type: SlivkaQueueRunner
...
