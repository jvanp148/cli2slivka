---
slivka-version: 0.8.3
name: iep
description: Calculate the isoelectric point of proteins
version: '6.6.0.0'
author: EMBOSS
license: GPL
classifiers:
- 'Operation :: Protein isoelectric point calculation'
- 'Topic :: Data visualisation'
- 'Topic :: Protein hydropathy'

parameters:
  sequence:
    name: sequence
    type: file
    required: true
  sformat-sequence:
    name: sformat_sequence
    type: choice
    required: false
    choices:
      abi: abi
      ace: ace
      acedb: acedb
      bam: bam
      biomart: biomart
      clustal: clustal
      codata: codata
      dbid: dbid
      embl: embl
      ensembl: ensembl
      experiment: experiment
      fasta: fasta
      fastq: fastq
      fastq-illumina: fastq-illumina
      fastq-sanger: fastq-sanger
      fastq-solexa: fastq-solexa
      fitch: fitch
      gcg: gcg
      genbank: genbank
      genpept: genpept
      gff2: gff2
      gff3: gff3
      gifasta: gifasta
      hennig86: hennig86
      ig: ig
      igstrict: igstrict
      jackknifer: jackknifer
      mase: mase
      mega: mega
      msf: msf
      nbrf: nbrf
      nexus: nexus
      pdb: pdb
      pdbnuc: pdbnuc
      pdbnucseq: pdbnucseq
      pdbseq: pdbseq
      pearson: pearson
      phylip: phylip
      phylipnon: phylipnon
      raw: raw
      refseqp: refseqp
      sam: sam
      selex: selex
      staden: staden
      stockholm: stockholm
      strider: strider
      swiss: swiss
      text: text
      treecon: treecon
  sbegin-sequence:
    name: sbegin_sequence
    type: integer
    required: false
  send-sequence:
    name: send_sequence
    type: integer
    required: false
  sprotein-sequence:
    name: sprotein_sequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  snucleotide-sequence:
    name: snucleotide_sequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  sreverse-sequence:
    name: sreverse_sequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  slower-sequence:
    name: slower_sequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  supper-sequence:
    name: supper_sequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N
  graph-format:
    name: graph_format
    type: choice
    required: false
    description: Format of the graphical output
    choices:
      png: png
      colourps: colourps
  pkdata:
    name: pkdata
    type: text
    required: false
    description: Amino acid pKa data file. Values of pKa for amino acids
  amino:
    name: amino
    type: integer
    required: false
    description: Number of N-termini
    min: 0
  carboxyl:
    name: carboxyl
    type: integer
    required: false
    description: Number of C-termini
    min: 0
  termini:
    name: termini
    type: choice
    required: false
    description: Include charge at N and C terminus
    choices:
      yes: Y
      no: N
  lysinemodified:
    name: lysinemodified
    type: integer
    required: false
    description: Number of modified lysines
    min: 0
  disulphides:
    name: disulphides
    type: integer
    required: false
    description: Number of disulphide bridges
    min: 0
  step:
    name: step
    type: decimal
    required: false
    description: Step value for pH
    min: 0.01
    max: 1.0
  plot:
    name: plot
    type: choice
    required: false
    description: Plot charge vs pH
    choices:
      yes: Y
      no: N
  help:
    name: help
    type: choice
    required: false
    description: Help documentation of the tool.
    choices:
      yes: Y
      no: N

command: iep

args:
  sequence:
    arg: -sequence $(value)
    symlink: sequence.dat
  sformat-sequence:
    arg: -sformat1 $(value)
  sbegin-sequence:
    arg: -sbegin1 $(value)
  send-sequence:
    arg: -send1 $(value)
  sprotein-sequence:
    arg: -sprotein1 $(value)
  snucleotide-sequence:
    arg: -snucleotide1 $(value)
  sreverse-sequence:
    arg: -sreverse1 $(value)
  slower-sequence:
    arg: -slower1 $(value)
  supper-sequence:
    arg: -supper1 $(value)
  graph-format:
    arg: -graph_format $(value)
  pkdata:
    arg: -pkdata $(value)
  amino:
    arg: -amino $(value)
  carboxyl:
    arg: -carboxyl $(value)
  termini:
    arg: -termini $(value)
  lysinemodified:
    arg: -lysinemodified $(value)
  disulphides:
    arg: -disulphides $(value)
  step:
    arg: -step $(value)
  plot:
    arg: -plot $(value)
  help:
    arg: -help $(value)
  _outfile:
    arg: -outfile $(value)
    default: outfile.txt
  _Graphics_in_Postscript:
    arg: -Graphics_in_Postscript $(value)
    default: Graphics_in_Postscript.txt
  _Graphics_in_PNG:
    arg: -Graphics_in_PNG $(value)
    default: Graphics_in_PNG.txt

outputs:
  outfile:
    name: outfile
    path: outfile.txt
    media-type: text/plain
  Graphics_in_Postscript:
    name: Graphics_in_Postscript
    path: Graphics_in_Postscript.txt
    media-type: text/plain
  Graphics_in_PNG:
    name: Graphics_in_PNG
    path: Graphics_in_PNG.txt
    media-type: text/plain
  log:
    name: log
    path: stdout
    media-type: text/plain
  error-log:
    name: error-log
    path: stderr
    media-type: text/plain

execution:
  runners:
    default:
      type: SlivkaQueueRunner
...
