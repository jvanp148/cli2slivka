---
slivka-version: 0.8.3
name: dot
description: Draw directed graphs as hierarchies
version: '1.9'
author: EMBOSS
license: GPL

parameters:
  dotfile:
    name: dotfile
    type: text
    required: true
    description: "An input file with a graph definition in DOT language. http://www.research.att.com/sw/tools/graphviz/"
  library:
    name: library
    type: text
    required: false
    description: A custom PostScript library file
  format:
    name: format
    type: choice
    required: false
    description: Output format
    choices:
      canon: canon
      dot: dot
      fig: fig
      gd: gd
      gif: gif
      hpgl: hpgl
      imap: imap
      jpg: jpg
      mif: mif
      mp: mp
      pcl: pcl
      pic: pic
      plain: plain
      png: png
      ps: ps
      ps2: ps2
      svg: svg
      vrml: vrml
      vtx: vtx
      wbmp: wbmp
  v:
    name: v
    type: choice
    required: false
    description: Verbose output
    choices:
      yes: Y
      no: N
  resultgraph:
    name: resultgraph
    type: text
    required: false
    description: Textual or graphical output with a graph
  help:
    name: help
    type: choice
    required: false
    description: Help documentation of the tool.
    choices:
      yes: Y
      no: N

command: dot

args:
  dotfile:
    arg: -dotfile $(value)
  library:
    arg: -library $(value)
  format:
    arg: -format $(value)
  v:
    arg: -v $(value)
  resultgraph:
    arg: -resultgraph $(value)
  help:
    arg: -help $(value)
  _output:
    arg: -output $(value)
    default: output.txt

outputs:
  output:
    name: output
    path: output.txt
    media-type: text/plain
  log:
    name: log
    path: stdout
    media-type: text/plain
  error-log:
    name: error-log
    path: stderr
    media-type: text/plain

execution:
  runners:
    default:
      type: SlivkaQueueRunner
...
