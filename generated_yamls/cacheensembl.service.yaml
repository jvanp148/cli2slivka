---
slivka-version: 0.8.3
name: cacheensembl
description: Generate server cache file for an Ensembl server
version: '6.6.0.0'
author: EMBOSS
license: GPL
classifiers:
- 'Operation :: Data retrieval (database metadata)'
- 'Topic :: Data handling'

parameters:
  servername:
    name: servername
    type: text
    required: true
    description: Server name
  help:
    name: help
    type: choice
    required: false
    description: Help documentation of the tool.
    choices:
      yes: Y
      no: N

command: cacheensembl

args:
  servername:
    arg: -servername $(value)
  help:
    arg: -help $(value)
  _cachefile:
    arg: -cachefile $(value)
    default: cachefile.txt

outputs:
  cachefile:
    name: cachefile
    path: cachefile.txt
    media-type: text/plain
  log:
    name: log
    path: stdout
    media-type: text/plain
  error-log:
    name: error-log
    path: stderr
    media-type: text/plain

execution:
  runners:
    default:
      type: SlivkaQueueRunner
...
