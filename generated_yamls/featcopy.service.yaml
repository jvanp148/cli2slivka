---
slivka-version: 0.8.3
name: featcopy
description: Read and write a feature table
version: '6.6.0.0'
author: EMBOSS
license: GPL
classifiers:
- 'Operation :: Data retrieval'
- 'Topic :: Data search and retrieval'
- 'Topic :: Sequence sites and features'

parameters:
  features:
    name: features
    type: text
    required: true
  offormat-outfeat:
    name: offormat_outfeat
    type: choice
    required: false
    description: Format of the output features (outfeat)
    choices:
      gff: gff
      gff2: gff2
      embl: embl
      genbank: genbank
      ddbj: ddbj
      pir: pir
      swiss: swiss
      dasgff: dasgff
  help:
    name: help
    type: choice
    required: false
    description: Help documentation of the tool.
    choices:
      yes: Y
      no: N

command: featcopy

args:
  features:
    arg: -features $(value)
  offormat-outfeat:
    arg: -offormat_outfeat $(value)
  help:
    arg: -help $(value)
  _outfeat:
    arg: -outfeat $(value)
    default: outfeat.txt

outputs:
  outfeat:
    name: outfeat
    path: outfeat.txt
    media-type: text/plain
  log:
    name: log
    path: stdout
    media-type: text/plain
  error-log:
    name: error-log
    path: stderr
    media-type: text/plain

execution:
  runners:
    default:
      type: SlivkaQueueRunner
...
