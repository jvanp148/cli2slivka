---
slivka-version: 0.8.3
name: nohtml
description: Remove mark-up (e.g. HTML tags) from an ASCII text file
version: '6.6.0.0'
author: EMBOSS
license: GPL
classifiers:
- 'Operation :: File reformatting'
- 'Topic :: Data handling'

parameters:
  infile:
    name: infile
    type: text
    required: true
    description: ASCII text file
  help:
    name: help
    type: choice
    required: false
    description: Help documentation of the tool.
    choices:
      yes: Y
      no: N

command: nohtml

args:
  infile:
    arg: -infile $(value)
  help:
    arg: -help $(value)
  _outfile:
    arg: -outfile $(value)
    default: outfile.txt

outputs:
  outfile:
    name: outfile
    path: outfile.txt
    media-type: text/plain
  log:
    name: log
    path: stdout
    media-type: text/plain
  error-log:
    name: error-log
    path: stderr
    media-type: text/plain

execution:
  runners:
    default:
      type: SlivkaQueueRunner
...
