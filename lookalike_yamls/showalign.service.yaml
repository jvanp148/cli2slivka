---
slivka-version: 0.8.3
name: Showalign
description: Showalign reads a multiple sequence alignment and writes it to
  file in a user-defined, human-readable format. The program provides many
  options for controlling how the alignment is displayed, including reference
  sequence, show mode (identities, similarities, dissimilarities), consensus
  line, numbering, ruler, column width, and optional HTML output with region
  highlighting.
author: EMBOSS
version: '6.6.0.0'
license: GPL

classifiers:
- 'Topic :: Computational biology :: Sequence analysis'
- 'Operation :: Analysis :: Sequence analysis :: Sequence alignment :: Multiple
  sequence alignment'

parameters:
  sequence:
    name: Input alignment (file)
    description: Multiple sequence alignment file to be displayed. Common
      formats include clustal, msf, fasta, phylip, and stockholm.
    type: file
    required: true

  sequence-direct:
    name: Input alignment (text)
    description: Multiple sequence alignment provided as raw text. Use either
      this or the file input, not both.
    type: text
    required: false

  sformat-sequence:
    name: Alignment input format
    description: Format of the input sequence alignment. Leave unset for
      automatic detection.
    type: choice
    required: false
    choices:
      abi: abi
      ace: ace
      acedb: acedb
      bam: bam
      biomart: biomart
      clustal: clustal
      codata: codata
      dbid: dbid
      embl: embl
      ensembl: ensembl
      experiment: experiment
      fasta: fasta
      fastq: fastq
      fastq-illumina: fastq-illumina
      fastq-sanger: fastq-sanger
      fastq-solexa: fastq-solexa
      fitch: fitch
      gcg: gcg
      genbank: genbank
      genpept: genpept
      gff2: gff2
      gff3: gff3
      gifasta: gifasta
      hennig86: hennig86
      ig: ig
      igstrict: igstrict
      jackknifer: jackknifer
      mase: mase
      mega: mega
      msf: msf
      nbrf: nbrf
      nexus: nexus
      pdb: pdb
      pdbnuc: pdbnuc
      pdbnucseq: pdbnucseq
      pdbseq: pdbseq
      pearson: pearson
      phylip: phylip
      phylipnon: phylipnon
      raw: raw
      refseqp: refseqp
      sam: sam
      selex: selex
      staden: staden
      stockholm: stockholm
      strider: strider
      swiss: swiss
      text: text
      treecon: treecon

  sbegin-sequence:
    name: Alignment start position
    description: Start position in the alignment (1-based). Use 0 for the
      beginning.
    type: integer
    required: false
    min: 0

  send-sequence:
    name: Alignment end position
    description: End position in the alignment (1-based). Use 0 for no limit.
    type: integer
    required: false
    min: 0

  sprotein-sequence:
    name: Treat alignment as protein
    description: Force the sequences to be treated as protein.
    type: flag
    required: false

  snucleotide-sequence:
    name: Treat alignment as nucleotide
    description: Force the sequences to be treated as nucleotide.
    type: flag
    required: false

  sreverse-sequence:
    name: Reverse-complement sequences
    description: Reverse-complement the sequences before display.
    type: flag
    required: false

  slower-sequence:
    name: Lowercase sequences
    description: Convert sequences to lowercase before display.
    type: flag
    required: false

  supper-sequence:
    name: Uppercase sequences
    description: Convert sequences to uppercase before display.
    type: flag
    required: false

  refseq:
    name: Reference sequence
    description: The name or number (1-based) of the sequence to use as the
      reference for comparison. Defaults to the first sequence (0).
    type: text
    required: false
    default: '0'

  show:
    name: Characters to display
    description: Controls which residues are shown. A=all residues,
      I=identities only, N=non-identities only, S=similarities only,
      D=dissimilarities only.
    type: choice
    required: false
    default: N
    choices:
      A: A
      I: I
      N: N
      S: S
      D: D

  order:
    name: Output sequence order
    description: Order in which sequences appear in the output. I=input order
      (unchanged), A=alphabetical by name, S=similarity to reference sequence.
    type: choice
    required: false
    default: I
    choices:
      I: I
      A: A
      S: S

  similarcase:
    name: Show similar residues in lowercase
    description: When show is set to Similarities or Non-identities, residues
      that are similar but not identical to the reference are rendered in
      lowercase.
    type: flag
    required: false

  consensus:
    name: Display consensus line
    description: Add a consensus sequence line below the alignment.
    type: flag
    required: false

  uppercase:
    name: Regions to uppercase
    description: Comma-separated list of position ranges to display in
      uppercase, e.g. 4-57,78-94.
    type: text
    required: false

  number:
    name: Number the sequences
    description: Display position numbers above the alignment every 10
      characters.
    type: flag
    required: false

  ruler:
    name: Display ruler
    description: Display a ruler line marking every 5th and 10th character.
    type: flag
    required: false

  width:
    name: Alignment display width
    description: Number of sequence characters displayed per line.
    type: integer
    required: false
    default: 60
    min: 1

  margin:
    name: Sequence name margin width
    description: Width of the left-hand margin for sequence names. 0 hides
      names; -1 auto-selects the minimum width that fits all names.
    type: integer
    required: false
    default: -1
    min: -1

  html:
    name: Use HTML formatting
    description: Format the output as HTML, which enables coloured highlighting
      of regions.
    type: flag
    required: false

  highlight:
    name: Regions to colour (HTML)
    description: Regions to colour when HTML output is enabled, e.g.
      "4-57 red 78-94 green". A file of ranges can be specified as
      @filename.
    type: text
    required: false

  plurality:
    name: Plurality threshold for consensus (%)
    description: Minimum percentage of positive scoring matches required to
      include a residue in the consensus. Default is 50%.
    type: float
    required: false
    default: 50.0
    min: 0.0
    max: 100.0

  setcase:
    name: Uppercase consensus threshold
    description: Score threshold above which the consensus residue is shown in
      uppercase; below it the residue is lowercase. Defaults to half the
      weight-adjusted sequence count.
    type: float
    required: false

  identity:
    name: Identity threshold for consensus (%)
    description: Minimum percentage of identical residues required at a
      position for it to contribute to the consensus.
    type: float
    required: false
    default: 0.0
    min: 0.0
    max: 100.0

  gaps:
    name: Allow gaps in consensus
    description: If enabled, gap characters may appear in the consensus line.
      Otherwise N (nucleotide) or X (protein) is used instead.
    type: flag
    required: false

  bottom:
    name: Display bottom consensus
    description: Display a consensus line at the bottom of the alignment
      output.
    type: flag
    required: false

command: showalign

args:
  sequence:
    arg: -sequence $(value)
    symlink: input_alignment.dat
  sequence-direct:
    arg: -sequence $(value)
  sformat-sequence:
    arg: -sformat $(value)
  sbegin-sequence:
    arg: -sbegin $(value)
  send-sequence:
    arg: -send $(value)
  sprotein-sequence:
    arg: -sprotein
  snucleotide-sequence:
    arg: -snucleotide
  sreverse-sequence:
    arg: -sreverse
  slower-sequence:
    arg: -slower
  supper-sequence:
    arg: -supper
  refseq:
    arg: -refseq $(value)
  show:
    arg: -show $(value)
  order:
    arg: -order $(value)
  similarcase:
    arg: -similarcase
  consensus:
    arg: -consensus
  uppercase:
    arg: -uppercase $(value)
  number:
    arg: -number
  ruler:
    arg: -ruler
  width:
    arg: -width $(value)
  margin:
    arg: -margin $(value)
  html:
    arg: -html
  highlight:
    arg: -highlight $(value)
  plurality:
    arg: -plurality $(value)
  setcase:
    arg: -setcase $(value)
  identity:
    arg: -identity $(value)
  gaps:
    arg: -gaps
  bottom:
    arg: -bottom
  _outfile:
    arg: -outfile $(value)
    default: outfile.showalign

outputs:
  alignment-display:
    path: outfile.showalign
    name: Formatted alignment
    media-type: text/plain
  log:
    path: stdout
    name: Standard log
    media-type: text/plain
  error-log:
    path: stderr
    name: Error log
    media-type: text/plain

execution:
  runners:
    default:
      type: SlivkaQueueRunner

tests:
- applicable-runners: ["default"]
  parameters:
    sequence: ${SLIVKA_HOME}/testdata/alignment.msf
  timeout: 10
...
