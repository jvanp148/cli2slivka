---
slivka-version: 0.8.3
name: needle
description: Needleman-Wunsch global alignment of two sequences
author: EMBOSS
version: '6.6.0.0'
license: GPL

classifiers:
- 'Topic :: Computational biology :: Sequence analysis'
- 'Operation :: Analysis :: Sequence analysis :: Sequence alignment :: Pairwise
  sequence alignment (global)'

parameters:
  asequence:
    name: asequence
    type: file
    required: true

  sformat-asequence:
    name: sformat_asequence
    type: choice
    required: false
    choices:
      abi: abi
      ace: ace
      acedb: acedb
      bam: bam
      biomart: biomart
      clustal: clustal
      codata: codata
      dbid: dbid
      embl: embl
      ensembl: ensembl
      experiment: experiment
      fasta: fasta
      fastq: fastq
      fastq-illumina: fastq-illumina
      fastq-sanger: fastq-sanger
      fastq-solexa: fastq-solexa
      fitch: fitch
      gcg: gcg
      genbank: genbank
      genpept: genpept
      gff2: gff2
      gff3: gff3
      gifasta: gifasta
      hennig86: hennig86
      ig: ig
      igstrict: igstrict
      jackknifer: jackknifer
      mase: mase
      mega: mega
      msf: msf
      nbrf: nbrf
      nexus: nexus
      pdb: pdb
      pdbnuc: pdbnuc
      pdbnucseq: pdbnucseq
      pdbseq: pdbseq
      pearson: pearson
      phylip: phylip
      phylipnon: phylipnon
      raw: raw
      refseqp: refseqp
      sam: sam
      selex: selex
      staden: staden
      stockholm: stockholm
      strider: strider
      swiss: swiss
      text: text
      treecon: treecon

  sbegin-asequence:
    name: sbegin_asequence
    type: integer
    required: false
    min: 0

  send-asequence:
    name: send_asequence
    type: integer
    required: false
    min: 0

  sprotein-asequence:
    name: sprotein_asequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N

  snucleotide-asequence:
    name: snucleotide_asequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N

  sreverse-asequence:
    name: sreverse_asequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N

  slower-asequence:
    name: slower_asequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N

  supper-asequence:
    name: supper_asequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N

  bsequence:
    name: bsequence
    type: file
    required: true

  sformat-bsequence:
    name: sformat_bsequence
    type: choice
    required: false
    choices:
      abi: abi
      ace: ace
      acedb: acedb
      bam: bam
      biomart: biomart
      clustal: clustal
      codata: codata
      dbid: dbid
      embl: embl
      ensembl: ensembl
      experiment: experiment
      fasta: fasta
      fastq: fastq
      fastq-illumina: fastq-illumina
      fastq-sanger: fastq-sanger
      fastq-solexa: fastq-solexa
      fitch: fitch
      gcg: gcg
      genbank: genbank
      genpept: genpept
      gff2: gff2
      gff3: gff3
      gifasta: gifasta
      hennig86: hennig86
      ig: ig
      igstrict: igstrict
      jackknifer: jackknifer
      mase: mase
      mega: mega
      msf: msf
      nbrf: nbrf
      nexus: nexus
      pdb: pdb
      pdbnuc: pdbnuc
      pdbnucseq: pdbnucseq
      pdbseq: pdbseq
      pearson: pearson
      phylip: phylip
      phylipnon: phylipnon
      raw: raw
      refseqp: refseqp
      sam: sam
      selex: selex
      staden: staden
      stockholm: stockholm
      strider: strider
      swiss: swiss
      text: text
      treecon: treecon

  sbegin-bsequence:
    name: sbegin_bsequence
    type: integer
    required: false
    min: 0

  send-bsequence:
    name: send_bsequence
    type: integer
    required: false
    min: 0

  sprotein-bsequence:
    name: sprotein_bsequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N

  snucleotide-bsequence:
    name: snucleotide_bsequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N

  sreverse-bsequence:
    name: sreverse_bsequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N

  slower-bsequence:
    name: slower_bsequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N

  supper-bsequence:
    name: supper_bsequence
    type: choice
    required: false
    choices:
      yes: Y
      no: N

  gapopen:
    name: gapopen
    description: Gap opening penalty
    type: float
    required: false
    min: 0.0
    max: 100.0

  gapextend:
    name: gapextend
    description: Gap extension penalty
    type: float
    required: false
    min: 0.0
    max: 10.0

  datafile:
    name: datafile
    description: Matrix file
    type: text
    required: false

  endweight:
    name: endweight
    description: Apply end gap penalties
    type: choice
    required: false
    choices:
      yes: Y
      no: N

  endopen:
    name: endopen
    description: End gap opening penalty
    type: float
    required: false
    min: 0.0
    max: 100.0

  endextend:
    name: endextend
    description: End gap extension penalty
    type: float
    required: false
    min: 0.0
    max: 10.0

  brief:
    name: brief
    description: Brief identity and similarity
    type: choice
    required: false
    choices:
      yes: Y
      no: N

command: needle

args:
  asequence:
    arg: -asequence $(value)
    symlink: asequence.dat
  sformat-asequence:
    arg: -sformat1 $(value)
  sbegin-asequence:
    arg: -sbegin1 $(value)
  send-asequence:
    arg: -send1 $(value)
  sprotein-asequence:
    arg: -sprotein1 $(value)
  snucleotide-asequence:
    arg: -snucleotide1 $(value)
  sreverse-asequence:
    arg: -sreverse1 $(value)
  slower-asequence:
    arg: -slower1 $(value)
  supper-asequence:
    arg: -supper1 $(value)
  bsequence:
    arg: -bsequence $(value)
    symlink: bsequence.dat
  sformat-bsequence:
    arg: -sformat2 $(value)
  sbegin-bsequence:
    arg: -sbegin2 $(value)
  send-bsequence:
    arg: -send2 $(value)
  sprotein-bsequence:
    arg: -sprotein2 $(value)
  snucleotide-bsequence:
    arg: -snucleotide2 $(value)
  sreverse-bsequence:
    arg: -sreverse2 $(value)
  slower-bsequence:
    arg: -slower2 $(value)
  supper-bsequence:
    arg: -supper2 $(value)
  gapopen:
    arg: -gapopen $(value)
  gapextend:
    arg: -gapextend $(value)
  datafile:
    arg: -datafile $(value)
  endweight:
    arg: -endweight $(value)
  endopen:
    arg: -endopen $(value)
  endextend:
    arg: -endextend $(value)
  brief:
    arg: -brief $(value)
  _outfile:
    arg: -outfile $(value)
    default: outfile.needle

outputs:
  alignment:
    path: outfile.needle
    media-type: text/plain
  log:
    path: stdout
    media-type: text/plain
  error-log:
    path: stderr
    media-type: text/plain

execution:
  runners:
    default:
      type: SlivkaQueueRunner

tests:
- applicable-runners: ["default"]
  parameters:
    asequence: ${SLIVKA_HOME}/testdata/seq1.fasta
    bsequence: ${SLIVKA_HOME}/testdata/seq2.fasta
  timeout: 10
...
