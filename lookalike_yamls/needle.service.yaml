---
slivka-version: 0.8.3
name: Needle
description: Needle reads two input sequences and writes their optimal global
  sequence alignment to file. It uses the Needleman-Wunsch alignment algorithm
  to find the optimum alignment (including gaps) of two sequences along their
  entire length. The algorithm uses a dynamic programming method to ensure the
  alignment is optimum, by exploring all possible alignments and choosing the
  best.
author: EMBOSS
version: '6.6.0.0'
license: GPL

classifiers:
- 'Topic :: Computational biology :: Sequence analysis'
- 'Operation :: Analysis :: Sequence analysis :: Sequence alignment :: Pairwise
  sequence alignment (global)'

parameters:
  asequence:
    name: Sequence A (file)
    description: First input sequence file for global alignment. Accepted formats
      include fasta, genbank, embl, swissprot, and many more.
    type: file
    required: true

  asequence-direct:
    name: Sequence A (text)
    description: First input sequence provided as raw text (e.g. pasted FASTA).
      Use either this or the file input, not both.
    type: text
    required: false

  sformat-asequence:
    name: Format of sequence A
    description: Input format of the first sequence. Leave unset for automatic
      detection.
    type: choice
    required: false
    choices:
      abi: abi
      ace: ace
      acedb: acedb
      bam: bam
      biomart: biomart
      clustal: clustal
      codata: codata
      dbid: dbid
      embl: embl
      ensembl: ensembl
      experiment: experiment
      fasta: fasta
      fastq: fastq
      fastq-illumina: fastq-illumina
      fastq-sanger: fastq-sanger
      fastq-solexa: fastq-solexa
      fitch: fitch
      gcg: gcg
      genbank: genbank
      genpept: genpept
      gff2: gff2
      gff3: gff3
      gifasta: gifasta
      hennig86: hennig86
      ig: ig
      igstrict: igstrict
      jackknifer: jackknifer
      mase: mase
      mega: mega
      msf: msf
      nbrf: nbrf
      nexus: nexus
      pdb: pdb
      pdbnuc: pdbnuc
      pdbnucseq: pdbnucseq
      pdbseq: pdbseq
      pearson: pearson
      phylip: phylip
      phylipnon: phylipnon
      raw: raw
      refseqp: refseqp
      sam: sam
      selex: selex
      staden: staden
      stockholm: stockholm
      strider: strider
      swiss: swiss
      text: text
      treecon: treecon

  sbegin-asequence:
    name: Sequence A start position
    description: Start position in sequence A (1-based). Use 0 to start from
      the beginning.
    type: integer
    required: false
    min: 0

  send-asequence:
    name: Sequence A end position
    description: End position in sequence A (1-based). Use 0 for no limit.
    type: integer
    required: false
    min: 0

  sprotein-asequence:
    name: Treat sequence A as protein
    description: Force sequence A to be treated as a protein sequence.
    type: flag
    required: false

  snucleotide-asequence:
    name: Treat sequence A as nucleotide
    description: Force sequence A to be treated as a nucleotide sequence.
    type: flag
    required: false

  sreverse-asequence:
    name: Reverse-complement sequence A
    description: Reverse-complement sequence A before alignment.
    type: flag
    required: false

  slower-asequence:
    name: Lowercase sequence A
    description: Convert sequence A to lowercase.
    type: flag
    required: false

  supper-asequence:
    name: Uppercase sequence A
    description: Convert sequence A to uppercase.
    type: flag
    required: false

  bsequence:
    name: Sequence B (file)
    description: Second input sequence file for global alignment.
    type: file
    required: true

  bsequence-direct:
    name: Sequence B (text)
    description: Second input sequence provided as raw text (e.g. pasted FASTA).
    type: text
    required: false

  sformat-bsequence:
    name: Format of sequence B
    description: Input format of the second sequence. Leave unset for automatic
      detection.
    type: choice
    required: false
    choices:
      abi: abi
      ace: ace
      acedb: acedb
      bam: bam
      biomart: biomart
      clustal: clustal
      codata: codata
      dbid: dbid
      embl: embl
      ensembl: ensembl
      experiment: experiment
      fasta: fasta
      fastq: fastq
      fastq-illumina: fastq-illumina
      fastq-sanger: fastq-sanger
      fastq-solexa: fastq-solexa
      fitch: fitch
      gcg: gcg
      genbank: genbank
      genpept: genpept
      gff2: gff2
      gff3: gff3
      gifasta: gifasta
      hennig86: hennig86
      ig: ig
      igstrict: igstrict
      jackknifer: jackknifer
      mase: mase
      mega: mega
      msf: msf
      nbrf: nbrf
      nexus: nexus
      pdb: pdb
      pdbnuc: pdbnuc
      pdbnucseq: pdbnucseq
      pdbseq: pdbseq
      pearson: pearson
      phylip: phylip
      phylipnon: phylipnon
      raw: raw
      refseqp: refseqp
      sam: sam
      selex: selex
      staden: staden
      stockholm: stockholm
      strider: strider
      swiss: swiss
      text: text
      treecon: treecon

  sbegin-bsequence:
    name: Sequence B start position
    description: Start position in sequence B (1-based). Use 0 to start from
      the beginning.
    type: integer
    required: false
    min: 0

  send-bsequence:
    name: Sequence B end position
    description: End position in sequence B (1-based). Use 0 for no limit.
    type: integer
    required: false
    min: 0

  sprotein-bsequence:
    name: Treat sequence B as protein
    description: Force sequence B to be treated as a protein sequence.
    type: flag
    required: false

  snucleotide-bsequence:
    name: Treat sequence B as nucleotide
    description: Force sequence B to be treated as a nucleotide sequence.
    type: flag
    required: false

  sreverse-bsequence:
    name: Reverse-complement sequence B
    description: Reverse-complement sequence B before alignment.
    type: flag
    required: false

  slower-bsequence:
    name: Lowercase sequence B
    description: Convert sequence B to lowercase.
    type: flag
    required: false

  supper-bsequence:
    name: Uppercase sequence B
    description: Convert sequence B to uppercase.
    type: flag
    required: false

  gapopen:
    name: Gap opening penalty
    description: The score taken away when a gap is created. The best value
      depends on the comparison matrix. The default assumes EBLOSUM62 for
      protein and EDNAFULL for nucleotide sequences.
    type: float
    required: false
    default: 10.0
    min: 0.0
    max: 100.0

  gapextend:
    name: Gap extension penalty
    description: The penalty added for each residue in a gap. This penalises
      longer gaps relative to shorter ones. Usually set lower than the gap
      opening penalty.
    type: float
    required: false
    default: 0.5
    min: 0.0
    max: 10.0

  datafile:
    name: Scoring matrix file
    description: The scoring matrix file used when comparing sequences. By
      default EBLOSUM62 (proteins) or EDNAFULL (nucleotides), from the EMBOSS
      data directory.
    type: text
    required: false

  endweight:
    name: Apply end gap penalties
    description: Apply end gap penalties, penalising gaps at the ends of the
      alignment similarly to internal gaps.
    type: flag
    required: false

  endopen:
    name: End gap opening penalty
    description: The score taken away when an end gap is created. Only active
      when end gap penalties are enabled.
    type: float
    required: false
    default: 10.0
    min: 0.0
    max: 100.0

  endextend:
    name: End gap extension penalty
    description: The penalty added for each residue in an end gap. Only active
      when end gap penalties are enabled.
    type: float
    required: false
    default: 0.5
    min: 0.0
    max: 10.0

  brief:
    name: Brief identity and similarity
    description: Show only the identity and similarity scores in a brief format
      rather than the full alignment output.
    type: flag
    required: false

command: needle

args:
  asequence:
    arg: -asequence $(value)
    symlink: asequence.dat
  asequence-direct:
    arg: -asequence $(value)
  sformat-asequence:
    arg: -sformat1 $(value)
  sbegin-asequence:
    arg: -sbegin1 $(value)
  send-asequence:
    arg: -send1 $(value)
  sprotein-asequence:
    arg: -sprotein1
  snucleotide-asequence:
    arg: -snucleotide1
  sreverse-asequence:
    arg: -sreverse1
  slower-asequence:
    arg: -slower1
  supper-asequence:
    arg: -supper1
  bsequence:
    arg: -bsequence $(value)
    symlink: bsequence.dat
  bsequence-direct:
    arg: -bsequence $(value)
  sformat-bsequence:
    arg: -sformat2 $(value)
  sbegin-bsequence:
    arg: -sbegin2 $(value)
  send-bsequence:
    arg: -send2 $(value)
  sprotein-bsequence:
    arg: -sprotein2
  snucleotide-bsequence:
    arg: -snucleotide2
  sreverse-bsequence:
    arg: -sreverse2
  slower-bsequence:
    arg: -slower2
  supper-bsequence:
    arg: -supper2
  gapopen:
    arg: -gapopen $(value)
  gapextend:
    arg: -gapextend $(value)
  datafile:
    arg: -datafile $(value)
  endweight:
    arg: -endweight
  endopen:
    arg: -endopen $(value)
  endextend:
    arg: -endextend $(value)
  brief:
    arg: -brief
  _outfile:
    arg: -outfile $(value)
    default: outfile.needle
  _aformat:
    arg: -aformat markx0
    default: present

outputs:
  alignment:
    path: outfile.needle
    name: Alignment output
    media-type: text/plain
  log:
    path: stdout
    name: Standard log
    media-type: text/plain
  error-log:
    path: stderr
    name: Error log
    media-type: text/plain

execution:
  runners:
    default:
      type: SlivkaQueueRunner

tests:
- applicable-runners: ["default"]
  parameters:
    asequence: ${SLIVKA_HOME}/testdata/seq1.fasta
    bsequence: ${SLIVKA_HOME}/testdata/seq2.fasta
  timeout: 10
...
