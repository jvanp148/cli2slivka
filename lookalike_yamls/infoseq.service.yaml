---
slivka-version: 0.8.3
name: Infoseq
description: Display basic information about sequences
version: 6.6.0.0
license: GPL

classifiers:
- 'Topic :: Computational biology :: Sequence analysis'
- 'Operation :: Analysis :: Sequence analysis :: Sequence feature detection ::
  Sequence retrieval'

parameters:
  sequence:
    name: sequence
    type: file
    required: true

  sformat-sequence:
    name: sformat_sequence
    type: choice
    required: false
    choices:
      abi: abi
      ace: ace
      acedb: acedb
      bam: bam
      biomart: biomart
      clustal: clustal
      codata: codata
      dbid: dbid
      embl: embl
      ensembl: ensembl
      experiment: experiment
      fasta: fasta
      fastq: fastq
      fastq-illumina: fastq-illumina
      fastq-sanger: fastq-sanger
      fastq-solexa: fastq-solexa
      fitch: fitch
      gcg: gcg
      genbank: genbank
      genpept: genpept
      gff2: gff2
      gff3: gff3
      gifasta: gifasta
      hennig86: hennig86
      ig: ig
      igstrict: igstrict
      jackknifer: jackknifer
      mase: mase
      mega: mega
      msf: msf
      nbrf: nbrf
      nexus: nexus
      pdb: pdb
      pdbnuc: pdbnuc
      pdbnucseq: pdbnucseq
      pdbseq: pdbseq
      pearson: pearson
      phylip: phylip
      phylipnon: phylipnon
      raw: raw
      refseqp: refseqp
      sam: sam
      selex: selex
      staden: staden
      stockholm: stockholm
      strider: strider
      swiss: swiss
      text: text
      treecon: treecon

  sbegin-sequence:
    name: sbegin_sequence
    type: integer
    required: false
    min: 0

  send-sequence:
    name: send_sequence
    type: integer
    required: false
    min: 0

  sprotein-sequence:
    name: sprotein_sequence
    type: choice
    required: false
    choices: 
      yes: Y
      no: N

  snucleotide-sequence:
    name: snucleotide_sequence
    type: choice
    required: false
    choices: 
      yes: Y
      no: N

  sreverse-sequence:
    name: sreverse_sequence
    type: choice
    required: false
    choices: 
      yes: Y
      no: N

  slower-sequence:
    name: slower_sequence
    type: choice
    required: false
    choices: 
      yes: Y
      no: N

  supper-sequence:
    name: supper_sequence
    type: choice
    required: false
    choices: 
      yes: Y
      no: N

  columns:
    name: columns
    description: Print information in neat, aligned columns.
    type: choice
    required: false
    choices: 
      yes: Y
      no: N

  delimiter:
    name: delimiter
    description: Delimiter of records in text output file
    type: text
    required: false
    default: '|'


  html:
    name: html
    description: Format output as an HTML table
    type: choice
    required: false
    choices: 
      yes: Y
      no: N

  only:
    name: only
    description: Display the specified columns
    type: choice
    required: false
    choices: 
      yes: Y
      no: N

  heading:
    name: heading
    description: Display column headings
    type: choice
    required: false
    choices: 
      yes: Y
      no: N

  usa:
    name: usa
    description: Display the USA of the sequence
    type: choice
    required: false
    choices: 
      yes: Y
      no: N

  database:
    name: database
    description: Display database column
    type: choice
    required: false
    choices: 
      yes: Y
      no: N

  name:
    name: name
    description: Display name column
    type: choice
    required: false
    choices: 
      yes: Y
      no: N

  accession:
    name: accession
    description: Display accession column
    type: choice
    required: false
    choices: 
      yes: Y
      no: N

  gi:
    name: gi
    description: Display GI column
    type: choice
    required: false
    choices: 
      yes: Y
      no: N

  seqversion:
    name: seqversion
    description: Display version column
    type: choice
    required: false
    choices: 
      yes: Y
      no: N

  type:
    name: type
    description: Display type column
    type: choice
    required: false
    choices: 
      yes: Y
      no: N

  length:
    name: length
    description: Display length column
    type: choice
    required: false
    choices: 
      yes: Y
      no: N

  pgc:
    name: pgc
    description: Display percent GC content column
    type: choice
    required: false
    choices: 
      yes: Y
      no: N

  organism:
    name: organism
    description: Display organism column
    type: choice
    required: false
    choices: 
      yes: Y
      no: N

  description:
    name: description
    description: Display description column
    type: choice
    required: false
    choices: 
      yes: Y
      no: N

command: 
- infoseq

args:
  sequence:
    arg: -sequence $(value)
    symlink: input_sequence.dat
  sformat-sequence:
    arg: -sformat1 $(value)
  sbegin-sequence:
    arg: -sbegin1 $(value)
  send-sequence:
    arg: -send1 $(value)
  sprotein-sequence:
    arg: -sprotein1 $(value)
  snucleotide-sequence:
    arg: -snucleotide1 $(value)
  sreverse-sequence:
    arg: -sreverse1 $(value)
  slower-sequence:
    arg: -slower1 $(value)
  supper-sequence:
    arg: -supper1 $(value)
  columns:
    arg: -columns $(value)
  delimiter:
    arg: -delimiter $(value)
  html:
    arg: -html $(value)
  only:
    arg: -only $(value)
  heading:
    arg: -heading $(value)
  usa:
    arg: -usa $(value)
  database:
    arg: -database $(value)
  name:
    arg: -name $(value)
  accession:
    arg: -accession $(value)
  gi:
    arg: -gi $(value)
  seqversion:
    arg: -seqversion $(value)
  type:
    arg: -type $(value)
  length:
    arg: -length $(value)
  pgc:
    arg: -pgc $(value)
  organism:
    arg: -organism $(value)
  description:
    arg: -description $(value)
  _outfile:
    arg: -outfile $(value)
    default: outfile.infoseq

outputs:
  sequence-info:
    path: outfile.infoseq
    media-type: text/plain
  log:
    path: stdout
    media-type: text/plain
  error-log:
    path: stderr
    media-type: text/plain

execution:
  runners:
    default:
      type: SlivkaQueueRunner

tests:
- applicable-runners: ["default"]
  parameters:
    sequence: ${SLIVKA_HOME}/testdata/uniref50.fa
  timeout: 10
...
